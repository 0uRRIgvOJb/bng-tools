<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>前後台連結系統</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Microsoft JhengHei",Arial,sans-serif;
  background:#0f172a;
  color:#e2e8f0;
}

.app{
  max-width:1400px;
  margin:auto;
  padding:22px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.header h1{
  margin:0;
  color:#bfdbfe;
  font-size:30px;
}

.header p{
  margin:6px 0 0;
  color:#94a3b8;
}

button{
  border:0;
  border-radius:12px;
  padding:11px 16px;
  cursor:pointer;
  font-weight:bold;
  color:#e2e8f0;
  background:#334155;
}

button:hover{
  background:#475569;
}

.danger{
  background:#7f1d1d;
}

.danger:hover{
  background:#991b1b;
}

input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #334155;
  background:#1e293b;
  color:#fff;
  font-size:15px;
}

.toolbar,.category-bar,.admin-bar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

#searchInput{
  flex:1;
  min-width:260px;
}

.category-btn.active{
  background:#64748b;
}

.info{
  color:#cbd5e1;
  margin:10px 0 16px;
}

.section-title{
  text-align:center;
  color:#bfdbfe;
  font-size:26px;
  margin:24px 0 18px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}

.card{
  background:#1e293b;
  border:1px solid #334155;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 22px rgba(0,0,0,.22);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:220px;
}

.owner-name,.link-name{
  font-size:21px;
  font-weight:bold;
  color:#bfdbfe;
  text-align:center;
  margin-bottom:14px;
  word-break:break-word;
}

.btn-row{
  display:flex;
  gap:10px;
}

.link-btn{
  flex:1;
  display:block;
  text-align:center;
  text-decoration:none;
  padding:11px;
  border-radius:12px;
  color:#e2e8f0;
  background:#334155;
  font-weight:bold;
}

.link-btn:hover{
  background:#475569;
}

.note{
  color:#94a3b8;
  font-size:14px;
  text-align:center;
  margin-bottom:12px;
  line-height:1.6;
  word-break:break-word;
}

.admin-actions{
  display:none;
  gap:8px;
  margin-top:12px;
}

body.logged-in .admin-actions{
  display:flex;
}

.empty,.loading{
  text-align:center;
  padding:50px 0;
  color:#93c5fd;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.68);
  z-index:99;
  align-items:center;
  justify-content:center;
  padding:16px;
}

.modal.show{
  display:flex;
}

.modal-box{
  width:100%;
  max-width:460px;
  background:#1e293b;
  border:1px solid #334155;
  border-radius:18px;
  padding:20px;
}

.modal-box h2{
  margin-top:0;
  color:#bfdbfe;
}

.form-row{
  margin-bottom:12px;
}

.form-row label{
  display:block;
  margin-bottom:6px;
  color:#cbd5e1;
}

.modal-actions{
  display:flex;
  gap:10px;
  justify-content:flex-end;
}

.toast{
  display:none;
  position:fixed;
  right:18px;
  bottom:18px;
  background:#020617;
  border:1px solid #334155;
  padding:14px 18px;
  border-radius:14px;
  z-index:120;
}

.toast.show{
  display:block;
}

#loadingOverlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.92);
  backdrop-filter:blur(4px);
  z-index:99999;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#loadingOverlay.show{
  display:flex;
}

.owl-loader{
  font-size:56px;
  animation:owlFloat 1.4s ease-in-out infinite;
}

.loader-ring{
  width:72px;
  height:72px;
  border:5px solid rgba(255,255,255,.12);
  border-top:5px solid #94a3b8;
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin-top:14px;
}

.loadingText{
  margin-top:18px;
  font-size:18px;
  color:#cbd5e1;
  letter-spacing:2px;
}

.loadingSub{
  margin-top:6px;
  font-size:13px;
  color:#94a3b8;
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

@keyframes owlFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

@media(max-width:700px){
  .app{padding:14px}
  .header{flex-direction:column;align-items:flex-start}
  .header h1{font-size:25px}
  .toolbar,.admin-bar{flex-direction:column}
  .btn-row{flex-direction:column}
}
</style>
</head>

<body>

<div class="app">
  <div class="header">
    <div>
      <h1>前後台連結系統</h1>
      <p>快速查詢業主、新系統、舊系統與其他網址</p>
    </div>
    <button id="loginBtn" onclick="openLoginModal()">登入</button>
  </div>

  <div id="adminBar" class="admin-bar" style="display:none;">
    <button onclick="openOwnerModal('add')">新增業主</button>
    <button onclick="openLinkModal('add')">新增連結</button>
    <button onclick="logout()">登出</button>
    <span id="loginInfo" class="info"></span>
  </div>

  <div class="toolbar">
    <input id="searchInput" placeholder="搜尋業主、網站名稱、網址或備註">
    <button onclick="searchData()">搜尋</button>
    <button onclick="clearSearch()">清除</button>
  </div>

  <div class="category-bar">
    <button class="category-btn active" onclick="setCategory('all',this)">全部</button>
    <button class="category-btn" onclick="setCategory('owners',this)">業主前後台</button>
    <button class="category-btn" onclick="setCategory('new',this)">新系統</button>
    <button class="category-btn" onclick="setCategory('old',this)">舊系統</button>
    <button class="category-btn" onclick="setCategory('other',this)">其他網址</button>
  </div>

  <div id="info" class="info"></div>
  <div id="content" class="loading">資料載入中...</div>
</div>

<div id="loginModal" class="modal">
  <div class="modal-box">
    <h2>管理登入</h2>
    <div class="form-row">
      <label>帳號</label>
      <input id="accountInput">
    </div>
    <div class="form-row">
      <label>密碼</label>
      <input id="passwordInput" type="password">
    </div>
    <div class="modal-actions">
      <button onclick="closeModal('loginModal')">取消</button>
      <button onclick="login()">登入</button>
    </div>
  </div>
</div>

<div id="ownerModal" class="modal">
  <div class="modal-box">
    <h2 id="ownerModalTitle">新增業主</h2>
    <div class="form-row">
      <label>業主名稱</label>
      <input id="ownerName">
    </div>
    <div class="form-row">
      <label>前台網址</label>
      <input id="ownerFrontend">
    </div>
    <div class="form-row">
      <label>後台網址</label>
      <input id="ownerBackend">
    </div>
    <div class="modal-actions">
      <button onclick="closeModal('ownerModal')">取消</button>
      <button onclick="submitOwner()">儲存</button>
    </div>
  </div>
</div>

<div id="linkModal" class="modal">
  <div class="modal-box">
    <h2 id="linkModalTitle">新增連結</h2>
    <div class="form-row">
      <label>分類</label>
      <select id="linkType">
        <option value="new">新系統</option>
        <option value="old">舊系統</option>
        <option value="other">其他網址</option>
      </select>
    </div>
    <div class="form-row">
      <label>網站名稱</label>
      <input id="linkName">
    </div>
    <div class="form-row">
      <label>網址</label>
      <input id="linkUrl">
    </div>
    <div class="form-row">
      <label>備註</label>
      <textarea id="linkNote" rows="3"></textarea>
    </div>
    <div class="modal-actions">
      <button onclick="closeModal('linkModal')">取消</button>
      <button onclick="submitLink()">儲存</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<div id="loadingOverlay">
  <div class="owl-loader">🦉</div>
  <div class="loader-ring"></div>
  <div class="loadingText">資料載入中...</div>
  <div class="loadingSub">請稍候</div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbyDdWpCa3YQNm9ocJN4mSOsNgOo5udmaxb9GbgI6P3NZ95kteaOjojkOcAIIYsQybfc/exec';

let owners=[],newSystems=[],oldSystems=[],otherLinks=[];
let token=localStorage.getItem('linkToken')||'';
let account=localStorage.getItem('linkAccount')||'';
let currentCategory='all';
let ownerMode='add',ownerRow='';
let linkMode='add',linkRow='',linkEditType='';

window.onload=function(){
  updateLoginUI();
  loadData();
};

function api(params,cb,loadingText){
  showLoading(loadingText || '資料處理中...');

  const callback='jsonp_'+Date.now()+Math.floor(Math.random()*9999);
  params.callback=callback;

  const query=Object.keys(params)
    .map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k]??''))
    .join('&');

  let finished=false;

  window[callback]=function(res){
    finished=true;
    hideLoading();
    cb(res);
    delete window[callback];
    script.remove();
  };

  const script=document.createElement('script');
  script.src=API_URL+'?'+query;

  script.onerror=function(){
    if(finished)return;
    finished=true;
    hideLoading();
    showToast('API連線失敗');
    delete window[callback];
    script.remove();
  };

  document.body.appendChild(script);
}

function loadData(){
  document.getElementById('content').innerHTML='<div class="loading">資料載入中...</div>';

  api({action:'list'},function(res){
    if(!res||!res.success){
      showError(res?res.message:'讀取失敗');
      return;
    }

    owners=res.owners||[];
    newSystems=res.newSystems||[];
    oldSystems=res.oldSystems||[];
    otherLinks=res.otherLinks||[];

    render();
  },'正在讀取資料...');
}

function render(){
  const kw=document.getElementById('searchInput').value.trim().toLowerCase();

  let o=filterOwners(owners,kw);
  let n=filterLinks(newSystems,kw);
  let old=filterLinks(oldSystems,kw);
  let other=filterLinks(otherLinks,kw);

  document.getElementById('info').innerHTML=
    `目前顯示 ${o.length} 個業主，${n.length} 個新系統，${old.length} 個舊系統，${other.length} 個其他網址`;

  let html='';

  if(currentCategory==='all'||currentCategory==='owners') html+=renderOwners(o);
  if(currentCategory==='all'||currentCategory==='new') html+=renderLinks('新系統',n);
  if(currentCategory==='all'||currentCategory==='old') html+=renderLinks('舊系統',old);
  if(currentCategory==='all'||currentCategory==='other') html+=renderLinks('其他網址',other);

  document.getElementById('content').innerHTML=html||'<div class="empty">查無資料</div>';
}

function renderOwners(list){
  if(!list.length)return '';

  let html='<div class="section-title">業主前後台</div><div class="grid">';

  list.forEach(item=>{
    html+=`
    <div class="card">
      <div class="owner-name">${esc(item.owner||'未命名')}</div>
      <div class="btn-row">
        ${item.frontend?`<a class="link-btn" href="${safeUrl(item.frontend)}" target="_blank">前台</a>`:''}
        ${item.backend?`<a class="link-btn" href="${safeUrl(item.backend)}" target="_blank">後台</a>`:''}
      </div>
      <div class="admin-actions">
        <button onclick='openOwnerModal("edit",${JSON.stringify(item)})'>編輯</button>
        <button class="danger" onclick="deleteOwner('${item.row}')">刪除</button>
      </div>
    </div>`;
  });

  return html+'</div>';
}

function renderLinks(title,list){
  if(!list.length)return '';

  let html=`<div class="section-title">${title}</div><div class="grid">`;

  list.forEach(item=>{
    html+=`
    <div class="card">
      <div>
        <div class="link-name">${esc(item.name||'未命名')}</div>
        ${item.note?`<div class="note">${esc(item.note)}</div>`:''}
      </div>

      <div>
        ${item.url?`<a class="link-btn" href="${safeUrl(item.url)}" target="_blank">開啟</a>`:''}
        <div class="admin-actions">
          <button onclick='openLinkModal("edit",${JSON.stringify(item)})'>編輯</button>
          <button class="danger" onclick="deleteLink('${item.type}','${item.row}')">刪除</button>
        </div>
      </div>
    </div>`;
  });

  return html+'</div>';
}

function filterOwners(list,kw){
  if(!kw)return list;

  return list.filter(x=>
    String(x.owner||'').toLowerCase().includes(kw)||
    String(x.frontend||'').toLowerCase().includes(kw)||
    String(x.backend||'').toLowerCase().includes(kw)
  );
}

function filterLinks(list,kw){
  if(!kw)return list;

  return list.filter(x=>
    String(x.name||'').toLowerCase().includes(kw)||
    String(x.url||'').toLowerCase().includes(kw)||
    String(x.note||'').toLowerCase().includes(kw)
  );
}

function setCategory(cat,btn){
  currentCategory=cat;
  document.querySelectorAll('.category-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function searchData(){
  showLoading('正在搜尋資料...');
  setTimeout(()=>{
    render();
    hideLoading();
  },250);
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  showLoading('正在重整資料...');
  setTimeout(()=>{
    render();
    hideLoading();
  },250);
}

document.getElementById('searchInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')searchData();
});

function openLoginModal(){
  document.getElementById('loginModal').classList.add('show');
}

function closeModal(id){
  document.getElementById(id).classList.remove('show');
}

function login(){
  const acc=document.getElementById('accountInput').value.trim();
  const pwd=document.getElementById('passwordInput').value.trim();

  if(!acc||!pwd){
    showToast('請輸入帳號與密碼');
    return;
  }

  api({
    action:'login',
    account:acc,
    password:pwd
  },function(res){
    if(!res.success){
      showToast(res.message||'登入失敗');
      return;
    }

    token=res.token;
    account=res.account;

    localStorage.setItem('linkToken',token);
    localStorage.setItem('linkAccount',account);

    closeModal('loginModal');
    updateLoginUI();
    render();
    showToast('登入成功');
  },'登入驗證中...');
}

function logout(){
  token='';
  account='';

  localStorage.removeItem('linkToken');
  localStorage.removeItem('linkAccount');

  updateLoginUI();
  render();
  showToast('已登出');
}

function updateLoginUI(){
  if(token){
    document.body.classList.add('logged-in');
    document.getElementById('loginBtn').style.display='none';
    document.getElementById('adminBar').style.display='flex';
    document.getElementById('loginInfo').innerText='目前登入：'+account;
  }else{
    document.body.classList.remove('logged-in');
    document.getElementById('loginBtn').style.display='block';
    document.getElementById('adminBar').style.display='none';
  }
}

function openOwnerModal(mode,item){
  ownerMode=mode;
  ownerRow=item?item.row:'';

  document.getElementById('ownerModalTitle').innerText=mode==='add'?'新增業主':'編輯業主';
  document.getElementById('ownerName').value=item?item.owner:'';
  document.getElementById('ownerFrontend').value=item?item.frontend:'';
  document.getElementById('ownerBackend').value=item?item.backend:'';
  document.getElementById('ownerModal').classList.add('show');
}

function submitOwner(){
  const params={
    action:ownerMode==='add'?'addOwner':'updateOwner',
    token,
    owner:document.getElementById('ownerName').value.trim(),
    frontend:document.getElementById('ownerFrontend').value.trim(),
    backend:document.getElementById('ownerBackend').value.trim()
  };

  if(ownerMode==='edit'){
    params.row=ownerRow;
  }

  api(params,function(res){
    if(!res.success){
      showToast(res.message);
      return;
    }

    closeModal('ownerModal');
    updateData(res);
  },ownerMode==='add'?'新增業主中...':'更新業主中...');
}

function deleteOwner(row){
  if(!confirm('確定刪除這個業主嗎？'))return;

  api({
    action:'deleteOwner',
    token,
    row
  },function(res){
    if(!res.success){
      showToast(res.message);
      return;
    }

    updateData(res);
  },'刪除業主中...');
}

function openLinkModal(mode,item){
  linkMode=mode;
  linkRow=item?item.row:'';
  linkEditType=item?item.type:'';

  document.getElementById('linkModalTitle').innerText=mode==='add'?'新增連結':'編輯連結';
  document.getElementById('linkType').disabled=mode==='edit';
  document.getElementById('linkType').value=item?item.type:'new';
  document.getElementById('linkName').value=item?item.name:'';
  document.getElementById('linkUrl').value=item?item.url:'';
  document.getElementById('linkNote').value=item?item.note:'';
  document.getElementById('linkModal').classList.add('show');
}

function submitLink(){
  const params={
    action:linkMode==='add'?'addLink':'updateLink',
    token,
    type:linkMode==='edit'?linkEditType:document.getElementById('linkType').value,
    name:document.getElementById('linkName').value.trim(),
    url:document.getElementById('linkUrl').value.trim(),
    note:document.getElementById('linkNote').value.trim()
  };

  if(linkMode==='edit'){
    params.row=linkRow;
  }

  api(params,function(res){
    if(!res.success){
      showToast(res.message);
      return;
    }

    closeModal('linkModal');
    updateData(res);
  },linkMode==='add'?'新增連結中...':'更新連結中...');
}

function deleteLink(type,row){
  if(!confirm('確定刪除這個連結嗎？'))return;

  api({
    action:'deleteLink',
    token,
    type,
    row
  },function(res){
    if(!res.success){
      showToast(res.message);
      return;
    }

    updateData(res);
  },'刪除連結中...');
}

function updateData(res){
  if(res.data){
    owners=res.data.owners||[];
    newSystems=res.data.newSystems||[];
    oldSystems=res.data.oldSystems||[];
    otherLinks=res.data.otherLinks||[];
    render();
  }else{
    loadData();
  }

  showToast(res.message||'操作成功');
}

function showError(t){
  document.getElementById('content').innerHTML='<div class="empty">'+esc(t)+'</div>';
}

function showToast(t){
  const el=document.getElementById('toast');
  el.innerText=t;
  el.classList.add('show');

  setTimeout(()=>{
    el.classList.remove('show');
  },2400);
}

function showLoading(text){
  document.querySelector('.loadingText').innerText=text || '資料處理中...';
  document.getElementById('loadingOverlay').classList.add('show');
}

function hideLoading(){
  document.getElementById('loadingOverlay').classList.remove('show');
}

function esc(t){
  return String(t||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function safeUrl(url){
  url=String(url||'').trim();

  if(!url)return '#';

  if(!/^https?:\/\//i.test(url)){
    return 'https://'+url;
  }

  return url;
}
</script>
</body>
</html>
