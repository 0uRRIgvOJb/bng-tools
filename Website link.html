<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .app {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 30px;
      color: #93c5fd;
    }

    .header p {
      color: #9ca3af;
      margin-top: 8px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    #searchInput {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      font-size: 16px;
      outline: none;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: #2563eb;
    }

    button:hover {
      background: #1d4ed8;
    }

    .clear-btn {
      background: #475569;
    }

    .clear-btn:hover {
      background: #334155;
    }

    .info {
      margin-bottom: 14px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      color: #bfdbfe;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .link-group {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .link-btn {
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 11px;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      word-break: break-all;
    }

    .frontend {
      background: #16a34a;
    }

    .backend {
      background: #dc2626;
    }

    .related {
      background: #7c3aed;
    }

    .link-btn:hover {
      filter: brightness(1.12);
    }

    .note {
      margin-top: 12px;
      padding: 10px;
      border-radius: 12px;
      background: #0f172a;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .empty,
    .loading {
      text-align: center;
      padding: 50px 10px;
      color: #93c5fd;
      font-size: 18px;
    }

    .error {
      color: #fca5a5;
    }

    .tag {
      display: inline-block;
      margin-bottom: 10px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #0f172a;
      color: #93c5fd;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .app {
        padding: 14px;
      }

      .toolbar {
        flex-direction: column;
      }

      button {
        padding: 13px;
      }

      .header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <h1>前後台連結系統</h1>
      <p>快速查詢前台、後台與相關連結</p>
    </div>

    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="輸入名稱、備註或連結關鍵字">
      <button onclick="searchData()">搜尋</button>
      <button class="clear-btn" onclick="clearSearch()">清除</button>
    </div>

    <div id="info" class="info"></div>
    <div id="content" class="loading">資料載入中...</div>
  </div>

  <script>
    let allData = [];

    window.onload = function () {
      loadData();
    };

    function loadData() {
      setLoading('資料載入中...');

      google.script.run
        .withSuccessHandler(function (res) {
          if (!res || !res.success) {
            showError(res ? res.message : '讀取失敗');
            return;
          }

          allData = res.data || [];
          renderData(allData);
        })
        .withFailureHandler(function (err) {
          showError(err.message || '系統錯誤，請稍後再試');
        })
        .getLinkData();
    }

    function renderData(data) {
      const content = document.getElementById('content');
      const info = document.getElementById('info');

      info.innerHTML = `目前顯示 ${data.length} 筆資料，共 ${allData.length} 筆`;

      if (!data.length) {
        content.innerHTML = '<div class="empty">查無資料</div>';
        return;
      }

      let html = '<div class="grid">';

      data.forEach(function (item, index) {
        html += `
          <div class="card">
            <div class="tag">#${index + 1}</div>
            <div class="card-title">${escapeHtml(item.name || '未命名')}</div>

            <div class="link-group">
              ${item.frontend ? `<a class="link-btn frontend" href="${safeUrl(item.frontend)}" target="_blank">前台連結</a>` : ''}
              ${item.backend ? `<a class="link-btn backend" href="${safeUrl(item.backend)}" target="_blank">後台連結</a>` : ''}
              ${item.related ? `<a class="link-btn related" href="${safeUrl(item.related)}" target="_blank">相關連結</a>` : ''}
            </div>

            ${item.note ? `<div class="note">備註：${escapeHtml(item.note)}</div>` : ''}
          </div>
        `;
      });

      html += '</div>';
      content.innerHTML = html;
    }

    function searchData() {
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

      if (!keyword) {
        renderData(allData);
        return;
      }

      const filtered = allData.filter(function (item) {
        return (
          String(item.name || '').toLowerCase().includes(keyword) ||
          String(item.frontend || '').toLowerCase().includes(keyword) ||
          String(item.backend || '').toLowerCase().includes(keyword) ||
          String(item.related || '').toLowerCase().includes(keyword) ||
          String(item.note || '').toLowerCase().includes(keyword)
        );
      });

      renderData(filtered);
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      renderData(allData);
    }

    document.getElementById('searchInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        searchData();
      }
    });

    function setLoading(text) {
      document.getElementById('content').innerHTML = `<div class="loading">${text}</div>`;
      document.getElementById('info').innerHTML = '';
    }

    function showError(message) {
      document.getElementById('content').innerHTML =
        `<div class="empty error">${escapeHtml(message)}</div>`;
      document.getElementById('info').innerHTML = '';
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function safeUrl(url) {
      url = String(url || '').trim();

      if (!url) return '#';

      if (!/^https?:\/\//i.test(url)) {
        return 'https://' + url;
      }

      return url;
    }
  </script>
</body>
</html>
