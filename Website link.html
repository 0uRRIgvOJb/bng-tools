<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>前後台連結系統</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .app {
      max-width: 1280px;
      margin: auto;
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 22px;
    }

    .header h1 {
      margin: 0;
      font-size: 34px;
      color: #93c5fd;
    }

    .header p {
      color: #9ca3af;
      margin-top: 8px;
      font-size: 16px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
    }

    #searchInput {
      flex: 1;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      font-size: 16px;
      outline: none;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 0 22px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: #2563eb;
    }

    button:hover {
      background: #1d4ed8;
    }

    .clear-btn {
      background: #475569;
    }

    .clear-btn:hover {
      background: #334155;
    }

    .info {
      margin-bottom: 18px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .section-title {
      font-size: 22px;
      color: #bfdbfe;
      margin: 24px 0 14px;
      border-left: 5px solid #3b82f6;
      padding-left: 10px;
    }

    .owner-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
    }

    .owner-name {
      font-size: 20px;
      font-weight: bold;
      color: #bfdbfe;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .link-btn {
      flex: 1;
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 11px;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      word-break: break-word;
    }

    .frontend {
      background: #16a34a;
    }

    .backend {
      background: #dc2626;
    }

    .related-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 14px;
    }

    .related-name {
      color: #e5e7eb;
      font-weight: bold;
      word-break: break-word;
    }

    .related-btn {
      white-space: nowrap;
      text-decoration: none;
      padding: 9px 13px;
      border-radius: 10px;
      background: #7c3aed;
      color: white;
      font-weight: bold;
    }

    .empty,
    .loading {
      text-align: center;
      padding: 60px 10px;
      color: #93c5fd;
      font-size: 18px;
    }

    .error {
      color: #fca5a5;
    }

    @media (max-width: 700px) {
      .app {
        padding: 14px;
      }

      .header h1 {
        font-size: 26px;
      }

      .toolbar {
        flex-direction: column;
      }

      button {
        padding: 14px;
      }

      .btn-group {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <h1>前後台連結系統</h1>
      <p>快速查詢前台、後台與相關連結</p>
    </div>

    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="輸入業主、友善名稱或連結關鍵字">
      <button onclick="searchData()">搜尋</button>
      <button class="clear-btn" onclick="clearSearch()">清除</button>
    </div>

    <div id="info" class="info"></div>
    <div id="content" class="loading">資料載入中...</div>
  </div>

  <script>
    const API_URL = '你的 Apps Script 部署網址';

    let allOwners = [];
    let allRelatedLinks = [];

    window.onload = function () {
      loadData();
    };

    function loadData() {
      setLoading('資料載入中...');

      loadJsonp(API_URL, function (res) {
        if (!res || !res.success) {
          showError(res ? res.message : '讀取失敗');
          return;
        }

        allOwners = res.owners || [];
        allRelatedLinks = res.relatedLinks || [];

        renderData(allOwners, allRelatedLinks);
      });
    }

    function renderData(owners, relatedLinks) {
      const content = document.getElementById('content');
      const info = document.getElementById('info');

      info.innerHTML = `目前顯示 ${owners.length} 個業主，${relatedLinks.length} 個相關連結`;

      if (!owners.length && !relatedLinks.length) {
        content.innerHTML = '<div class="empty">查無資料</div>';
        return;
      }

      let html = '';

      if (owners.length) {
        html += `<div class="section-title">業主前後台</div>`;
        html += `<div class="owner-grid">`;

        owners.forEach(item => {
          html += `
            <div class="card">
              <div class="owner-name">${escapeHtml(item.owner || '未命名')}</div>
              <div class="btn-group">
                ${item.frontend ? `<a class="link-btn frontend" href="${safeUrl(item.frontend)}" target="_blank">前台</a>` : ''}
                ${item.backend ? `<a class="link-btn backend" href="${safeUrl(item.backend)}" target="_blank">後台</a>` : ''}
              </div>
            </div>
          `;
        });

        html += `</div>`;
      }

      if (relatedLinks.length) {
        html += `<div class="section-title">相關連結</div>`;
        html += `<div class="link-grid">`;

        relatedLinks.forEach(item => {
          html += `
            <div class="related-card">
              <div class="related-name">${escapeHtml(item.name || '未命名連結')}</div>
              ${item.url ? `<a class="related-btn" href="${safeUrl(item.url)}" target="_blank">開啟</a>` : ''}
            </div>
          `;
        });

        html += `</div>`;
      }

      content.innerHTML = html;
    }

    function searchData() {
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

      if (!keyword) {
        renderData(allOwners, allRelatedLinks);
        return;
      }

      const filteredOwners = allOwners.filter(item => {
        return (
          String(item.owner || '').toLowerCase().includes(keyword) ||
          String(item.frontend || '').toLowerCase().includes(keyword) ||
          String(item.backend || '').toLowerCase().includes(keyword)
        );
      });

      const filteredLinks = allRelatedLinks.filter(item => {
        return (
          String(item.name || '').toLowerCase().includes(keyword) ||
          String(item.url || '').toLowerCase().includes(keyword)
        );
      });

      renderData(filteredOwners, filteredLinks);
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      renderData(allOwners, allRelatedLinks);
    }

    document.getElementById('searchInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        searchData();
      }
    });

    function loadJsonp(url, callback) {
      const callbackName = 'jsonpCallback_' + Date.now();

      window[callbackName] = function (data) {
        callback(data);
        delete window[callbackName];
        script.remove();
      };

      const script = document.createElement('script');
      script.src = url + '?callback=' + callbackName;
      script.onerror = function () {
        showError('API 連線失敗，請確認 Apps Script 是否已部署為任何人可存取');
      };

      document.body.appendChild(script);
    }

    function setLoading(text) {
      document.getElementById('content').innerHTML = `<div class="loading">${text}</div>`;
      document.getElementById('info').innerHTML = '';
    }

    function showError(message) {
      document.getElementById('content').innerHTML =
        `<div class="empty error">${escapeHtml(message)}</div>`;
      document.getElementById('info').innerHTML = '';
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function safeUrl(url) {
      url = String(url || '').trim();

      if (!url) return '#';

      if (!/^https?:\/\//i.test(url)) {
        return 'https://' + url;
      }

      return url;
    }
  </script>
</body>
</html>
