<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>貓頭鷹夜班排程</title>
  <style>
    :root {
      --ink: #1d2733;
      --muted: #667085;
      --line: #d7dee8;
      --paper: #fbfaf6;
      --panel: #ffffff;
      --teal: #0f766e;
      --teal-soft: #d9f2ec;
      --gold: #f3bd3d;
      --rose: #c2415d;
      --blue: #3167a7;
      --night: #22324a;
      --shadow: 0 18px 45px rgba(29, 39, 51, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(243, 189, 61, .22), transparent 28rem),
        linear-gradient(135deg, #f9f6ef 0%, #eef6f4 48%, #f7eff2 100%);
    }

    .shell {
      width: min(1500px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }

    .owl {
      width: 76px;
      height: 76px;
      border-radius: 24px 24px 30px 30px;
      background: linear-gradient(150deg, #26364f, #162132);
      position: relative;
      box-shadow: var(--shadow);
    }

    .owl:before,
    .owl:after {
      content: "";
      position: absolute;
      top: 17px;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: #fff7dc;
      box-shadow: inset 0 0 0 6px var(--gold);
    }

    .owl:before { left: 13px; }
    .owl:after { right: 13px; }

    .beak {
      position: absolute;
      left: 50%;
      top: 44px;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 12px solid var(--gold);
      transform: translateX(-50%);
    }

    .title h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 42px);
      letter-spacing: 0;
    }

    .title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .status {
      min-width: 210px;
      color: var(--night);
      background: rgba(255, 255, 255, .72);
      border: 1px solid rgba(215, 222, 232, .8);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, .86);
      border: 1px solid rgba(215, 222, 232, .9);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input, button, textarea {
      font: inherit;
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .14);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .drop {
      display: grid;
      place-items: center;
      min-height: 170px;
      margin-top: 10px;
      padding: 16px;
      border: 2px dashed #a9b8c8;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(217, 242, 236, .8), rgba(255, 255, 255, .72));
      text-align: center;
      color: var(--night);
      cursor: pointer;
    }

    .drop strong {
      display: block;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .drop span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 14px;
      color: #fff;
      background: var(--teal);
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      color: var(--night);
      background: #e8edf2;
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .preview {
      margin-top: 14px;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f7f9fb;
    }

    .preview img {
      display: block;
      width: 100%;
      max-height: 240px;
      object-fit: contain;
      background: #fff;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    .metric b {
      display: block;
      font-size: 22px;
      color: var(--blue);
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .result {
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(34, 50, 74, .96);
      color: #fff;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 18px;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 190px);
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 850px;
    }

    th, td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: center;
      white-space: nowrap;
      min-width: 100px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f6e3c9;
      color: #111827;
      font-weight: 800;
    }

    th:first-child,
    td:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
      min-width: 86px;
      background: #eef3f6;
      font-weight: 800;
    }

    th:first-child { background: #dce8ee; }

    .weekend td:first-child {
      color: #d21f2b;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      font-weight: 800;
      color: #10202f;
    }

    .b0 { background: #bdebd9; }
    .b1 { background: #ffdf8a; }
    .b2 { background: #c9ddff; }
    .b3 { background: #f6c6d1; }
    .empty {
      color: var(--rose);
      font-weight: 800;
    }

    .summary {
      padding: 14px 16px 16px;
      border-top: 1px solid var(--line);
      background: #fbfcfd;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
    }

    .person {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }

    .person b {
      display: block;
      margin-bottom: 7px;
      color: var(--night);
    }

    .person div {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .notice {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .hidden { display: none; }

    @media (max-width: 980px) {
      header,
      .grid {
        grid-template-columns: 1fr;
      }

      .status {
        min-width: 0;
      }

      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media print {
      body { background: #fff; }
      .controls, header, .toolbar button, .notice { display: none; }
      .shell { width: 100%; padding: 0; }
      .grid { display: block; }
      .panel { box-shadow: none; border: 0; }
      .table-wrap { max-height: none; overflow: visible; }
      th, td { padding: 6px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div class="owl"><span class="beak"></span></div>
      <div class="title">
        <h1>貓頭鷹夜班排程</h1>
        <p>貼上完整假表截圖後，只抓最下面 4 列夜班，自動判斷非空白為休假、空白為上班。</p>
      </div>
      <div class="status" id="status">等待貼上截圖</div>
    </header>

    <section class="grid">
      <aside class="panel controls">
        <div class="row">
          <div>
            <label for="year">年份</label>
            <input id="year" type="number" min="2000" max="2100" value="2026">
          </div>
          <div>
            <label for="month">月份</label>
            <input id="month" type="number" min="1" max="12" value="7">
          </div>
        </div>

        <label for="file" style="margin-top:14px;">休假表截圖</label>
        <input id="file" class="hidden" type="file" accept="image/*">
        <div class="drop" id="drop">
          <div>
            <strong>貼上截圖或點選上傳</strong>
            <span>支援 Ctrl+V、拖曳圖片、選擇圖片。可貼完整早中夜假表，系統只會抓最下面 4 列夜班。</span>
          </div>
        </div>

        <div class="actions">
          <button id="generate" disabled>生成排班</button>
          <button class="secondary" id="print" disabled>列印/存 PDF</button>
        </div>

        <div class="preview hidden" id="previewBox">
          <img id="preview" alt="已貼上的休假表截圖">
        </div>

        <div class="meta">
          <div class="metric"><b id="detectedDays">0</b><span>已判讀日期欄</span></div>
          <div class="metric"><b id="detectedCells">0</b><span>已判讀休假格</span></div>
        </div>

        <p class="notice" id="notice">
          判讀規則：只讀取表格最下面 4 列夜班；每天每位同仁的格子只要偵測到文字、勾勾或符號，即視為休假；空白格視為上班。
        </p>
      </aside>

      <section class="panel result">
        <div class="toolbar">
          <h2 id="resultTitle">夜班排班結果</h2>
          <button id="copy" disabled>複製表格</button>
        </div>
        <div class="table-wrap">
          <table id="schedule">
            <thead>
              <tr>
                <th>日期</th>
                <th>星期</th>
                <th>工作事項 1</th>
                <th>工作事項 2</th>
                <th>工作事項 3</th>
                <th>工作事項 4</th>
                <th>工作事項 5</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="7">貼上截圖後會在這裡產生結果</td></tr>
            </tbody>
          </table>
        </div>
        <div class="summary">
          <div class="summary-grid" id="summary"></div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const state = {
      image: null,
      vacation: null,
      detectedDays: 0,
      detectedVacations: 0,
      schedule: null
    };

    const el = {
      year: document.getElementById('year'),
      month: document.getElementById('month'),
      file: document.getElementById('file'),
      drop: document.getElementById('drop'),
      generate: document.getElementById('generate'),
      print: document.getElementById('print'),
      preview: document.getElementById('preview'),
      previewBox: document.getElementById('previewBox'),
      status: document.getElementById('status'),
      detectedDays: document.getElementById('detectedDays'),
      detectedCells: document.getElementById('detectedCells'),
      resultTitle: document.getElementById('resultTitle'),
      schedule: document.getElementById('schedule'),
      summary: document.getElementById('summary'),
      copy: document.getElementById('copy')
    };

    const NIGHT_PEOPLE = ['V', 'VII', 'IX', 'X'];
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

    el.drop.addEventListener('click', () => el.file.click());
    el.file.addEventListener('change', event => {
      const file = event.target.files && event.target.files[0];
      if (file) loadImageFile(file);
    });
    el.generate.addEventListener('click', generate);
    el.print.addEventListener('click', () => window.print());
    el.copy.addEventListener('click', copyTable);
    el.year.addEventListener('input', rerunIfReady);
    el.month.addEventListener('input', rerunIfReady);

    document.addEventListener('paste', event => {
      const item = [...event.clipboardData.items].find(entry => entry.type.startsWith('image/'));
      if (item) loadImageFile(item.getAsFile());
    });

    ['dragenter', 'dragover'].forEach(name => {
      el.drop.addEventListener(name, event => {
        event.preventDefault();
        el.drop.style.borderColor = '#0f766e';
      });
    });

    ['dragleave', 'drop'].forEach(name => {
      el.drop.addEventListener(name, event => {
        event.preventDefault();
        el.drop.style.borderColor = '#a9b8c8';
      });
    });

    el.drop.addEventListener('drop', event => {
      const file = [...event.dataTransfer.files].find(entry => entry.type.startsWith('image/'));
      if (file) loadImageFile(file);
    });

    function people() {
      return NIGHT_PEOPLE;
    }

    function daysInMonth() {
      const year = Number(el.year.value);
      const month = Number(el.month.value);
      return new Date(year, month, 0).getDate();
    }

    function rerunIfReady() {
      if (state.image) analyzeImage();
    }

    function loadImageFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          state.image = img;
          el.preview.src = reader.result;
          el.previewBox.classList.remove('hidden');
          analyzeImage();
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    function analyzeImage() {
      const names = people();

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      canvas.width = state.image.naturalWidth;
      canvas.height = state.image.naturalHeight;
      ctx.drawImage(state.image, 0, 0);

      const image = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const vLines = findLines(image, 'vertical');
      const hLines = findLines(image, 'horizontal');
      const targetDays = daysInMonth();
      const dayLines = pickDayLines(vLines, targetDays);
      const rowLines = pickWorkerRows(hLines, names.length);

      if (dayLines.length < 2 || rowLines.length < names.length + 1) {
        setStatus('沒有抓到完整格線，請確認截圖包含日期欄與最下面 4 位夜班同仁列');
        el.generate.disabled = true;
        return;
      }

      const actualDays = Math.min(targetDays, dayLines.length - 1);
      const vacation = {};
      let vacationCount = 0;
      names.forEach(name => vacation[name] = {});

      for (let d = 1; d <= actualDays; d++) {
        const x1 = dayLines[d - 1] + 2;
        const x2 = dayLines[d] - 2;
        names.forEach((name, row) => {
          const y1 = rowLines[row] + 2;
          const y2 = rowLines[row + 1] - 2;
          const off = cellHasContent(image, x1, y1, x2, y2);
          vacation[name][d] = off;
          if (off) vacationCount++;
        });
      }

      state.vacation = vacation;
      state.detectedDays = actualDays;
      state.detectedVacations = vacationCount;
      el.detectedDays.textContent = String(actualDays);
      el.detectedCells.textContent = String(vacationCount);
      el.generate.disabled = false;
      setStatus(actualDays === targetDays
        ? `已判讀 ${actualDays} 天，可生成排班`
        : `已判讀 ${actualDays}/${targetDays} 天，月底欄位可能未入鏡`);
      generate();
    }

    function findLines(image, axis) {
      const { width, height, data } = image;
      const size = axis === 'vertical' ? width : height;
      const span = axis === 'vertical' ? height : width;
      const threshold = span * (axis === 'vertical' ? 0.28 : 0.34);
      const scores = [];

      for (let i = 0; i < size; i++) {
        let score = 0;
        for (let j = 0; j < span; j++) {
          const x = axis === 'vertical' ? i : j;
          const y = axis === 'vertical' ? j : i;
          const idx = (y * width + x) * 4;
          if (isGridPixel(data[idx], data[idx + 1], data[idx + 2])) score++;
        }
        scores.push(score);
      }

      const lines = [];
      let start = -1;
      let weighted = 0;
      let total = 0;

      scores.forEach((score, i) => {
        if (score >= threshold) {
          if (start < 0) start = i;
          weighted += i * score;
          total += score;
        } else if (start >= 0) {
          lines.push(Math.round(weighted / total));
          start = -1;
          weighted = 0;
          total = 0;
        }
      });

      if (start >= 0) lines.push(Math.round(weighted / total));
      return mergeClose(lines, 3);
    }

    function isGridPixel(r, g, b) {
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const grayLine = max - min < 18 && max < 165;
      const darkLine = r < 90 && g < 90 && b < 90;
      const selectedBlue = b > 150 && r < 120 && g < 180;
      return grayLine || darkLine || selectedBlue;
    }

    function mergeClose(values, distance) {
      const merged = [];
      values.forEach(value => {
        const last = merged[merged.length - 1];
        if (last != null && value - last <= distance) {
          merged[merged.length - 1] = Math.round((last + value) / 2);
        } else {
          merged.push(value);
        }
      });
      return merged;
    }

    function pickDayLines(lines, targetDays) {
      if (lines.length < 4) return [];
      const gaps = [];
      for (let i = 0; i < lines.length - 1; i++) {
        const gap = lines[i + 1] - lines[i];
        if (gap >= 24 && gap <= 115) gaps.push(gap);
      }
      const typical = median(gaps) || 55;
      let best = [];

      for (let start = 0; start < lines.length - 1; start++) {
        const run = [lines[start]];
        for (let i = start; i < lines.length - 1; i++) {
          const gap = lines[i + 1] - lines[i];
          if (gap >= typical * 0.68 && gap <= typical * 1.33) {
            run.push(lines[i + 1]);
          } else {
            break;
          }
        }
        if (run.length > best.length) best = run;
      }

      if (best.length >= targetDays + 1) return best.slice(0, targetDays + 1);

      for (let start = 0; start < lines.length - 1; start++) {
        const gap = lines[start + 1] - lines[start];
        if (Math.abs(gap - typical) <= typical * 0.25) {
          return lines.slice(start, Math.min(lines.length, start + targetDays + 1));
        }
      }
      return lines.slice(1, Math.min(lines.length, targetDays + 2));
    }

    function pickWorkerRows(lines, count) {
      if (lines.length >= count + 1) return lines.slice(lines.length - count - 1);
      return lines.slice(Math.max(0, lines.length - count - 1));
    }

    function median(values) {
      if (!values.length) return 0;
      const sorted = [...values].sort((a, b) => a - b);
      return sorted[Math.floor(sorted.length / 2)];
    }

    function cellHasContent(image, x1, y1, x2, y2) {
      const { width, height, data } = image;
      const left = Math.max(0, Math.min(width - 1, Math.floor(x1)));
      const right = Math.max(0, Math.min(width - 1, Math.ceil(x2)));
      const top = Math.max(0, Math.min(height - 1, Math.floor(y1)));
      const bottom = Math.max(0, Math.min(height - 1, Math.ceil(y2)));
      let ink = 0;
      let area = 0;

      for (let y = top; y <= bottom; y++) {
        for (let x = left; x <= right; x++) {
          area++;
          const idx = (y * width + x) * 4;
          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];
          const max = Math.max(r, g, b);
          const min = Math.min(r, g, b);
          const dark = r < 95 && g < 95 && b < 95;
          const red = r > 135 && g < 120 && b < 120;
          const coloredInk = max - min > 80 && r + g + b < 560;
          if (dark || red || coloredInk) ink++;
        }
      }

      return ink > Math.max(7, area * 0.006);
    }

    function generate() {
      if (!state.vacation) return;
      const names = people();
      const year = Number(el.year.value);
      const month = Number(el.month.value);
      const days = state.detectedDays;
      const counts = {};
      const totals = {};
      const schedule = [];
      const lastTaskOwner = {};

      names.forEach(name => {
        counts[name] = [0, 0, 0, 0, 0];
        totals[name] = 0;
      });

      for (let d = 1; d <= days; d++) {
        const available = names.filter(name => !state.vacation[name][d]);
        const assignment = available.length ? chooseAssignment(available, counts, totals, lastTaskOwner, d) : [null, null, null, null, null];
        assignment.forEach((name, idx) => {
          if (!name) return;
          counts[name][idx]++;
          totals[name]++;
          lastTaskOwner[idx] = name;
        });
        schedule.push({
          day: d,
          date: new Date(year, month - 1, d),
          available,
          assignment
        });
      }

      state.schedule = { schedule, counts, totals };
      renderSchedule(state.schedule);
    }

    function chooseAssignment(available, counts, totals, lastTaskOwner, day) {
      const assignments = [];
      buildAssignments([], available, assignments);
      const minDaily = Math.floor(5 / available.length);
      const maxDaily = Math.ceil(5 / available.length);
      let best = null;
      let bestScore = Infinity;

      assignments.forEach(candidate => {
        const daily = Object.fromEntries(available.map(name => [name, 0]));
        candidate.forEach(name => daily[name]++);
        const balanced = Object.values(daily).every(value => value >= minDaily && value <= maxDaily);
        if (!balanced) return;

        let score = 0;
        candidate.forEach((name, task) => {
          if (lastTaskOwner[task] === name) score += available.length > 1 ? 40 : 2;
          score += counts[name][task] * 9;
          score += totals[name] * 1.4;
          score += ((available.indexOf(name) + day + task) % available.length) * 0.01;
        });

        if (score < bestScore) {
          bestScore = score;
          best = candidate;
        }
      });

      return best || assignments[0];
    }

    function buildAssignments(current, available, output) {
      if (current.length === 5) {
        output.push([...current]);
        return;
      }
      available.forEach(name => {
        current.push(name);
        buildAssignments(current, available, output);
        current.pop();
      });
    }

    function renderSchedule(data) {
      const names = people();
      const year = Number(el.year.value);
      const month = Number(el.month.value);
      const tbody = el.schedule.querySelector('tbody');
      tbody.innerHTML = '';
      el.resultTitle.textContent = `${year} 年 ${month} 月夜班排班結果`;

      data.schedule.forEach(row => {
        const tr = document.createElement('tr');
        if (row.date.getDay() === 0 || row.date.getDay() === 6) tr.className = 'weekend';
        tr.append(cell(`${month}/${row.day}`));
        tr.append(cell(weekdays[row.date.getDay()]));
        row.assignment.forEach(name => {
          const td = document.createElement('td');
          if (name) {
            const badge = document.createElement('span');
            badge.className = `badge b${names.indexOf(name) % 4}`;
            badge.textContent = name;
            td.append(badge);
          } else {
            td.innerHTML = '<span class="empty">全休</span>';
          }
          tr.append(td);
        });
        tbody.append(tr);
      });

      el.summary.innerHTML = '';
      names.forEach(name => {
        const box = document.createElement('div');
        box.className = 'person';
        const detail = data.counts[name].map((count, idx) => `${idx + 1}: ${count}`).join('　');
        const offDays = Object.values(state.vacation[name]).filter(Boolean).length;
        box.innerHTML = `<b>${name}</b><div>工作總數：${data.totals[name]}</div><div>休假天數：${offDays}</div><div>${detail}</div>`;
        el.summary.append(box);
      });

      el.print.disabled = false;
      el.copy.disabled = false;
    }

    function cell(text) {
      const td = document.createElement('td');
      td.textContent = text;
      return td;
    }

    async function copyTable() {
      if (!state.schedule) return;
      const rows = [['日期', '星期', '工作事項1', '工作事項2', '工作事項3', '工作事項4', '工作事項5']];
      const month = Number(el.month.value);
      state.schedule.schedule.forEach(row => {
        rows.push([
          `${month}/${row.day}`,
          weekdays[row.date.getDay()],
          ...row.assignment.map(name => name || '全休')
        ]);
      });
      await navigator.clipboard.writeText(rows.map(row => row.join('\t')).join('\n'));
      setStatus('已複製，可貼到 Excel 或 Google 試算表');
    }

    function setStatus(message) {
      el.status.textContent = message;
    }
  </script>
</body>
