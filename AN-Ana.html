        // 本地記憶歷史紀錄（存在瀏覽器裡）

        // 分頁切換
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // 拖拽+選取圖片
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const previewArea = document.getElementById('previewArea');

        uploadArea.addEventListener('click', () => imageInput.click());
        uploadArea.addEventListener('dragover', e=>{e.preventDefault();uploadArea.style.background='#e8f0fe'});
        uploadArea.addEventListener('dragleave', ()=>uploadArea.style.background='#f8faff');
        uploadArea.addEventListener('drop', e=>{
            e.preventDefault();
            uploadArea.style.background='#f8faff';
            const file = e.dataTransfer.files[0];
            if(file&&file.type.startsWith('image/')) handleImage(file);
        });
        imageInput.addEventListener('change',e=>{
            const file = e.target.files[0];
            if(file) handleImage(file);
        });

        // OCR辨識圖片（純前端）
        function handleImage(file){
            const reader = new FileReader();
            reader.onload = async function(e){
                // 預覽圖片
                previewArea.innerHTML = `<img src="${e.target.result}" alt="公告圖片">`;
                ocrStatus.innerHTML = `<div class="ocr-loading">⏳ 正在OCR辨識文字(繁中+英文)，請稍候...</div>`;
                // 執行OCR
                try{
                    const res = await Tesseract.recognize(
                        e.target.result,
                        'chi_tra+eng', // 繁體中文 + 英文
                        {logger:m=>{
                            if(m.status==='recognizing text'){
                                ocrStatus.innerHTML = `<div class="ocr-loading">辨識進度：${Math.round(m.progress*100)}%</div>`;
                            }
                        }}
                    );
                    const ocrText = res.data.text.trim();
                    ocrStatus.innerHTML = `<div style="color:green;">✅ OCR辨識完成</div>`;
                    // 送入平台匹配
                    matchBestPlatform(ocrText);
                }catch(err){
                    ocrStatus.innerHTML = `<div style="color:red;">❌ OCR失敗，請換一張清晰圖片</div>`;
                    console.error(err);
                }
            }
            reader.readAsDataURL(file);
        }

        // 文字手動輸入處理
        function processText(){
            const text = document.getElementById('textInput').value.trim();
            if(!text){
                resultContent.innerHTML = `<p style="color:red;">請輸入公告文字</p>`;
                return;
            }
            matchBestPlatform(text);
        }

        // ========== 核心：智能權重匹配，自動找出「最相關」平台 ==========
        function matchBestPlatform(rawText){
            const text = rawText.toLowerCase();
            let scoredPlatforms = [];

            // 給每個平台計算匹配分數
            platformData.forEach(platform => {
                let score = 0;
                platform.keywords.forEach(keyword => {
                    if (text.includes(keyword.toLowerCase())) {
                        // 關鍵字越長，匹配分數越高
                        score += keyword.length;
                    }
                });
                if (score > 0) {
                    scoredPlatforms.push({ platform, score });
                }
            });

            // 按分數從高到低排序，取最相關的前1個
            scoredPlatforms.sort((a, b) => b.score - a.score);

            let html = '';
            if (scoredPlatforms.length > 0) {
                const top = scoredPlatforms[0];
                const p = top.platform;
                html += `
                <div class="result-item">
                    <strong>✅ 最相關平台：</strong>${p.platform}
                    <span class="score-tag">匹配分數：${top.score}</span><br>
                    <strong>📌 備註說明：</strong>${p.note || '無備註'}
                </div>
                <hr style="margin:12px 0;border:0;border-top:1px solid #eee;">
                `;
                saveHistory(p.platform, rawText);
                html += `<div class="warn-tip">⚠️ 請手動確認：本次維護公告是否已發送過，避免重複公告</div>`;
            } else {
                html = `<p style="color:red;">❌ 無匹配平台，請檢查圖片清晰度或文字內容</p>`;
            }
            resultContent.innerHTML = html;
            renderHistory();
        }

        // 儲存本地紀錄（存在瀏覽器localStorage）
        function saveHistory(platform, content){
            const record = {
                time: new Date().toLocaleString(),
                platform: platform,
                content: content.substring(0,60)+(content.length>60?'...':'')
            };
            historyRecords.unshift(record);
            if(historyRecords.length>50) historyRecords.pop();
            localStorage.setItem('announce_history',JSON.stringify(historyRecords));
        }

        // 渲染紀錄
        function renderHistory(){
            const list = document.getElementById('historyList');
            if(historyRecords.length===0){
                list.innerHTML = `<p style="color:#999;">暫無紀錄</p>`;
                return;
            }
            list.innerHTML = historyRecords.map(r=>`
                <div class="history-item">
                    ${r.time}｜${r.platform}<br>
                    <span style="color:#666;font-size:13px;">${r.content}</span>
                </div>
            `).join('');
        }

        // 清空紀錄
        function clearHistory(){
            if(confirm('確定清空所有本地辨識紀錄？無法復原')){
                historyRecords = [];
                localStorage.removeItem('announce_history');
                renderHistory();
            }
        }

        // 初始化
        renderHistory();
    </script>
