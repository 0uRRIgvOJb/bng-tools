            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');

        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const previewArea = document.getElementById('previewArea');

        uploadArea.addEventListener('click', () => imageInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#e8f0fe';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '#f8faff';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#f8faff';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleImage(file);
            }
        });
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleImage(file);
        });

        function handleImage(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewArea.innerHTML = `<img src="${e.target.result}" alt="上传的图片">`;
                // 模拟识别（实际使用OCR，这里演示匹配逻辑）
                processText("（图片上传，模拟识别文字，实际需接入OCR服务）");
            }
            reader.readAsDataURL(file);
        }

        // 文字识别处理
        function processText() {
            const text = document.getElementById('textInput').value || "（无文字输入）";
            let matchedPlatforms = [];

            // 匹配平台
            platformData.forEach(platform => {
                const isMatch = platform.keywords.some(keyword => 
                    text.toLowerCase().includes(keyword.toLowerCase())
                );
                if (isMatch) {
                    matchedPlatforms.push(platform);
                }
            });

            // 生成结果
            let resultHtml = '';
            if (matchedPlatforms.length > 0) {
                matchedPlatforms.forEach(platform => {
                    resultHtml += `
                        <div class="result-item">
                            <strong>识别平台：</strong>${platform.platform}<br>
                            <strong>备注信息：</strong>${platform.note || '无备注'}
                        </div>
                        <hr style="margin:10px 0; border: none; border-top:1px solid #eee;">
                    `;
                    // 保存记录
                    saveHistory(platform.platform, text);
                });
                resultHtml += `<p style="color:green;">✅ 已匹配到以上平台，请确认公告内容是否已发送</p>`;
            } else {
                resultHtml = `<p style="color:red;">❌ 未匹配到任何平台，请检查输入内容或图片是否清晰</p>`;
            }

            document.getElementById('resultContent').innerHTML = resultHtml;
            renderHistory();
        }

        // 保存历史记录
        function saveHistory(platform, content) {
            const record = {
                id: Date.now(),
                platform: platform,
                content: content.substring(0, 50) + (content.length > 50 ? '...' : ''),
                time: new Date().toLocaleString()
            };
            historyRecords.unshift(record);
            if (historyRecords.length > 50) historyRecords.pop(); // 只保留最近50条
            localStorage.setItem('公告记录', JSON.stringify(historyRecords));
        }

                return;
            }
            listEl.innerHTML = historyRecords.map(record => `
                <div class="history-item">
                    <span>${record.time} - ${record.platform}</span>
                    <span>${record.content}</span>
                </div>
            `).join('');
        }

        // 清空历史
        function clearHistory() {
            if (confirm('确定要清空所有记录吗？')) {
                historyRecords = [];
                localStorage.removeItem('公告记录');
                renderHistory();
            }
        }

        // 初始化渲染历史
        renderHistory();
    </script>
</body>
</html>
