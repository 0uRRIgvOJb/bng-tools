<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>BNG Tools Center</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f1720;
    color:white;
    text-align:center;
}

h1{
    margin-top:60px;
    font-size:48px;
}

.subtitle{
    color:#8aa0b5;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    max-width:900px;
    margin:auto;
}

.card{
    background:#1b2532;
    padding:30px;
    border-radius:14px;
    transition:0.2s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-5px);
    background:#243244;
}

a{
    text-decoration:none;
    color:white;
    font-size:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>BNG Tools Center</h1>
<div class="subtitle">这是首页</div>

<div id="apps" class="grid"></div>

<script>

const USER="OuRRlgvOJb"
const REPO="bng-tools"

fetch(`https://api.github.com/repos/${USER}/${REPO}/contents`)
.then(r=>r.json())
.then(data=>{

let html=""

data.forEach(file=>{

if(file.name.endsWith(".html") && file.name!=="index.html"){

let name=file.name.replace(".html","")

html+=`
<div class="card">
<a href="./${file.name}">
${name}
</a>
</div>
`

}

})

document.getElementById("apps").innerHTML=html

})

</script>

</body>
</html>
