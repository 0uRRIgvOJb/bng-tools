<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首页</title>

<style>

body{
  margin:0;
  background:#0f1720;
  color:#fff;
  font-family:Arial,"Microsoft JhengHei",sans-serif;
  text-align:center;
}

h1{
  margin-top:40px;
  font-size:42px;
}

#time{
  margin-top:10px;
  font-size:18px;
  color:#9fb3c8;
}

#status{
  margin:15px auto;
  color:#8fa6bb;
}

/* 左右布局 */

.container{
  display:flex;
  justify-content:center;
  gap:40px;
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
}

.section{
  flex:1;
}

.section h2{
  margin-bottom:20px;
  border-bottom:1px solid #2a3b4f;
  padding-bottom:10px;
}

/* 卡片 */

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
}

.card{
  background:#1b2532;
  padding:20px;
  border-radius:10px;
  transition:.2s;
}

.card:hover{
  background:#243244;
  transform:translateY(-3px);
}

a{
  color:white;
  text-decoration:none;
  font-size:18px;
  font-weight:bold;
}

.error{
  color:#ff9b9b;
  padding:10px;
}

</style>

</head>

<body>

<h1>首页</h1>

<div id="time"></div>

<div id="status">正在读取网页列表...</div>

<div class="container">

  <div class="section">
    <h2>工具</h2>
    <div id="tools" class="grid"></div>
  </div>

  <div class="section">
    <h2>其他</h2>
    <div id="others" class="grid"></div>
  </div>

</div>


<script>

/* 时间 */

function updateTime(){

  const now = new Date();

  const text =
    now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,"0") + "-" +
    String(now.getDate()).padStart(2,"0") + " " +
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0") + ":" +
    String(now.getSeconds()).padStart(2,"0");

  document.getElementById("time").textContent = text;

}

setInterval(updateTime,1000);
updateTime();



/* 读取 pages.json */

async function loadPages(){

  const status = document.getElementById("status");
  const tools = document.getElementById("tools");
  const others = document.getElementById("others");

  try{

    const res = await fetch("./pages.json?v=" + Date.now(),{
      cache:"no-store"
    });

    if(!res.ok){
      throw new Error("pages.json 读取失败");
    }

    const data = await res.json();

    status.textContent = "";

    data.forEach(item=>{

      const html = `
      <div class="card">
        <a href="./${item.file}">${item.name}</a>
      </div>
      `;

      if(item.type === "工具"){
        tools.innerHTML += html;
      }else{
        others.innerHTML += html;
      }

    });

  }catch(err){

    status.innerHTML = `<div class="error">读取失败：${err.message}</div>`;

  }

}

loadPages();

</script>

</body>

</html>
