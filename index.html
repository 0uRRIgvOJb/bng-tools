<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线计算器 - 工具中心</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        dark: {
                            100: '#1e293b',
                            200: '#172033',
                            300: '#0f172a',
                            400: '#0c1322'
                        },
                        light: {
                            100: '#f8fafc',
                            200: '#e2e8f0',
                            300: '#94a3b8',
                            400: '#64748b'
                        }
                    }
                }
            },
            darkMode: 'class'
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-effect {
                @apply bg-opacity-70 backdrop-blur-md;
            }
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            @apply bg-dark-200 dark:bg-dark-300;
        }
        
        ::-webkit-scrollbar-thumb {
            @apply bg-dark-100 dark:bg-dark-400 rounded-full;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            @apply bg-secondary;
        }
        
        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
        
        /* 计算器按钮动画 */
        .calc-btn {
            transition: all 0.2s ease;
        }
        
        .calc-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-dark-300 to-dark-400 dark:from-dark-400 dark:to-dark-300 min-h-screen text-light-100 dark:text-light-200 transition-colors duration-300">
    <!-- 顶部导航栏 -->
    <header class="sticky top-0 z-50 bg-dark-200 dark:bg-dark-300 glass-effect border-b border-dark-100 dark:border-dark-400 shadow-md">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <!-- Logo 和返回链接 -->
            <div class="flex items-center space-x-2">
                <a href="index.html" class="flex items-center space-x-2">
                    <div class="w-10 h-10 rounded-lg bg-gradient-to-r from-primary to-blue-400 flex items-center justify-center shadow-lg">
                        <i class="fa fa-wrench text-white text-xl"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-white">工具中心</h1>
                </a>
            </div>
            
            <!-- 右侧操作区 -->
            <div class="flex items-center space-x-4">
                <!-- 主题切换 -->
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-dark-100 dark:hover:bg-dark-400 transition-colors">
                    <i class="fa fa-moon-o dark:hidden text-xl"></i>
                    <i class="fa fa-sun-o hidden dark:block text-yellow-300 text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 页面标题 -->
        <section class="mb-8">
            <div class="flex items-center space-x-3">
                <a href="index.html" class="text-light-300 hover:text-primary transition-colors">
                    <i class="fa fa-arrow-left text-xl"></i>
                </a>
                <h2 class="text-3xl font-bold">在线计算器</h2>
            </div>
            <p class="text-light-300 mt-2">一个简单易用的在线计算器</p>
        </section>

        <!-- 计算器主体 -->
        <section class="max-w-md mx-auto bg-dark-200 dark:bg-dark-300 rounded-xl shadow-lg border border-dark-100 dark:border-dark-400 overflow-hidden">
            <!-- 显示屏 -->
            <div class="p-6 bg-dark-100 dark:bg-dark-400">
                <div class="text-right">
                    <div id="calc-history" class="text-light-300 text-sm mb-1 min-h-[20px]"></div>
                    <div id="calc-display" class="text-4xl font-mono font-bold text-white overflow-x-auto whitespace-nowrap"></div>
                </div>
            </div>
            
            <!-- 按钮区 -->
            <div class="p-4 grid grid-cols-4 gap-3">
                <!-- 第一行 -->
                <button class="calc-btn bg-red-500 hover:bg-red-600 text-white py-4 rounded-lg font-medium" data-action="clear">
                    C
                </button>
                <button class="calc-btn bg-red-500 hover:bg-red-600 text-white py-4 rounded-lg font-medium" data-action="clear-entry">
                    CE
                </button>
                <button class="calc-btn bg-dark-100 dark:bg-dark-400 hover:bg-secondary py-4 rounded-lg font-medium" data-action="backspace">
                    <i class="fa fa-backspace"></i>
                </button>
                <button class="calc-btn bg-primary hover:bg-blue-600 text-white py-4 rounded-lg font-medium" data-value="/">
                    ÷
                </button>
                
                <!-- 第二行 -->
                <button class="calc-btn bg-dark-100 dark:bg-dark-400 hover:bg-secondary py-4 rounded-lg font-medium" data-value="7">
                    7
                </button>
                <button class="calc-btn bg-dark-100 dark:bg-dark-400 hover:bg-secondary py-4 rounded-lg font-medium" data-value="8">
                    8
                </button>
                <button class="calc-btn bg-dark-100 dark:bg-dark-400 hover:bg-secondary py-4 rounded-lg font-medium" data-value="9">
                    9
                </button>
                <button class="calc-btn bg-primary hover:bg-blue-600 text-white py-4 rounded-lg font-medium" data-value="*">
                    ×
                </button>
                
                <!-- 第三行 -->
                <button class="calc-btn bg-dark-100 dark:bg-dark-400 hover:bg-secondary py-4 rounded-lg font-medium" data-value="4">
                    4
                </button>
                <button class="calc-btn bg-dark-100 dark:bg-dark-400 hover:bg-secondary py-4 rounded-lg font-medium" data-value="5">
                    5
                </button>
                <button class="calc-btn bg-dark-100 dark:bg-dark-400 hover:bg-secondary py-4 rounded-lg font-medium" data-value="6">
                    6
                </button>
                <button class="calc-btn bg-primary hover:bg-blue-600 text-white py-4 rounded-lg font-medium" data-value="-">
                    −
                </button>
                
                <!-- 第四行 -->
                <button class="calc-btn bg-dark-100 dark:bg-dark-400 hover:bg-secondary py-4 rounded-lg font-medium" data-value="1">
                    1
                </button>
                <button class="calc-btn bg-dark-100 dark:bg-dark-400 hover:bg-secondary py-4 rounded-lg font-medium" data-value="2">
                    2
                </button>
                <button class="calc-btn bg-dark-100 dark:bg-dark-400 hover:bg-secondary py-4 rounded-lg font-medium" data-value="3">
                    3
                </button>
                <button class="calc-btn bg-primary hover:bg-blue-600 text-white py-4 rounded-lg font-medium" data-value="+">
                    +
                </button>
                
                <!-- 第五行 -->
                <button class="calc-btn bg-dark-100 dark:bg-dark-400 hover:bg-secondary py-4 rounded-lg font-medium col-span-2" data-value="0">
                    0
                </button>
                <button class="calc-btn bg-dark-100 dark:bg-dark-400 hover:bg-secondary py-4 rounded-lg font-medium" data-value=".">
                    .
                </button>
                <button class="calc-btn bg-green-500 hover:bg-green-600 text-white py-4 rounded-lg font-medium" data-action="calculate">
                    =
                </button>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="bg-dark-200 dark:bg-dark-300 border-t border-dark-100 dark:border-dark-400 py-6 mt-16">
        <div class="container mx-auto px-4 text-center">
            <p class="text-light-300 text-sm">© 2026 工具中心. 保留所有权利.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        // DOM 元素
        const display = document.getElementById('calc-display');
        const history = document.getElementById('calc-history');
        const themeToggle = document.getElementById('theme-toggle');
        const buttons = document.querySelectorAll('.calc-btn');
        
        // 计算器状态
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let resetOnNextInput = false;
        
        // 设置主题
        function setupTheme() {
            const savedTheme = localStorage.getItem('theme');
            
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        
        // 切换主题
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
        
        // 更新显示屏
        function updateDisplay() {
            display.textContent = currentInput;
            
            if (previousInput && operator) {
                const operatorSymbol = {
                    '+': '+',
                    '-': '−',
                    '*': '×',
                    '/': '÷'
                }[operator];
                
                history.textContent = `${previousInput} ${operatorSymbol}`;
            } else {
                history.textContent = '';
            }
        }
        
        // 输入数字或小数点
        function inputValue(value) {
            if (resetOnNextInput) {
                currentInput = '0';
                resetOnNextInput = false;
            }
            
            if (value === '.') {
                if (currentInput.includes('.')) return;
                currentInput += '.';
            } else {
                currentInput = currentInput === '0' ? value : currentInput + value;
            }
            
            updateDisplay();
        }
        
        // 处理运算符
        function inputOperator(op) {
            if (operator && !resetOnNextInput) {
                calculate();
            }
            
            previousInput = currentInput;
            operator = op;
            resetOnNextInput = true;
            
            updateDisplay();
        }
        
        // 计算结果
        function calculate() {
            if (!operator || resetOnNextInput) return;
            
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            let result;
            
            if (isNaN(prev) || isNaN(current)) return;
            
            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        result = '错误';
                    } else {
                        result = prev / current;
                    }
                    break;
                default:
                    return;
            }
            
            // 处理小数位数
            if (typeof result === 'number') {
                result = Math.round(result * 1000000000000) / 1000000000000;
            }
            
            history.textContent = `${previousInput} ${
                operator === '+' ? '+' : 
                operator === '-' ? '−' : 
                operator === '*' ? '×' : '÷'
            } ${currentInput} =`;
            
            currentInput = result.toString();
            operator = null;
            previousInput = '';
            resetOnNextInput = true;
            
            updateDisplay();
        }
        
        // 清除所有
        function clearAll() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            resetOnNextInput = false;
            updateDisplay();
        }
        
        // 清除当前输入
        function clearEntry() {
            currentInput = '0';
            updateDisplay();
        }
        
        // 退格
        function backspace() {
            if (resetOnNextInput) {
                currentInput = '0';
                resetOnNextInput = false;
                updateDisplay();
                return;
            }
            
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            
            updateDisplay();
        }
        
        // 处理按钮点击
        function handleButtonClick(event) {
            const button = event.target;
            const value = button.dataset.value;
            const action = button.dataset.action;
            
            if (value) {
                if (['+', '-', '*', '/'].includes(value)) {
                    inputOperator(value);
                } else {
                    inputValue(value);
                }
            } else if (action) {
                switch (action) {
                    case 'clear':
                        clearAll();
                        break;
                    case 'clear-entry':
                        clearEntry();
                        break;
                    case 'backspace':
                        backspace();
                        break;
                    case 'calculate':
                        calculate();
                        break;
                }
            }
        }
        
        // 处理键盘输入
        function handleKeyPress(event) {
            const key = event.key;
            
            if (/[0-9.]/.test(key)) {
                event.preventDefault();
                inputValue(key);
            } else if (['+', '-', '*', '/'].includes(key)) {
                event.preventDefault();
                inputOperator(key);
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape') {
                event.preventDefault();
                clearAll();
            } else if (key === 'Backspace') {
                event.preventDefault();
                backspace();
            }
        }
        
        // 初始化
        function init() {
            // 设置主题
            setupTheme();
            
            // 更新显示屏
            updateDisplay();
            
            // 事件监听
            buttons.forEach(button => {
                button.addEventListener('click', handleButtonClick);
            });
            
            themeToggle.addEventListener('click', toggleTheme);
            
            // 键盘支持
            document.addEventListener('keydown', handleKeyPress);
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
