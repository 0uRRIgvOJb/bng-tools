<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工具中心 - 首頁</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css"
    rel="stylesheet"
  />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            dark: {
              100: '#1e293b',
              200: '#172033',
              300: '#0f172a',
              400: '#0c1322'
            },
            light: {
              100: '#f8fafc',
              200: '#e2e8f0',
              300: '#94a3b8',
              400: '#64748b'
            }
          },

          boxShadow: {
            card: '0 8px 24px rgba(0,0,0,0.22)',
            cardHover: '0 14px 34px rgba(0,0,0,0.32)'
          }
        }
      },

      darkMode: 'class'
    };
  </script>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 999px;
    }

    .glass {
      background: rgba(15, 23, 42, 0.78);
      backdrop-filter: blur(14px);
    }

    .card {
      animation: slideUp 0.35s ease both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .skeleton {
      background: linear-gradient(
        90deg,
        #172033 25%,
        #1e293b 50%,
        #172033 75%
      );

      background-size: 200% 100%;
      animation: loading 1.2s infinite;
    }

    @keyframes loading {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-dark-300 to-dark-400 text-light-100">

  <!-- HEADER -->
  <header class="sticky top-0 z-50 glass border-b border-white/5">
    <div class="max-w-7xl mx-auto px-5 py-3 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-blue-500 flex items-center justify-center shadow-lg">
          <i class="fa fa-wrench text-white text-xl"></i>
        </div>

        <h1 class="text-2xl font-bold text-white">
          工具中心
        </h1>
      </div>

      <button
        id="theme-toggle"
        class="w-10 h-10 rounded-full hover:bg-white/10 transition"
      >
        <i class="fa fa-sun-o text-yellow-300 text-xl"></i>
      </button>

    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-7xl mx-auto px-5 py-10">

    <!-- TITLE -->
    <section class="text-center mb-12">

      <h2 class="text-4xl md:text-5xl font-black tracking-tight text-white mb-5">
        歡迎使用工具中心
      </h2>

      <div
        id="time"
        class="text-light-300 font-mono text-base md:text-lg"
      ></div>

    </section>

    <!-- SEARCH -->
    <section class="max-w-2xl mx-auto mb-10">

      <div class="relative">

        <input
          id="search-input"
          type="text"
          placeholder="搜尋工具或功能..."
          class="w-full h-14 rounded-2xl bg-dark-200 border border-white/5 px-5 pr-14 text-lg text-white placeholder:text-light-400 outline-none focus:ring-2 focus:ring-blue-500 transition"
        />

        <button
          id="search-button"
          class="absolute right-4 top-1/2 -translate-y-1/2 text-light-300 hover:text-blue-400 transition"
        >
          <i class="fa fa-search text-xl"></i>
        </button>

      </div>

      <div
        id="search-results-info"
        class="hidden mt-3 text-center text-light-300 text-sm"
      ></div>

    </section>

    <!-- CATEGORY -->
    <section class="mb-10 overflow-x-auto">
      <div
        id="category-container"
        class="flex gap-3 pb-2"
      ></div>
    </section>

    <!-- CARDS -->
    <section>

      <div
        id="cards-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
      ></div>

      <!-- LOADING -->
      <div
        id="loading-state"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
      >

        <div class="skeleton h-32 rounded-2xl"></div>
        <div class="skeleton h-32 rounded-2xl"></div>
        <div class="skeleton h-32 rounded-2xl"></div>
        <div class="skeleton h-32 rounded-2xl"></div>

      </div>

      <!-- ERROR -->
      <div
        id="error-state"
        class="hidden text-center py-16"
      >

        <i class="fa fa-exclamation-triangle text-yellow-400 text-6xl mb-5"></i>

        <h3 class="text-2xl font-bold mb-2">
          載入失敗
        </h3>

        <p class="text-light-300 mb-6">
          無法讀取 pages.json，請確認檔案是否存在
        </p>

        <button
          id="retry-button"
          class="px-6 py-3 rounded-xl bg-blue-500 hover:bg-blue-600 text-white transition"
        >
          重新載入
        </button>

      </div>

      <!-- EMPTY -->
      <div
        id="empty-state"
        class="hidden text-center py-16"
      >

        <i class="fa fa-search text-light-300 text-6xl mb-5"></i>

        <h3 class="text-2xl font-bold mb-2">
          沒有找到結果
        </h3>

        <p class="text-light-300">
          請換個關鍵字或分類試試
        </p>

      </div>

    </section>

  </main>

  <!-- FOOTER -->
  <footer class="border-t border-white/5 mt-16 py-5">

    <div class="max-w-7xl mx-auto px-5 flex flex-col md:flex-row items-center justify-between gap-3">

      <p class="text-light-300 text-sm">
        © 2026 工具中心. 保留所有權利.
      </p>

      <div class="flex gap-4">

        <a
          href="#"
          target="_blank"
          rel="noopener noreferrer"
          class="text-light-300 hover:text-blue-400 transition"
        >
          <i class="fa fa-github text-xl"></i>
        </a>

        <a
          href="#"
          target="_blank"
          rel="noopener noreferrer"
          class="text-light-300 hover:text-blue-400 transition"
        >
          <i class="fa fa-envelope text-xl"></i>
        </a>

      </div>

    </div>

  </footer>

  <script>

    const timeElement = document.getElementById('time');

    const searchInput = document.getElementById('search-input');

    const searchButton = document.getElementById('search-button');

    const searchResultsInfo = document.getElementById('search-results-info');

    const categoryContainer = document.getElementById('category-container');

    const cardsContainer = document.getElementById('cards-container');

    const loadingState = document.getElementById('loading-state');

    const errorState = document.getElementById('error-state');

    const emptyState = document.getElementById('empty-state');

    const retryButton = document.getElementById('retry-button');

    const themeToggle = document.getElementById('theme-toggle');

    let pagesData = [];

    let filteredData = [];

    let currentCategory = 'all';

    let currentSearch = '';

    const TYPE_COLORS = [
      'blue',
      'purple',
      'emerald',
      'amber',
      'rose',
      'cyan',
      'pink',
      'indigo',
      'orange',
      'teal'
    ];

    function updateTime() {

      const now = new Date();

      const y = now.getFullYear();

      const m = String(now.getMonth() + 1).padStart(2, '0');

      const d = String(now.getDate()).padStart(2, '0');

      const h = String(now.getHours()).padStart(2, '0');

      const min = String(now.getMinutes()).padStart(2, '0');

      const s = String(now.getSeconds()).padStart(2, '0');

      timeElement.textContent =
        `${y}/${m}/${d} ${h}:${min}:${s} [GMT+8]`;
    }

    function getTypes() {

      return [
        ...new Set(
          pagesData
            .map(item => item.type)
            .filter(Boolean)
        )
      ];
    }

    function getTypeColor(type) {

      if (type === 'all') return 'blue';

      const types = getTypes();

      const index = types.indexOf(type);

      return TYPE_COLORS[index % TYPE_COLORS.length];
    }

    function getColorClass(type, active = false) {

      const color = getTypeColor(type);

      const colors = {

        blue: active
          ? 'bg-blue-500 text-white shadow-lg shadow-blue-500/20'
          : 'bg-blue-500/15 text-blue-300 hover:bg-blue-500/25',

        purple: active
          ? 'bg-purple-500 text-white shadow-lg shadow-purple-500/20'
          : 'bg-purple-500/15 text-purple-300 hover:bg-purple-500/25',

        emerald: active
          ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/20'
          : 'bg-emerald-500/15 text-emerald-300 hover:bg-emerald-500/25',

        amber: active
          ? 'bg-amber-500 text-white shadow-lg shadow-amber-500/20'
          : 'bg-amber-500/15 text-amber-300 hover:bg-amber-500/25',

        rose: active
          ? 'bg-rose-500 text-white shadow-lg shadow-rose-500/20'
          : 'bg-rose-500/15 text-rose-300 hover:bg-rose-500/25',

        cyan: active
          ? 'bg-cyan-500 text-white shadow-lg shadow-cyan-500/20'
          : 'bg-cyan-500/15 text-cyan-300 hover:bg-cyan-500/25',

        pink: active
          ? 'bg-pink-500 text-white shadow-lg shadow-pink-500/20'
          : 'bg-pink-500/15 text-pink-300 hover:bg-pink-500/25',

        indigo: active
          ? 'bg-indigo-500 text-white shadow-lg shadow-indigo-500/20'
          : 'bg-indigo-500/15 text-indigo-300 hover:bg-indigo-500/25',

        orange: active
          ? 'bg-orange-500 text-white shadow-lg shadow-orange-500/20'
          : 'bg-orange-500/15 text-orange-300 hover:bg-orange-500/25',

        teal: active
          ? 'bg-teal-500 text-white shadow-lg shadow-teal-500/20'
          : 'bg-teal-500/15 text-teal-300 hover:bg-teal-500/25'
      };

      return colors[color] || colors.blue;
    }

    function renderCategories() {

      const categories = ['all', ...getTypes()];

      categoryContainer.innerHTML = '';

      categories.forEach(type => {

        const button = document.createElement('button');

        const isActive = currentCategory === type;

        button.className = `
          whitespace-nowrap px-5 py-2 rounded-full font-semibold
          transition-all duration-200
          ${getColorClass(type, isActive)}
        `;

        button.textContent =
          type === 'all'
            ? '全部'
            : type;

        button.addEventListener('click', () => {

          currentCategory = type;

          renderCategories();

          filterData();
        });

        categoryContainer.appendChild(button);
      });
    }

    async function loadPages() {

      try {

        loadingState.classList.remove('hidden');

        errorState.classList.add('hidden');

        emptyState.classList.add('hidden');

        cardsContainer.classList.add('hidden');

        const response = await fetch(
          './pages.json?v=' + Date.now(),
          {
            cache: 'no-store'
          }
        );

        if (!response.ok) {
          throw new Error('pages.json 讀取失敗');
        }

        pagesData = await response.json();

        if (!Array.isArray(pagesData)) {
          throw new Error('pages.json 格式錯誤');
        }

        filteredData = [...pagesData];

        renderCategories();

        renderCards();

        loadingState.classList.add('hidden');

        cardsContainer.classList.remove('hidden');

      } catch (error) {

        console.error(error);

        loadingState.classList.add('hidden');

        cardsContainer.classList.add('hidden');

        errorState.classList.remove('hidden');
      }
    }

    function renderCards() {

      cardsContainer.innerHTML = '';

      if (filteredData.length === 0) {

        emptyState.classList.remove('hidden');

        return;
      }

      emptyState.classList.add('hidden');

      filteredData.forEach((item, index) => {

        const card = document.createElement('div');

        card.className = `
          card group rounded-2xl bg-dark-200 border border-white/5
          hover:border-white/10 shadow-card hover:shadow-cardHover
          hover:-translate-y-1 transition-all duration-300 overflow-hidden
        `;

        card.style.animationDelay = `${index * 0.04}s`;

        const tagsHtml = Array.isArray(item.tags)
          ? item.tags.map(tag => `
              <span class="text-xs px-2 py-1 rounded-full bg-white/5 text-light-300">
                ${escapeHtml(tag)}
              </span>
            `).join('')
          : '';

        card.innerHTML = `
          <a
            href="./${encodeURI(item.file)}"
            target="_blank"
            rel="noopener noreferrer"
            class="block p-6 h-full min-h-32"
          >

            <div class="flex items-start justify-between gap-4 mb-6">

              <h3 class="text-xl font-black text-white group-hover:text-blue-300 transition leading-snug">
                ${escapeHtml(item.name)}
              </h3>

              <span class="shrink-0 text-xs px-3 py-1 rounded-full font-semibold ${getColorClass(item.type, false)}">
                ${escapeHtml(item.type || '未分類')}
              </span>

            </div>

            ${
              tagsHtml
                ? `<div class="flex flex-wrap gap-2 mb-5">${tagsHtml}</div>`
                : ''
            }

            <div class="flex items-center text-light-300 text-sm group-hover:text-blue-300 transition">
              <span>查看詳情</span>

              <i class="fa fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
            </div>

          </a>
        `;

        cardsContainer.appendChild(card);
      });
    }

    function filterData() {

      const keyword = currentSearch.toLowerCase();

      filteredData = pagesData.filter(item => {

        const matchCategory =
          currentCategory === 'all'
          || item.type === currentCategory;

        const matchSearch =
          !keyword
          || String(item.name || '')
              .toLowerCase()
              .includes(keyword)

          || String(item.type || '')
              .toLowerCase()
              .includes(keyword)

          || String(item.file || '')
              .toLowerCase()
              .includes(keyword)

          || (
            Array.isArray(item.tags)
            && item.tags.some(tag =>
              String(tag)
                .toLowerCase()
                .includes(keyword)
            )
          );

        return matchCategory && matchSearch;
      });

      if (currentSearch) {

        searchResultsInfo.textContent =
          `找到 ${filteredData.length} 個與「${currentSearch}」相關的結果`;

        searchResultsInfo.classList.remove('hidden');

      } else {

        searchResultsInfo.classList.add('hidden');
      }

      renderCards();
    }

    function handleSearch() {

      currentSearch =
        searchInput.value.trim();

      filterData();
    }

    function clearSearchWhenEmpty() {

      if (searchInput.value.trim() === '') {

        currentSearch = '';

        filterData();
      }
    }

    function escapeHtml(text) {

      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function setupTheme() {

      const savedTheme =
        localStorage.getItem('theme');

      if (savedTheme === 'light') {

        document.documentElement.classList.remove('dark');

      } else {

        document.documentElement.classList.add('dark');
      }
    }

    function toggleTheme() {

      const isDark =
        document.documentElement.classList.toggle('dark');

      localStorage.setItem(
        'theme',
        isDark ? 'dark' : 'light'
      );
    }

    function init() {

      setupTheme();

      updateTime();

      setInterval(updateTime, 1000);

      loadPages();

      searchButton.addEventListener(
        'click',
        handleSearch
      );

      searchInput.addEventListener(
        'keydown',
        event => {

          if (event.key === 'Enter') {

            handleSearch();
          }
        }
      );

      searchInput.addEventListener(
        'input',
        clearSearchWhenEmpty
      );

      retryButton.addEventListener(
        'click',
        loadPages
      );

      themeToggle.addEventListener(
        'click',
        toggleTheme
      );
    }

    document.addEventListener(
      'DOMContentLoaded',
      init
    );

  </script>

</body>
</html>
