<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>首页</title>

<style>

body{
    margin:0;
    background:#0f1720;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:60px;
    font-size:40px;
}

#time{
    margin-top:10px;
    font-size:20px;
    color:#9fb3c8;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    max-width:900px;
    margin:50px auto;
}

.card{
    background:#1b2532;
    padding:25px;
    border-radius:12px;
    transition:0.2s;
}

.card:hover{
    background:#243244;
    transform:translateY(-5px);
}

a{
    color:white;
    text-decoration:none;
    font-size:20px;
}

</style>
</head>

<body>

<h1>首页</h1>

<div id="time"></div>

<div id="apps" class="grid"></div>

<script>

const USER="OuRRlgvOJb"
const REPO="bng-tools"

function updateTime(){

let now=new Date()

let t=
now.getFullYear()+"-"+
String(now.getMonth()+1).padStart(2,"0")+"-"+
String(now.getDate()).padStart(2,"0")+" "+
String(now.getHours()).padStart(2,"0")+":"+
String(now.getMinutes()).padStart(2,"0")+":"+
String(now.getSeconds()).padStart(2,"0")

document.getElementById("time").innerText=t

}

setInterval(updateTime,1000)
updateTime()

fetch(`https://api.github.com/repos/${USER}/${REPO}/contents`)
.then(r=>r.json())
.then(data=>{

let html=""

data.forEach(file=>{

if(file.name.endsWith(".html") && file.name!=="index.html"){

let name=file.name.replace(".html","")

html+=`
<div class="card">
<a href="./${file.name}">
${name}
</a>
</div>
`

}

})

document.getElementById("apps").innerHTML=html

})

</script>

</body>
</html>
