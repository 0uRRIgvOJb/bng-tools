let historyRecords = JSON.parse(localStorage.getItem('announce_history') || '[]');

function startAnalyze() {
    const text = document.getElementById('textInput').value.trim();
    if (!text) {
        document.getElementById('resultContent').innerHTML = `<p style="color:red;">请输入公告内容</p>`;
        return;
    }

    const lower = text.toLowerCase();
    let html = ``;

    // 找出最相关平台
    let scoredPlatforms = [];
    platformData.forEach(platform => {
        let score = 0;
        platform.keywords.forEach(keyword => {
            if (lower.includes(keyword.toLowerCase())) score += keyword.length;
        });
        if (score > 0) scoredPlatforms.push({ platform, score });
    });

    scoredPlatforms.sort((a, b) => b.score - a.score);

    if (scoredPlatforms.length > 0) {
        const top = scoredPlatforms[0];
        html += `
        <div class="result-item">
            <strong>🏆 最相关平台：</strong>${top.platform.platform} <span class="score-tag">匹配度 ${top.score}</span><br>
            <strong>📌 备注信息：</strong>${top.platform.note || '无'}
        </div><hr>`;
    }

    // 公告重点自动分析
    let isRolling = false;
    let isSingleGame = false;
    let isPartGame = false;
    let isAllGame = false;
    let isDone = false;
    let isExtended = false;
    let timeInfo = "未找到时间";

    if (lower.includes('滚动') || lower.includes('熱更新') || lower.includes('hotfix') || lower.includes('无停机')) isRolling = true;
    if (lower.includes('单一游戏') || lower.includes('单个游戏')) isSingleGame = true;
    else if (lower.includes('部分游戏') || lower.includes('部份游戏')) isPartGame = true;
    else if (lower.includes('全部') || lower.includes('所有') || lower.includes('全平台')) isAllGame = true;

    if (lower.includes('完成') || lower.includes('结束') || lower.includes('恢复') || lower.includes('开放')) isDone = true;
    if (lower.includes('延长') || lower.includes('延后') || lower.includes('更改时间') || lower.includes('延迟')) isExtended = true;

    const timeMatch = text.match(/(\d{1,2}[:：/]\d{1,2}).*?(\d{1,2}[:：/]\d{1,2})/) ||
                      text.match(/(\d+月\d+日.*?\d+:\d+).*?(\d+:\d+)/);
    if (timeMatch) timeInfo = timeMatch[1] + " ～ " + timeMatch[2];

    html += `
    <div class="analysis-box">
        <div class="analysis-title">🔍 公告重点自动分析</div>
        <div class="result-item">🔄 滚动/热更新：<strong>${isRolling ? '是' : '否'}</strong></div>
        <div class="result-item">🎮 影响范围：<strong>`;

    if (isSingleGame) html += '单一游戏';
    else if (isPartGame) html += '部分游戏';
    else if (isAllGame) html += '全部游戏/全平台';
    else html += '无法判断';

    html += `</strong></div>
        <div class="result-item">⏰ 维护时间：<strong>${timeInfo}</strong></div>
        <div class="result-item">✅ 维护状态：<strong>${isDone ? '已完成' : '维护中'}</strong></div>
        <div class="result-item">⏳ 时间延长/更改：<strong>${isExtended ? '是' : '否'}</strong></div>
    </div>`;

    document.getElementById('resultContent').innerHTML = html;
    saveHistory(scoredPlatforms.length > 0 ? scoredPlatforms[0].platform.platform : "未知", text);
    renderHistory();
}

function saveHistory(platform, content) {
    const record = {
        time: new Date().toLocaleString(),
        platform: platform,
        content: content.substring(0, 50) + '...'
    };
    historyRecords.unshift(record);
    if (historyRecords.length > 50) historyRecords.pop();
    localStorage.setItem('announce_history', JSON.stringify(historyRecords));
}

function renderHistory() {
    const list = document.getElementById('historyList');
    if (historyRecords.length === 0) {
        list.innerHTML = `<p style="color:#999;">暂无记录</p>`;
        return;
    }
    list.innerHTML = historyRecords.map(r => `
        <div class="history-item">${r.time}｜${r.platform}<br><small>${r.content}</small></div>
    `).join('');
}

function clearHistory() {
    if (confirm('确定清空所有记录？')) {
        historyRecords = [];
        localStorage.removeItem('announce_history');
        renderHistory();
    }
}
