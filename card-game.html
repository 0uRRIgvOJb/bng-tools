<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>卡牌冒险</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #0f1115 0%, #181c22 100%);
      color: #fff;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 12px 18px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid #2a2f37;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(6px);
    }

    .home-btn {
      border: none;
      background: #f7b500;
      color: #111;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    .container {
      max-width: 1250px;
      margin: 0 auto;
      padding: 20px;
    }

    .title {
      text-align: center;
      font-size: 48px;
      font-weight: 800;
      margin: 8px 0 22px;
      letter-spacing: 2px;
    }

    .top-status {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .mini-panel,
    .character-panel,
    .cards-panel,
    .log-panel,
    .shop-panel {
      background: #1b1f27;
      border: 1px solid #2d3440;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    .mini-panel {
      padding: 16px;
      text-align: center;
    }

    .mini-panel .label {
      color: #aeb7c6;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .mini-panel .value {
      font-size: 28px;
      font-weight: bold;
    }

    .battle-board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
    }

    .character-panel {
      padding: 20px;
      min-height: 320px;
    }

    .character-head {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hero-avatar {
      background: linear-gradient(135deg, #28476f, #2996db);
    }

    .monster-avatar {
      background: linear-gradient(135deg, #612727, #b93b3b);
    }

    .character-title h2 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .character-sub {
      color: #b6beca;
      font-size: 14px;
      line-height: 1.6;
    }

    .stat-row {
      margin-bottom: 18px;
    }

    .stat-top {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 16px;
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .bar-bg {
      width: 100%;
      height: 18px;
      border-radius: 999px;
      background: #313844;
      overflow: hidden;
    }

    .hp-bar {
      height: 100%;
      background: linear-gradient(90deg, #e24b4b, #ff7c7c);
      transition: width 0.25s ease;
    }

    .energy-bar {
      height: 100%;
      background: linear-gradient(90deg, #2aa8ff, #7cd5ff);
      transition: width 0.25s ease;
    }

    .shield-badge {
      display: inline-block;
      padding: 4px 10px;
      background: #224f85;
      color: #dcedff;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      vertical-align: middle;
    }

    .info-note {
      margin-top: 12px;
      background: #13171d;
      border: 1px solid #272d37;
      border-radius: 12px;
      padding: 12px;
      color: #d8dee8;
      line-height: 1.7;
      min-height: 82px;
    }

    .cards-panel,
    .log-panel,
    .shop-panel {
      padding: 20px;
    }

    .section-title {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .section-sub {
      color: #b6beca;
      font-size: 14px;
      margin-bottom: 16px;
      line-height: 1.7;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      background: linear-gradient(180deg, #262d38 0%, #1a2029 100%);
      border: 1px solid #38404f;
      border-radius: 16px;
      padding: 16px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card.attack {
      border-color: rgba(255, 100, 100, 0.45);
    }

    .card.defense {
      border-color: rgba(100, 190, 255, 0.45);
    }

    .card.heal {
      border-color: rgba(100, 255, 140, 0.45);
    }

    .card.special {
      border-color: rgba(184, 120, 255, 0.6);
      box-shadow: 0 0 0 1px rgba(184, 120, 255, 0.12) inset;
    }

    .card-top {
      margin-bottom: 12px;
    }

    .card-type {
      font-size: 13px;
      color: #aab4c5;
      margin-bottom: 8px;
    }

    .card-name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .card-desc {
      color: #e6ebf3;
      line-height: 1.7;
      font-size: 15px;
      min-height: 72px;
    }

    .card-cost {
      margin-top: 8px;
      color: #8fd8ff;
      font-weight: bold;
    }

    .card button,
    .action-btn,
    .shop-btn,
    .next-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    .card button {
      width: 100%;
      background: #3c8f47;
      color: #fff;
    }

    .card button:disabled,
    .action-btn:disabled,
    .shop-btn:disabled,
    .next-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .action-btn {
      min-width: 140px;
      background: #ff7a3d;
      color: #fff;
    }

    .action-btn.restart {
      background: #4d7cff;
    }

    .next-btn {
      background: #8c5bff;
      color: #fff;
    }

    .log-box {
      background: #10141a;
      border: 1px solid #262d37;
      border-radius: 14px;
      padding: 14px;
      min-height: 150px;
      white-space: pre-line;
      line-height: 1.75;
      color: #f0f3f8;
    }

    .shop-panel {
      display: none;
      margin-top: 20px;
    }

    .shop-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .shop-item {
      background: linear-gradient(180deg, #262d38 0%, #1d232c 100%);
      border: 1px solid #39404f;
      border-radius: 16px;
      padding: 14px;
    }

    .shop-item h3 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .shop-desc {
      color: #dbe1eb;
      line-height: 1.7;
      min-height: 72px;
      margin-bottom: 10px;
    }

    .shop-price {
      color: #ffd56a;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .shop-btn {
      width: 100%;
      background: #8c5bff;
      color: #fff;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 980px) {
      .top-status {
        grid-template-columns: repeat(2, 1fr);
      }

      .battle-board {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .top-status {
        grid-template-columns: 1fr;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="home-btn" onclick="goHome()">回首頁</button>
  </div>

  <div class="container">
    <div class="title">卡牌冒险</div>

    <div class="top-status">
      <div class="mini-panel">
        <div class="label">关卡</div>
        <div class="value"><span id="levelText">1</span>/50</div>
      </div>
      <div class="mini-panel">
        <div class="label">金币</div>
        <div class="value" id="goldText">0</div>
      </div>
      <div class="mini-panel">
        <div class="label">当前类型</div>
        <div class="value" id="stageTypeText">普通关</div>
      </div>
      <div class="mini-panel">
        <div class="label">剩余手牌</div>
        <div class="value" id="handCountText">0</div>
      </div>
    </div>

    <div class="battle-board">
      <div class="character-panel">
        <div class="character-head">
          <div class="avatar hero-avatar">🧙</div>
          <div class="character-title">
            <h2>主角</h2>
            <div class="character-sub">每回合会随机发牌。使用后的卡牌会从本回合手牌中消失。</div>
          </div>
        </div>

        <div class="stat-row">
          <div class="stat-top">
            <div>
              HP：<span id="playerHpText">100</span> / <span id="playerMaxHpText">100</span>
              <span class="shield-badge">护盾 <span id="playerShieldText">0</span></span>
            </div>
          </div>
          <div class="bar-bg">
            <div class="hp-bar" id="playerHpBar" style="width:100%"></div>
          </div>
        </div>

        <div class="stat-row">
          <div class="stat-top">
            <div>能量：<span id="energyText">5</span> / <span id="energyMaxText">5</span></div>
          </div>
          <div class="bar-bg">
            <div class="energy-bar" id="energyBar" style="width:100%"></div>
          </div>
        </div>

        <div class="info-note" id="heroInfoText">准备开始战斗。</div>
      </div>

      <div class="character-panel">
        <div class="character-head">
          <div class="avatar monster-avatar" id="monsterEmojiText">👾</div>
          <div class="character-title">
            <h2 id="monsterNameText">史莱姆</h2>
            <div class="character-sub" id="monsterTypeText">普通关</div>
          </div>
        </div>

        <div class="stat-row">
          <div class="stat-top">
            <div>HP：<span id="monsterHpText">30</span> / <span id="monsterMaxHpText">30</span></div>
          </div>
          <div class="bar-bg">
            <div class="hp-bar" id="monsterHpBar" style="width:100%"></div>
          </div>
        </div>

        <div class="stat-row">
          <div class="stat-top">
            <div>攻击力：<span id="monsterAtkText">8</span></div>
          </div>
        </div>

        <div class="info-note" id="monsterInfoText">怪物会在你结束回合后攻击。</div>
      </div>
    </div>

    <div class="cards-panel">
      <div class="section-title">手牌</div>
      <div class="section-sub">
        每回合随机发 4 张牌。用过的牌会立即消失，直到下一回合才重新随机发牌。
      </div>
      <div class="cards" id="cardsContainer"></div>

      <div class="actions">
        <button class="action-btn" id="endTurnBtn" onclick="endTurn()">结束回合</button>
        <button class="action-btn restart" onclick="restartGame()">重新开始</button>
        <button class="next-btn hidden" id="nextBattleBtn" onclick="afterBattleContinue()">继续</button>
      </div>
    </div>

    <div class="shop-panel" id="shopBox">
      <div class="section-title">商店</div>
      <div class="section-sub">每通过 3 关后进入商店。随机出现 3 个选项，你只能购买其中一个。</div>
      <div class="shop-options" id="shopOptions"></div>
    </div>

    <div class="log-panel">
      <div class="section-title">战斗纪录</div>
      <div class="log-box" id="logBox">游戏开始，准备战斗。</div>
    </div>
  </div>

  <script>
    const HOME_URL = "https://0urrigvojb.github.io/bng-tools/";

    const normalMonsters = [
      { name: "史莱姆", emoji: "🟢", note: "黏糊糊的基础怪物。" },
      { name: "骷髅兵", emoji: "💀", note: "常见亡灵，攻击直来直往。" },
      { name: "毒蜘蛛", emoji: "🕷️", note: "有压迫感的快速怪物。" },
      { name: "狼人", emoji: "🐺", note: "力量偏高的近战怪。" },
      { name: "暗影盗贼", emoji: "🗡️", note: "行动迅速，攻击偏高。" }
    ];

    const miniBossMonsters = [
      { name: "地牢守卫", emoji: "🛡️", note: "小BOSS，生命更厚。" },
      { name: "幽冥法师", emoji: "🔮", note: "小BOSS，威压更强。" },
      { name: "双刃兽人", emoji: "🪓", note: "小BOSS，攻击力更高。" }
    ];

    const bossMonsters = [
      { name: "深渊魔王", emoji: "😈", note: "大BOSS，血量和伤害都大幅提升。" },
      { name: "黑炎骑士", emoji: "🔥", note: "大BOSS，重甲与黑炎并存。" },
      { name: "终焉领主", emoji: "👹", note: "大BOSS，压迫感极强。" }
    ];

    let state = {};

    function goHome() {
      window.location.href = HOME_URL;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function chance(rate) {
      return Math.random() < rate;
    }

    function getStageType(level) {
      if (level % 10 === 0) return "大BOSS";
      if (level % 5 === 0) return "小BOSS";
      return "普通关";
    }

    function createMonster(level) {
      const type = getStageType(level);
      let pool = normalMonsters;

      if (type === "小BOSS") pool = miniBossMonsters;
      if (type === "大BOSS") pool = bossMonsters;

      const data = pool[randomInt(0, pool.length - 1)];

      let hp = 0;
      let atk = 0;

      if (type === "普通关") {
        hp = 30 + level * 8 + randomInt(0, 12);
        atk = 6 + Math.floor(level * 1.5) + Math.floor(state.player.maxHp * 0.025);
      } else if (type === "小BOSS") {
        hp = 78 + level * 12 + randomInt(8, 18);
        atk = 11 + Math.floor(level * 1.8) + Math.floor(state.player.maxHp * 0.035);
      } else {
        hp = 130 + level * 15 + randomInt(12, 30);
        atk = 15 + Math.floor(level * 2.2) + Math.floor(state.player.maxHp * 0.045);
      }

      return {
        type,
        name: data.name,
        emoji: data.emoji,
        note: data.note,
        hp,
        maxHp: hp,
        atk
      };
    }

    function getReward(level) {
      if (level % 10 === 0) return randomInt(10, 25);
      if (level % 5 === 0) return randomInt(5, 20);
      return randomInt(1, 10);
    }

    function initGame() {
      state = {
        level: 1,
        gold: 0,
        inShop: false,
        gameOver: false,
        awaitingNextAction: false,
        deckSizePerTurn: 4,
        hand: [],
        player: {
          hp: 100,
          maxHp: 100,
          energy: 5,
          maxEnergy: 5,
          shield: 0
        },
        upgrades: {
          atkBonus: 0,
          defBonus: 0,
          healBonus: 0,
          critRate: 0,
          regen: 0,
          doubleStrike: 0
        },
        ownedSpecialCards: [],
        currentMonster: null
      };

      startLevel(true);
      log("游戏开始，进入第 1 关。");
    }

    function getBaseCardPool() {
      const atk1 = 12 + Math.floor(state.level * 0.8) + state.upgrades.atkBonus;
      const atk2 = 18 + Math.floor(state.level * 1.0) + state.upgrades.atkBonus;
      const def1 = 10 + Math.floor(state.level * 0.5) + state.upgrades.defBonus;
      const def2 = 16 + Math.floor(state.level * 0.6) + state.upgrades.defBonus;
      const heal1 = 12 + Math.floor(state.level * 0.6) + state.upgrades.healBonus;
      const heal2 = 20 + Math.floor(state.level * 0.7) + state.upgrades.healBonus;

      return [
        {
          id: "atk_1",
          name: "斩击",
          type: "attack",
          cardType: "攻击",
          value: atk1,
          cost: 1,
          desc: `造成 ${atk1} 点伤害`
        },
        {
          id: "atk_2",
          name: "重击",
          type: "attack",
          cardType: "攻击",
          value: atk2,
          cost: 2,
          desc: `造成 ${atk2} 点伤害`
        },
        {
          id: "def_1",
          name: "格挡",
          type: "defense",
          cardType: "防御",
          value: def1,
          cost: 1,
          desc: `获得 ${def1} 点护盾`
        },
        {
          id: "def_2",
          name: "坚守",
          type: "defense",
          cardType: "防御",
          value: def2,
          cost: 2,
          desc: `获得 ${def2} 点护盾`
        },
        {
          id: "heal_1",
          name: "治愈",
          type: "heal",
          cardType: "治疗",
          value: heal1,
          cost: 2,
          desc: `恢复 ${heal1} 点生命`
        },
        {
          id: "heal_2",
          name: "大治疗",
          type: "heal",
          cardType: "治疗",
          value: heal2,
          cost: 3,
          desc: `恢复 ${heal2} 点生命`
        }
      ];
    }

    function getFullCardPool() {
      return [...getBaseCardPool(), ...state.ownedSpecialCards];
    }

    function drawNewHand() {
      const pool = getFullCardPool();
      const newHand = [];

      for (let i = 0; i < state.deckSizePerTurn; i++) {
        const picked = pool[randomInt(0, pool.length - 1)];
        newHand.push({
          ...picked,
          uid: `${Date.now()}_${i}_${Math.random()}`
        });
      }

      state.hand = newHand;
    }

    function getCardClass(card) {
      if (card.type === "attack") return "attack";
      if (card.type === "defense") return "defense";
      if (card.type === "heal") return "heal";
      return "special";
    }

    function renderCards() {
      const container = document.getElementById("cardsContainer");
      container.innerHTML = "";

      if (state.hand.length === 0) {
        const empty = document.createElement("div");
        empty.style.color = "#b6beca";
        empty.style.gridColumn = "1 / -1";
        empty.textContent = "本回合已经没有手牌了，请结束回合。";
        container.appendChild(empty);
      }

      state.hand.forEach(card => {
        const div = document.createElement("div");
        div.className = `card ${getCardClass(card)}`;

        const canUse =
          !state.inShop &&
          !state.gameOver &&
          !state.awaitingNextAction &&
          state.player.energy >= card.cost;

        div.innerHTML = `
          <div class="card-top">
            <div class="card-type">${card.cardType}</div>
            <div class="card-name">${card.name}</div>
            <div class="card-desc">${card.desc}</div>
            <div class="card-cost">消耗能量：${card.cost}</div>
          </div>
          <button ${canUse ? "" : "disabled"}>使用这张牌</button>
        `;

        div.querySelector("button").onclick = () => playCard(card.uid);
        container.appendChild(div);
      });

      document.getElementById("handCountText").textContent = state.hand.length;
    }

    function playCard(uid) {
      if (state.inShop || state.gameOver || state.awaitingNextAction) return;

      const cardIndex = state.hand.findIndex(card => card.uid === uid);
      if (cardIndex === -1) return;

      const card = state.hand[cardIndex];

      if (state.player.energy < card.cost) {
        log("能量不足。");
        return;
      }

      state.player.energy -= card.cost;

      if (card.type === "attack") {
        let dmg = card.value;
        let critText = "";

        if (state.upgrades.critRate > 0 && chance(state.upgrades.critRate)) {
          dmg = Math.floor(dmg * 1.6);
          critText = "（暴击）";
        }

        state.currentMonster.hp -= dmg;
        if (state.currentMonster.hp < 0) state.currentMonster.hp = 0;

        log(`你使用【${card.name}】${critText}，造成 ${dmg} 点伤害。`);

        if (state.upgrades.doubleStrike > 0 && state.currentMonster.hp > 0 && chance(state.upgrades.doubleStrike)) {
          const extra = Math.floor(card.value * 0.7);
          state.currentMonster.hp -= extra;
          if (state.currentMonster.hp < 0) state.currentMonster.hp = 0;
          logAppend(`连击触发，再造成 ${extra} 点伤害。`);
        }
      }

      if (card.type === "defense") {
        state.player.shield += card.value;
        log(`你使用【${card.name}】，获得 ${card.value} 点护盾。`);
      }

      if (card.type === "heal") {
        const before = state.player.hp;
        state.player.hp = Math.min(state.player.maxHp, state.player.hp + card.value);
        log(`你使用【${card.name}】，恢复 ${state.player.hp - before} 点生命。`);
      }

      if (card.type === "special_attack") {
        state.currentMonster.hp -= card.value;
        if (state.currentMonster.hp < 0) state.currentMonster.hp = 0;
        log(`你使用【${card.name}】，造成 ${card.value} 点伤害。`);
      }

      if (card.type === "special_heal_shield") {
        const before = state.player.hp;
        state.player.hp = Math.min(state.player.maxHp, state.player.hp + card.healValue);
        state.player.shield += card.shieldValue;
        log(`你使用【${card.name}】，恢复 ${state.player.hp - before} HP，并获得 ${card.shieldValue} 点护盾。`);
      }

      if (card.type === "special_energy_attack") {
        state.currentMonster.hp -= card.damageValue;
        if (state.currentMonster.hp < 0) state.currentMonster.hp = 0;
        state.player.energy = Math.min(state.player.maxEnergy, state.player.energy + card.energyGain);
        log(`你使用【${card.name}】，造成 ${card.damageValue} 点伤害，并回复 ${card.energyGain} 点能量。`);
      }

      state.hand.splice(cardIndex, 1);

      if (state.currentMonster.hp <= 0) {
        winBattle();
        return;
      }

      updateUI();
    }

    function endTurn() {
      if (state.inShop || state.gameOver || state.awaitingNextAction) return;
      monsterTurn();
    }

    function monsterTurn() {
      if (state.currentMonster.hp <= 0) return;

      let incoming = state.currentMonster.atk;
      const shieldBefore = state.player.shield;
      let hpDamage = 0;

      if (state.player.shield > 0) {
        const blocked = Math.min(state.player.shield, incoming);
        state.player.shield -= blocked;
        incoming -= blocked;
      }

      if (incoming > 0) {
        hpDamage = incoming;
        state.player.hp -= hpDamage;
        if (state.player.hp < 0) state.player.hp = 0;
      }

      if (shieldBefore > 0) {
        const consumed = shieldBefore - state.player.shield;
        if (hpDamage > 0) {
          log(`怪物攻击你，先扣除 ${consumed} 点护盾，再扣除 ${hpDamage} 点生命。`);
        } else {
          log(`怪物攻击你，护盾吸收了 ${consumed} 点伤害。`);
        }
      } else {
        log(`怪物攻击你，造成 ${hpDamage} 点生命伤害。`);
      }

      if (state.player.hp <= 0) {
        state.gameOver = true;
        logAppend("你被击败了，游戏结束。");
        updateUI();
        return;
      }

      if (state.upgrades.regen > 0) {
        const before = state.player.hp;
        state.player.hp = Math.min(state.player.maxHp, state.player.hp + state.upgrades.regen);
        logAppend(`持续治疗发动，恢复 ${state.player.hp - before} 点生命。`);
      }

      state.player.energy = state.player.maxEnergy;
      drawNewHand();
      logAppend("新的回合开始，你获得了新的随机手牌，能量已补满。");

      updateUI();
    }

    function winBattle() {
      const reward = getReward(state.level);
      const clearedLevel = state.level;

      state.gold += reward;
      state.awaitingNextAction = true;

      log(`你击败了【${state.currentMonster.name}】！获得 ${reward} 金币。`);

      if (clearedLevel >= 50) {
        state.gameOver = true;
        logAppend("恭喜你通过全部 50 关！");
        updateUI();
        return;
      }

      state.level += 1;
      state.hand = [];

      if (clearedLevel % 3 === 0) {
        logAppend("你通过了第 3 的倍数关卡，可以进入商店。点击【继续】前往商店。");
      } else {
        logAppend(`点击【继续】进入第 ${state.level} 关。`);
      }

      updateUI();
    }

    function afterBattleContinue() {
      if (!state.awaitingNextAction || state.gameOver) return;

      state.awaitingNextAction = false;

      const justCleared = state.level - 1;

      if (justCleared % 3 === 0) {
        openShop();
      } else {
        startLevel();
      }

      updateUI();
    }

    function startLevel(isFirst = false) {
      state.inShop = false;
      document.getElementById("shopBox").style.display = "none";

      state.currentMonster = createMonster(state.level);
      state.player.energy = state.player.maxEnergy;
      drawNewHand();

      if (!isFirst) {
        log(`进入第 ${state.level} 关：${state.currentMonster.name}`);
      }

      updateUI();
    }

    function openShop() {
      state.inShop = true;
      document.getElementById("shopBox").style.display = "block";

      const pool = [
        {
          title: "增加能量球",
          desc: "能量上限 +1，并立即补满。",
          getCost: () => randomInt(12, 22),
          action: () => {
            state.player.maxEnergy += 1;
            state.player.energy = state.player.maxEnergy;
            log("购买成功：能量上限 +1。");
          }
        },
        {
          title: "升级攻击卡",
          desc: "所有基础攻击牌伤害 +4。",
          getCost: () => randomInt(14, 24),
          action: () => {
            state.upgrades.atkBonus += 4;
            log("购买成功：攻击牌强化。");
          }
        },
        {
          title: "升级防御卡",
          desc: "所有基础防御牌护盾 +4。",
          getCost: () => randomInt(14, 24),
          action: () => {
            state.upgrades.defBonus += 4;
            log("购买成功：防御牌强化。");
          }
        },
        {
          title: "升级治疗卡",
          desc: "所有基础治疗牌恢复 +4。",
          getCost: () => randomInt(14, 24),
          action: () => {
            state.upgrades.healBonus += 4;
            log("购买成功：治疗牌强化。");
          }
        },
        {
          title: "附加效果：暴击",
          desc: "攻击牌增加 12% 暴击机率。",
          getCost: () => randomInt(18, 28),
          action: () => {
            state.upgrades.critRate = Math.min(0.5, state.upgrades.critRate + 0.12);
            log("购买成功：获得暴击效果。");
          }
        },
        {
          title: "附加效果：持续治疗",
          desc: "每回合结束后恢复 6 点生命。",
          getCost: () => randomInt(18, 28),
          action: () => {
            state.upgrades.regen += 6;
            log("购买成功：获得持续治疗效果。");
          }
        },
        {
          title: "附加效果：连击",
          desc: "攻击牌增加 18% 连击机率。",
          getCost: () => randomInt(18, 28),
          action: () => {
            state.upgrades.doubleStrike = Math.min(0.45, state.upgrades.doubleStrike + 0.18);
            log("购买成功：获得连击效果。");
          }
        },
        {
          title: "增加血量上限",
          desc: "最大生命 +20，并恢复 20 HP。",
          getCost: () => randomInt(15, 25),
          action: () => {
            state.player.maxHp += 20;
            state.player.hp = Math.min(state.player.maxHp, state.player.hp + 20);
            log("购买成功：血量上限提升。");
          }
        },
        {
          title: "补血",
          desc: "立即恢复 35 HP。",
          getCost: () => randomInt(10, 18),
          action: () => {
            const before = state.player.hp;
            state.player.hp = Math.min(state.player.maxHp, state.player.hp + 35);
            log(`购买成功：恢复 ${state.player.hp - before} 点生命。`);
          }
        },
        {
          title: "特殊卡牌：烈焰斩",
          desc: "之后会加入牌池。高伤害攻击牌，造成 34 点伤害。",
          getCost: () => randomInt(18, 30),
          action: () => {
            if (!state.ownedSpecialCards.find(c => c.id === "sp_flame")) {
              state.ownedSpecialCards.push({
                id: "sp_flame",
                name: "烈焰斩",
                type: "special_attack",
                cardType: "特殊攻击",
                value: 34,
                cost: 3,
                desc: "造成 34 点伤害"
              });
              log("购买成功：特殊卡【烈焰斩】已加入牌池。");
            } else {
              state.gold += 8;
              log("你已拥有这张特殊卡，补偿 8 金币。");
            }
          }
        },
        {
          title: "特殊卡牌：圣光庇护",
          desc: "之后会加入牌池。恢复生命并获得护盾。",
          getCost: () => randomInt(18, 30),
          action: () => {
            if (!state.ownedSpecialCards.find(c => c.id === "sp_holy")) {
              state.ownedSpecialCards.push({
                id: "sp_holy",
                name: "圣光庇护",
                type: "special_heal_shield",
                cardType: "特殊辅助",
                healValue: 18,
                shieldValue: 14,
                cost: 3,
                desc: "恢复 18 HP，并获得 14 点护盾"
              });
              log("购买成功：特殊卡【圣光庇护】已加入牌池。");
            } else {
              state.gold += 8;
              log("你已拥有这张特殊卡，补偿 8 金币。");
            }
          }
        },
        {
          title: "特殊卡牌：能量冲击",
          desc: "之后会加入牌池。造成伤害并回复能量。",
          getCost: () => randomInt(18, 30),
          action: () => {
            if (!state.ownedSpecialCards.find(c => c.id === "sp_energy")) {
              state.ownedSpecialCards.push({
                id: "sp_energy",
                name: "能量冲击",
                type: "special_energy_attack",
                cardType: "特殊攻击",
                damageValue: 16,
                energyGain: 1,
                cost: 1,
                desc: "造成 16 点伤害，并回复 1 点能量"
              });
              log("购买成功：特殊卡【能量冲击】已加入牌池。");
            } else {
              state.gold += 8;
              log("你已拥有这张特殊卡，补偿 8 金币。");
            }
          }
        }
      ];

      const selected = [];
      while (selected.length < 3) {
        const pick = pool[randomInt(0, pool.length - 1)];
        if (!selected.includes(pick)) selected.push(pick);
      }

      const shopOptions = document.getElementById("shopOptions");
      shopOptions.innerHTML = "";

      selected.forEach(item => {
        const cost = item.getCost();

        const div = document.createElement("div");
        div.className = "shop-item";
        div.innerHTML = `
          <h3>${item.title}</h3>
          <div class="shop-desc">${item.desc}</div>
          <div class="shop-price">价格：${cost} 金币</div>
          <button class="shop-btn" ${state.gold >= cost ? "" : "disabled"}>购买</button>
        `;

        div.querySelector("button").onclick = () => buyItem(item, cost);
        shopOptions.appendChild(div);
      });

      log("你进入了商店，可以购买 1 个选项。");
      updateUI();
    }

    function buyItem(item, cost) {
      if (!state.inShop) return;
      if (state.gold < cost) {
        log("金币不足。");
        return;
      }

      state.gold -= cost;
      item.action();

      state.inShop = false;
      document.getElementById("shopBox").style.display = "none";
      startLevel();
    }

    function updateUI() {
      document.getElementById("levelText").textContent = state.level;
      document.getElementById("goldText").textContent = state.gold;
      document.getElementById("stageTypeText").textContent = getStageType(state.level);
      document.getElementById("handCountText").textContent = state.hand.length;

      document.getElementById("playerHpText").textContent = state.player.hp;
      document.getElementById("playerMaxHpText").textContent = state.player.maxHp;
      document.getElementById("playerShieldText").textContent = state.player.shield;
      document.getElementById("energyText").textContent = state.player.energy;
      document.getElementById("energyMaxText").textContent = state.player.maxEnergy;

      document.getElementById("playerHpBar").style.width =
        ((state.player.hp / state.player.maxHp) * 100) + "%";
      document.getElementById("energyBar").style.width =
        ((state.player.energy / state.player.maxEnergy) * 100) + "%";

      if (state.currentMonster) {
        document.getElementById("monsterNameText").textContent = state.currentMonster.name;
        document.getElementById("monsterTypeText").textContent = state.currentMonster.type;
        document.getElementById("monsterEmojiText").textContent = state.currentMonster.emoji;
        document.getElementById("monsterHpText").textContent = state.currentMonster.hp;
        document.getElementById("monsterMaxHpText").textContent = state.currentMonster.maxHp;
        document.getElementById("monsterAtkText").textContent = state.currentMonster.atk;
        document.getElementById("monsterHpBar").style.width =
          ((state.currentMonster.hp / state.currentMonster.maxHp) * 100) + "%";
        document.getElementById("monsterInfoText").textContent =
          `${state.currentMonster.note} 当前攻击力为 ${state.currentMonster.atk}。`;
      }

      document.getElementById("heroInfoText").textContent =
        `本回合剩余手牌 ${state.hand.length} 张，已拥有特殊卡 ${state.ownedSpecialCards.length} 张。`;

      document.getElementById("endTurnBtn").disabled =
        state.inShop || state.gameOver || state.awaitingNextAction;

      const nextBtn = document.getElementById("nextBattleBtn");
      if (state.awaitingNextAction && !state.gameOver) {
        nextBtn.classList.remove("hidden");
      } else {
        nextBtn.classList.add("hidden");
      }

      renderCards();
    }

    function log(text) {
      document.getElementById("logBox").textContent = text;
    }

    function logAppend(text) {
      document.getElementById("logBox").textContent += "\n" + text;
    }

    function restartGame() {
      initGame();
    }

    initGame();
  </script>
</body>
</html>
