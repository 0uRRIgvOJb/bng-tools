<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>卡牌冒险</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(75, 55, 20, 0.18), transparent 28%),
        linear-gradient(180deg, #0d1015 0%, #151a20 100%);
      color: #fff;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 12px 18px;
      background: rgba(0,0,0,0.35);
      border-bottom: 1px solid #2a3038;
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(6px);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #171b22;
      border: 1px solid #2d3440;
      border-radius: 12px;
      padding: 8px 12px;
    }

    .volume-wrap span {
      color: #ddd;
      font-size: 14px;
      white-space: nowrap;
    }

    .volume-wrap input[type="range"] {
      width: 150px;
      cursor: pointer;
    }

    .home-btn {
      border: none;
      background: #d8a642;
      color: #111;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 22px 18px 40px;
    }

    .title {
      text-align: center;
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 2px;
      margin: 8px 0 20px;
      color: #f8f1e4;
      text-shadow: 0 0 12px rgba(216,166,66,0.18);
    }

    .battle-board {
      display: grid;
      grid-template-columns: 1fr 0.95fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
      align-items: start;
    }

    .panel,
    .cards-panel,
    .log-panel {
      background: linear-gradient(180deg, #1b1f27 0%, #171b22 100%);
      border: 1px solid #2d3440;
      border-radius: 18px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.28);
      padding: 20px;
    }

    .middle-log-wrap {
      width: 100%;
    }

    .side-log-panel {
      margin-top: 0;
      width: 100%;
    }

    .character-head {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(135deg, #304965, #2c7dc3);
    }

    .monster-avatar {
      background: linear-gradient(135deg, #5e2525, #ae3d3d);
    }

    .character-title h2 {
      margin: 0 0 6px;
      font-size: 30px;
    }

    .character-sub {
      color: #b6beca;
      font-size: 14px;
      line-height: 1.6;
    }

    .stat-row {
      margin-bottom: 16px;
    }

    .stat-top {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 16px;
      line-height: 1.6;
    }

    .bar-bg {
      width: 100%;
      height: 18px;
      border-radius: 999px;
      background: #313844;
      overflow: hidden;
    }

    .hp-bar {
      height: 100%;
      background: linear-gradient(90deg, #d94a4a, #ff7a7a);
      transition: width 0.25s ease;
    }

    .energy-bar {
      height: 100%;
      background: linear-gradient(90deg, #2aa8ff, #7cd5ff);
      transition: width 0.25s ease;
    }

    .shield-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #204f83;
      color: #e3f4ff;
      font-size: 14px;
      font-weight: bold;
      vertical-align: middle;
    }

    .note-box {
      margin-top: 12px;
      background: #12161c;
      border: 1px solid #262d37;
      border-radius: 12px;
      padding: 12px;
      color: #d8dee8;
      line-height: 1.7;
      min-height: 120px;
    }

    .player-grid {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 14px;
      align-items: stretch;
    }

    .player-side {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .monster-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 190px;
      gap: 14px;
      align-items: stretch;
    }

    .monster-main {
      min-width: 0;
    }

    .monster-side {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .side-info {
      background: #12161c;
      border: 1px solid #262d37;
      border-radius: 12px;
      padding: 12px;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .side-label {
      font-size: 13px;
      color: #aeb7c6;
      margin-bottom: 8px;
    }

    .side-value {
      font-size: 24px;
      font-weight: bold;
      color: #f7eedf;
      line-height: 1.25;
      word-break: break-word;
    }

    .skills-wrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .skill-tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: #223040;
      color: #e6f0ff;
      font-size: 12px;
      border: 1px solid #33465c;
    }

    .section-title {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }

    .card {
      background: linear-gradient(180deg, #262d38 0%, #1a2029 100%);
      border: 1px solid #38404f;
      border-radius: 16px;
      padding: 16px;
      min-height: 230px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card.attack { border-color: rgba(255, 100, 100, 0.45); }
    .card.defense { border-color: rgba(100, 190, 255, 0.45); }
    .card.heal { border-color: rgba(100, 255, 140, 0.45); }
    .card.special { border-color: rgba(184, 120, 255, 0.60); box-shadow: 0 0 0 1px rgba(184,120,255,0.15) inset; }

    .card-top { margin-bottom: 12px; }

    .card-type {
      font-size: 13px;
      color: #aab4c5;
      margin-bottom: 8px;
    }

    .card-name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .card-desc {
      color: #e6ebf3;
      line-height: 1.7;
      font-size: 15px;
      min-height: 88px;
    }

    .card-cost {
      margin-top: 8px;
      color: #8fd8ff;
      font-weight: bold;
    }

    .card button,
    .action-btn,
    .modal-btn,
    .avatar-option {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .card button {
      width: 100%;
      padding: 12px 14px;
      background: #3c8f47;
      color: #fff;
      font-size: 15px;
    }

    .card button:disabled,
    .action-btn:disabled,
    .modal-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .action-btn {
      min-width: 140px;
      padding: 12px 16px;
      font-size: 15px;
      color: #fff;
      background: #8a4d2c;
    }

    .log-box {
      background: #10141a;
      border: 1px solid #262d37;
      border-radius: 14px;
      padding: 14px;
      min-height: 470px;
      max-height: 560px;
      overflow-y: auto;
      line-height: 1.75;
      color: #f0f3f8;
    }

    .log-line {
      margin-bottom: 8px;
    }

    .log-attack { color: #ff8b8b; }
    .log-heal { color: #7ef0a6; }
    .log-shield { color: #73c4ff; }
    .log-system { color: #f3e3b0; }
    .log-monster { color: #ffb3b3; }
    .log-normal { color: #f0f3f8; }

    .empty-hand {
      color: #b6beca;
      grid-column: 1 / -1;
      background: #12161c;
      border: 1px dashed #38404f;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      line-height: 1.7;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.62);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
      backdrop-filter: blur(6px);
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 980px;
      background: linear-gradient(180deg, #1d2129 0%, #171b22 100%);
      border: 1px solid #323a47;
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.4);
      padding: 22px;
      max-height: 92vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 34px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .modal-sub {
      color: #b6beca;
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .modal-btn {
      padding: 12px 18px;
      font-size: 15px;
      color: #fff;
      background: #7a56d8;
    }

    .modal-btn.secondary {
      background: #556274;
    }

    .modal-btn.danger {
      background: #914b2b;
    }

    .shop-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 8px;
    }

    .shop-item {
      background: linear-gradient(180deg, #262d38 0%, #1d232c 100%);
      border: 1px solid #39404f;
      border-radius: 16px;
      padding: 14px;
    }

    .shop-item h3 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .shop-desc {
      color: #dbe1eb;
      line-height: 1.7;
      min-height: 72px;
      margin-bottom: 10px;
    }

    .shop-price {
      color: #ffd56a;
      font-weight: bold;
      margin-bottom: 12px;
      font-size: 18px;
    }

    .setup-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .setup-block {
      background: #12161c;
      border: 1px solid #262d37;
      border-radius: 16px;
      padding: 16px;
    }

    .setup-block h3 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .name-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #3a4352;
      background: #0f1318;
      color: white;
      font-size: 16px;
      outline: none;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
    }

    .avatar-option {
      min-height: 100px;
      background: linear-gradient(180deg, #28303c 0%, #1d232c 100%);
      border: 2px solid transparent;
      color: white;
      font-size: 42px;
      transition: 0.18s;
    }

    .avatar-option.selected {
      border-color: #d8a642;
      box-shadow: 0 0 0 3px rgba(216,166,66,0.18);
    }

    .center-text {
      text-align: center;
    }

    @media (max-width: 1280px) {
      .battle-board {
        grid-template-columns: 1fr;
      }

      .log-box {
        min-height: 260px;
        max-height: 360px;
      }
    }

    @media (max-width: 980px) {
      .player-grid,
      .monster-layout {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 36px;
      }
    }

    @media (max-width: 600px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .modal-title {
        font-size: 28px;
      }

      .volume-wrap input[type="range"] {
        width: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <div class="volume-wrap">
        <span>音乐音量</span>
        <input type="range" id="musicVolumeSlider" min="0" max="100" value="80" />
      </div>
      <div class="volume-wrap">
        <span>音效音量</span>
        <input type="range" id="sfxVolumeSlider" min="0" max="100" value="90" />
      </div>
    </div>
    <button class="home-btn" onclick="goHome()">回首頁</button>
  </div>

  <div class="container">
    <div class="title">卡牌冒险</div>

    <div class="battle-board">
      <div class="panel">
        <div class="character-head">
          <div class="avatar" id="playerAvatarText">🧙</div>
          <div class="character-title">
            <h2 id="playerNameTitle">角色</h2>
            <div class="character-sub">你的冒险者资料</div>
          </div>
        </div>

        <div class="player-grid">
          <div>
            <div class="stat-row">
              <div class="stat-top">
                <div>
                  HP：<span id="playerHpText">100</span> / <span id="playerMaxHpText">100</span>
                  <span class="shield-badge">护盾 <span id="playerShieldText">0</span></span>
                </div>
              </div>
              <div class="bar-bg">
                <div class="hp-bar" id="playerHpBar" style="width:100%"></div>
              </div>
            </div>

            <div class="stat-row">
              <div class="stat-top">
                <div>能量：<span id="energyText">3</span> / <span id="energyMaxText">3</span></div>
              </div>
              <div class="bar-bg">
                <div class="energy-bar" id="energyBar" style="width:100%"></div>
              </div>
            </div>

            <div class="note-box" id="heroInfoText">准备开始战斗。</div>
          </div>

          <div class="player-side">
            <div class="side-info">
              <div class="side-label">目前关卡</div>
              <div class="side-value" id="levelText">1/50</div>
            </div>
            <div class="side-info">
              <div class="side-label">金币</div>
              <div class="side-value" id="goldText">0</div>
            </div>
          </div>
        </div>
      </div>

      <div class="middle-log-wrap">
        <div class="log-panel side-log-panel">
          <div class="section-title">战斗纪录</div>
          <div class="log-box" id="logBox"></div>
        </div>
      </div>

      <div class="panel">
        <div class="monster-layout">
          <div class="monster-main">
            <div class="character-head">
              <div class="avatar monster-avatar" id="monsterEmojiText">👾</div>
              <div class="character-title">
                <h2 id="monsterNameText">史莱姆</h2>
                <div class="character-sub" id="monsterTypeText">普通关</div>
              </div>
            </div>

            <div class="stat-row">
              <div class="stat-top">
                <div>HP：<span id="monsterHpText">30</span> / <span id="monsterMaxHpText">30</span></div>
              </div>
              <div class="bar-bg">
                <div class="hp-bar" id="monsterHpBar" style="width:100%"></div>
              </div>
            </div>

            <div class="stat-row">
              <div class="stat-top">
                <div>攻击力：<span id="monsterAtkText">8</span></div>
              </div>
            </div>

            <div class="note-box" id="monsterInfoText">怪物会在你结束回合后攻击。</div>
            <div class="skills-wrap" id="monsterSkillsBox"></div>
          </div>

          <div class="monster-side">
            <div class="side-info">
              <div class="side-label">战斗资讯</div>
              <div class="side-value" id="battleTurnText">玩家回合</div>
            </div>
            <div class="side-info">
              <div class="side-label">剩余手牌</div>
              <div class="side-value" id="handCountText">4</div>
            </div>
            <div class="side-info">
              <div class="side-label">商店状态</div>
              <div class="side-value" id="shopHintText">未开启</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="cards-panel">
      <div class="section-title">卡牌</div>
      <div class="cards" id="cardsContainer"></div>
      <div class="actions">
        <button class="action-btn" id="endTurnBtn" onclick="endTurn()">结束回合</button>
      </div>
    </div>
  </div>

  <audio id="bgmPlayer" loop preload="auto">
    <source src="./assets/bgm/medieval-theme.mp3" type="audio/mpeg" />
  </audio>

  <div class="modal-overlay show" id="setupModal">
    <div class="modal-box">
      <div class="modal-title">开始冒险</div>
      <div class="modal-sub">先输入角色名称，并选择一个角色图案。</div>
      <div class="setup-grid">
        <div class="setup-block">
          <h3>角色名称</h3>
          <input class="name-input" id="playerNameInput" maxlength="16" placeholder="请输入角色名称" />
        </div>
        <div class="setup-block">
          <h3>选择角色图案</h3>
          <div class="avatar-grid" id="avatarGrid"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn" onclick="confirmSetup()">开始游戏</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="levelClearModal">
    <div class="modal-box center-text" style="max-width:620px;">
      <div class="modal-title" id="levelClearTitle">通关成功</div>
      <div class="modal-sub" id="levelClearDesc">恭喜通关。</div>
      <div class="modal-actions" style="justify-content:center;">
        <button class="modal-btn" onclick="continueAfterClear()">继续游戏</button>
        <button class="modal-btn danger" onclick="restartFromModal()">重新开始</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="shopModal">
    <div class="modal-box">
      <div class="modal-title">商店</div>
      <div class="modal-sub">你可以购买一个项目，也可以直接关闭商店。</div>
      <div class="shop-options" id="shopOptions"></div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeShop()">关闭商店</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="gameOverModal">
    <div class="modal-box center-text" style="max-width:620px;">
      <div class="modal-title" id="gameOverTitle">游戏结束</div>
      <div class="modal-sub" id="gameOverDesc">请重新开始。</div>
      <div class="modal-actions" style="justify-content:center;">
        <button class="modal-btn danger" onclick="restartFromModal()">重新开始</button>
      </div>
    </div>
  </div>

  <script>
    const HOME_URL = "https://0urrigvojb.github.io/bng-tools/";
    const avatarChoices = ["🧙","🛡️","⚔️","🧝","🧛","🧞","👸","🤴"];

    const normalMonsters = [
      { name: "史莱姆", emoji: "🟢", race: "slime", note: "黏糊糊的基础怪物。" },
      { name: "骷髅兵", emoji: "💀", race: "undead", note: "常见亡灵，攻击直来直往。" },
      { name: "毒蜘蛛", emoji: "🕷️", race: "poison", note: "会用毒折磨对手。" },
      { name: "狼人", emoji: "🐺", race: "beast", note: "近战力量较强。" },
      { name: "暗影盗贼", emoji: "🗡️", race: "shadow", note: "擅长迅速突袭。" }
    ];

    const miniBossMonsters = [
      { name: "地牢守卫", emoji: "🛡️", race: "tank", note: "小BOSS，极为坚韧。" },
      { name: "幽冥法师", emoji: "🔮", race: "curse", note: "擅长诅咒与干扰。" },
      { name: "双刃兽人", emoji: "🪓", race: "berserk", note: "连续攻击威胁很高。" }
    ];

    const bossMonsters = [
      { name: "深渊魔王", emoji: "😈", race: "rebirth", note: "拥有恐怖的重生之力。" },
      { name: "黑炎骑士", emoji: "🔥", race: "fireboss", note: "高血量，擅长持续压制。" },
      { name: "终焉领主", emoji: "👹", race: "finalboss", note: "拥有多种危险技能。" }
    ];

    let state = {};
    let selectedAvatar = avatarChoices[0];
    let audioCtx = null;
    let musicVolume = 0.8;
    let sfxVolume = 0.9;
    let logEntries = [];

    function goHome() {
      window.location.href = HOME_URL;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function chance(rate) {
      return Math.random() < rate;
    }

    function getStageType(level) {
      if (level % 10 === 0) return "大BOSS";
      if (level % 5 === 0) return "小BOSS";
      return "普通关";
    }

    function buildMonsterSkills(race, type, level) {
      const skills = {
        trueDamageChance: 0,
        multiAttackChance: 0,
        multiAttackHits: 1,
        healChance: 0,
        healPercent: 0,
        blindChance: 0,
        blindTurns: 0,
        tenacityChance: 0,
        tenacityUsed: false,
        rebirth: false,
        rebirthUsed: false,
        poisonChance: 0,
        poisonDamage: 0,
        poisonTurns: 0,
        burnDamage: 0,
        burnTurns: 0,
        monsterBlindTurns: 0
      };

      if (race === "slime") {
        skills.healChance = 0.22;
        skills.healPercent = 0.10;
      }
      if (race === "undead") {
        skills.tenacityChance = 0.35;
      }
      if (race === "poison") {
        skills.poisonChance = 0.5;
        skills.poisonDamage = 3 + Math.floor(level / 8);
        skills.poisonTurns = 3;
      }
      if (race === "beast") {
        skills.multiAttackChance = 0.25;
        skills.multiAttackHits = 2;
      }
      if (race === "shadow") {
        skills.blindChance = 0.32;
        skills.blindTurns = 1;
        skills.trueDamageChance = 0.18;
      }
      if (race === "tank") {
        skills.tenacityChance = 0.55;
        skills.healChance = 0.15;
        skills.healPercent = 0.08;
      }
      if (race === "curse") {
        skills.blindChance = 0.45;
        skills.blindTurns = 2;
        skills.trueDamageChance = 0.15;
      }
      if (race === "berserk") {
        skills.multiAttackChance = 0.45;
        skills.multiAttackHits = 2;
      }
      if (race === "rebirth") {
        skills.rebirth = true;
        skills.trueDamageChance = 0.2;
        skills.blindChance = 0.25;
        skills.blindTurns = 1;
      }
      if (race === "fireboss") {
        skills.multiAttackChance = 0.25;
        skills.multiAttackHits = 2;
        skills.tenacityChance = 0.45;
      }
      if (race === "finalboss") {
        skills.rebirth = true;
        skills.trueDamageChance = 0.25;
        skills.multiAttackChance = 0.35;
        skills.multiAttackHits = 2;
        skills.blindChance = 0.3;
        skills.blindTurns = 1;
        skills.poisonChance = 0.35;
        skills.poisonDamage = 4 + Math.floor(level / 10);
        skills.poisonTurns = 3;
        skills.tenacityChance = 0.5;
      }

      if (type === "普通关") {
        skills.trueDamageChance *= 0.8;
        skills.multiAttackChance *= 0.8;
        skills.blindChance *= 0.8;
        skills.tenacityChance *= 0.8;
      }

      return skills;
    }

    function createMonster(level) {
      const type = getStageType(level);
      let pool = normalMonsters;
      if (type === "小BOSS") pool = miniBossMonsters;
      if (type === "大BOSS") pool = bossMonsters;

      const data = pool[randomInt(0, pool.length - 1)];

      let hp = 0;
      let atk = 0;
      if (type === "普通关") {
        hp = 42 + level * 11 + randomInt(0, 14);
        atk = 5 + Math.floor(level * 1.1) + Math.floor(state.player.maxHp * 0.015);
      } else if (type === "小BOSS") {
        hp = 95 + level * 14 + randomInt(8, 20);
        atk = 8 + Math.floor(level * 1.3) + Math.floor(state.player.maxHp * 0.02);
      } else {
        hp = 155 + level * 18 + randomInt(10, 30);
        atk = 11 + Math.floor(level * 1.55) + Math.floor(state.player.maxHp * 0.025);
      }

      return {
        type,
        race: data.race,
        name: data.name,
        emoji: data.emoji,
        note: data.note,
        hp,
        maxHp: hp,
        atk,
        skills: buildMonsterSkills(data.race, type, level)
      };
    }

    function getReward(level) {
      if (level % 10 === 0) return randomInt(18, 36);
      if (level % 5 === 0) return randomInt(10, 24);
      return randomInt(4, 12);
    }

    function initGame() {
      state = {
        started: false,
        playerName: "角色",
        playerAvatar: selectedAvatar || avatarChoices[0],
        level: 1,
        gold: 0,
        inShop: false,
        gameOver: false,
        pendingShop: false,
        justClearedLevel: 0,
        deckSizePerTurn: 4,
        hand: [],
        turnLabel: "玩家回合",
        player: {
          hp: 100,
          maxHp: 100,
          energy: 3,
          maxEnergy: 3,
          shield: 0,
          blindTurns: 0,
          dodgeChance: 0,
          regenHot: 0,
          regenHotTurns: 0,
          poisonDamage: 0,
          poisonTurns: 0,
          specialShield: 0,
          specialShieldTurns: 0,
          specialShieldBomb: 0
        },
        upgrades: {
          atkBonus: 0,
          defBonus: 0,
          healBonus: 0,
          critRate: 0,
          regen: 0,
          doubleStrike: 0
        },
        ownedSpecialCards: [],
        currentMonster: null
      };
      logEntries = [];
    }

    function renderAvatarChoices() {
      const grid = document.getElementById("avatarGrid");
      grid.innerHTML = "";
      avatarChoices.forEach(icon => {
        const btn = document.createElement("button");
        btn.className = "avatar-option" + (icon === selectedAvatar ? " selected" : "");
        btn.textContent = icon;
        btn.onclick = () => {
          selectedAvatar = icon;
          renderAvatarChoices();
        };
        grid.appendChild(btn);
      });
    }

    function confirmSetup() {
      const name = document.getElementById("playerNameInput").value.trim();
      state.playerName = name || "冒险者";
      state.playerAvatar = selectedAvatar || avatarChoices[0];
      state.started = true;

      document.getElementById("setupModal").classList.remove("show");
      applyPlayerIdentity();
      startLevel(true);
      log(`欢迎你，${state.playerName}。冒险开始，进入第 1 关。`, "system");
      initAudio();
      playBgm();
    }

    function applyPlayerIdentity() {
      document.getElementById("playerNameTitle").textContent = state.playerName;
      document.getElementById("playerAvatarText").textContent = state.playerAvatar;
    }

    function getBaseCardPool() {
      const atk1 = 12 + Math.floor(state.level * 0.8) + state.upgrades.atkBonus;
      const atk2 = 18 + Math.floor(state.level * 0.95) + state.upgrades.atkBonus;
      const def1 = 10 + Math.floor(state.level * 0.5) + state.upgrades.defBonus;
      const def2 = 16 + Math.floor(state.level * 0.6) + state.upgrades.defBonus;
      const heal1 = 12 + Math.floor(state.level * 0.55) + state.upgrades.healBonus;
      const heal2 = 18 + Math.floor(state.level * 0.65) + state.upgrades.healBonus;

      return [
        { id: "atk_1", name: "斩击", type: "attack", cardType: "攻击", value: atk1, cost: 1, desc: `造成 ${atk1} 点伤害` },
        { id: "atk_2", name: "重击", type: "attack", cardType: "攻击", value: atk2, cost: 2, desc: `造成 ${atk2} 点伤害` },
        { id: "def_1", name: "格挡", type: "defense", cardType: "防御", value: def1, cost: 1, desc: `获得 ${def1} 点护盾` },
        { id: "def_2", name: "坚守", type: "defense", cardType: "防御", value: def2, cost: 2, desc: `获得 ${def2} 点护盾` },
        { id: "heal_1", name: "治愈", type: "heal", cardType: "治疗", value: heal1, cost: 2, desc: `恢复 ${heal1} 点生命` },
        { id: "heal_2", name: "大治疗", type: "heal", cardType: "治疗", value: heal2, cost: 3, desc: `恢复 ${heal2} 点生命` }
      ];
    }

    function getFullCardPool() {
      return [...getBaseCardPool(), ...state.ownedSpecialCards];
    }

    function drawNewHand() {
      const pool = getFullCardPool();
      const hand = [];
      for (let i = 0; i < state.deckSizePerTurn; i++) {
        const picked = pool[randomInt(0, pool.length - 1)];
        hand.push({ ...picked, uid: `${Date.now()}_${i}_${Math.random()}` });
      }
      state.hand = hand;
    }

    function getCardClass(card) {
      if (card.type === "attack") return "attack";
      if (card.type === "defense") return "defense";
      if (card.type === "heal") return "heal";
      return "special";
    }

    function renderCards() {
      const container = document.getElementById("cardsContainer");
      container.innerHTML = "";

      if (state.hand.length === 0) {
        const div = document.createElement("div");
        div.className = "empty-hand";
        div.textContent = "本回合已经没有手牌了，请结束回合。";
        container.appendChild(div);
        document.getElementById("handCountText").textContent = "0";
        return;
      }

      state.hand.forEach(card => {
        const div = document.createElement("div");
        div.className = `card ${getCardClass(card)}`;
        const canUse = !state.inShop && !state.gameOver && state.player.energy >= card.cost;

        div.innerHTML = `
          <div class="card-top">
            <div class="card-type">${card.cardType}</div>
            <div class="card-name">${card.name}</div>
            <div class="card-desc">${card.desc}</div>
            <div class="card-cost">消耗能量：${card.cost}</div>
          </div>
          <button ${canUse ? "" : "disabled"}>使用这张牌</button>
        `;

        div.querySelector("button").onclick = () => playCard(card.uid);
        container.appendChild(div);
      });

      document.getElementById("handCountText").textContent = String(state.hand.length);
    }

    function applyDamageToMonster(dmg, message) {
      const monster = state.currentMonster;

      if (monster.hp - dmg <= 0 &&
          monster.skills.tenacityChance > 0 &&
          !monster.skills.tenacityUsed &&
          chance(monster.skills.tenacityChance)) {
        monster.hp = 1;
        monster.skills.tenacityUsed = true;
        log(message, "attack");
        logAppend("怪物触发【坚韧】，本次没有被击倒，生命锁定在 1。", "system");
        return false;
      }

      monster.hp -= dmg;
      if (monster.hp < 0) monster.hp = 0;
      log(message, "attack");
      return monster.hp <= 0;
    }

    function handleMonsterDefeat() {
      const monster = state.currentMonster;
      if (monster.hp > 0) return false;

      if (monster.skills.rebirth && !monster.skills.rebirthUsed) {
        monster.skills.rebirthUsed = true;
        monster.hp = Math.floor(monster.maxHp * 0.8);
        logAppend("怪物触发【重生】，恢复了 80% 生命，战斗继续！", "system");
        updateUI();
        return false;
      }

      winBattle();
      return true;
    }

    function playCard(uid) {
      if (state.inShop || state.gameOver) return;

      const index = state.hand.findIndex(c => c.uid === uid);
      if (index === -1) return;

      const card = state.hand[index];
      if (state.player.energy < card.cost) {
        log("能量不足。", "system");
        return;
      }

      state.player.energy -= card.cost;

      const playerBlindMiss =
        ["attack", "holy_hammer", "flame_slash", "mercy_palm", "cannon"].includes(card.type) &&
        state.player.blindTurns > 0 &&
        Math.random() < 0.45;

      if (playerBlindMiss) {
        log(`你因为致盲效果，使用【${card.name}】时攻击落空。`, "system");
        state.player.blindTurns--;
        state.hand.splice(index, 1);
        updateUI();
        return;
      }

      if (card.type === "attack") {
        let dmg = card.value;
        let critText = "";
        if (state.upgrades.critRate > 0 && chance(state.upgrades.critRate)) {
          dmg = Math.floor(dmg * 1.6);
          critText = "（暴击）";
        }
        applyDamageToMonster(dmg, `你使用【${card.name}】${critText}，造成 ${dmg} 点伤害。`);
        playSfx("attack");

        if (state.upgrades.doubleStrike > 0 && state.currentMonster.hp > 0 && chance(state.upgrades.doubleStrike)) {
          const extra = Math.floor(card.value * 0.7);
          applyDamageToMonster(extra, `连击触发，再造成 ${extra} 点伤害。`);
          playSfx("attack");
        }
      }

      if (card.type === "defense") {
        state.player.shield += card.value;
        log(`你使用【${card.name}】，获得 ${card.value} 点护盾。`, "shield");
        playSfx("shield");
      }

      if (card.type === "heal") {
        const before = state.player.hp;
        state.player.hp = Math.min(state.player.maxHp, state.player.hp + card.value);
        log(`你使用【${card.name}】，恢复 ${state.player.hp - before} 点生命。`, "heal");
        playSfx("heal");
      }

      if (card.type === "holy_hammer") {
        applyDamageToMonster(card.damageValue, `你使用【神圣锤】，造成 ${card.damageValue} 点伤害。`);
        const before = state.player.hp;
        state.player.hp = Math.min(state.player.maxHp, state.player.hp + card.healValue);
        logAppend(`神圣之力恢复了 ${state.player.hp - before} 点生命。`, "heal");
        playSfx("attack");
        playSfx("heal");
      }

      if (card.type === "burst_shield") {
        state.player.specialShield = card.shieldValue;
        state.player.specialShieldTurns = 3;
        state.player.specialShieldBomb = card.bombValue;
        log(`你使用【爆裂神盾】，获得 ${card.shieldValue} 点独立护盾，3回合后若未耗尽会爆炸。`, "shield");
        playSfx("shield");
      }

      if (card.type === "flame_slash") {
        applyDamageToMonster(card.damageValue, `你使用【烈焰斩】，造成 ${card.damageValue} 点伤害。`);
        if (chance(card.burnChance) && state.currentMonster.hp > 0) {
          state.currentMonster.skills.burnDamage = card.burnDamage;
          state.currentMonster.skills.burnTurns = card.burnTurns;
          logAppend(`怪物进入燃烧状态，接下来 ${card.burnTurns} 回合每回合受到 ${card.burnDamage} 点伤害。`, "attack");
        }
        playSfx("attack");
      }

      if (card.type === "shadow_step") {
        state.player.dodgeChance = Math.min(0.65, state.player.dodgeChance + card.dodgeGain);
        log(`你使用【暗影步】，本关卡闪避几率提升 ${(card.dodgeGain * 100).toFixed(0)}%。`, "system");
      }

      if (card.type === "mercy_water") {
        const before = state.player.hp;
        state.player.hp = Math.min(state.player.maxHp, state.player.hp + card.healValue);
        state.player.regenHot = card.hotValue;
        state.player.regenHotTurns = card.hotTurns;
        log(`你使用【我佛慈悲水】，恢复 ${state.player.hp - before} 点生命，并获得 ${card.hotTurns} 回合持续治疗。`, "heal");
        playSfx("heal");
      }

      if (card.type === "mercy_palm") {
        applyDamageToMonster(card.damageValue, `你使用【大慈大悲掌】，造成 ${card.damageValue} 点伤害。`);
        state.currentMonster.skills.monsterBlindTurns = card.blindTurns;
        logAppend(`怪物被致盲，接下来 ${card.blindTurns} 回合攻击有几率失误。`, "system");
        playSfx("attack");
      }

      if (card.type === "cannon") {
        applyDamageToMonster(card.damageValue, `你使用【加农炮】，造成 ${card.damageValue} 点大量伤害。`);
        if (chance(card.selfDamageChance)) {
          state.player.hp = Math.max(1, state.player.hp - card.selfDamage);
          logAppend(`后座力反噬，你受到 ${card.selfDamage} 点伤害。`, "monster");
        }
        playSfx("attack");
      }

      state.hand.splice(index, 1);

      if (state.player.blindTurns > 0 && !playerBlindMiss) {
        state.player.blindTurns--;
      }

      if (handleMonsterDefeat()) return;
      updateUI();
    }

    function endTurn() {
      if (state.inShop || state.gameOver) return;
      monsterTurn();
    }

    function monsterTurn() {
      if (state.currentMonster.hp <= 0) return;

      state.turnLabel = "怪物回合";
      const monster = state.currentMonster;
      const skills = monster.skills;

      if (skills.burnTurns > 0) {
        monster.hp -= skills.burnDamage;
        if (monster.hp < 0) monster.hp = 0;
        skills.burnTurns--;
        log(`燃烧效果发动，怪物受到 ${skills.burnDamage} 点持续伤害。`, "attack");
        if (handleMonsterDefeat()) return;
      }

      if (skills.healChance > 0 && chance(skills.healChance) && monster.hp > 0) {
        const healValue = Math.floor(monster.maxHp * skills.healPercent);
        monster.hp = Math.min(monster.maxHp, monster.hp + healValue);
        logAppend(`怪物发动治疗，恢复 ${healValue} 点生命。`, "heal");
      }

      let hitCount = 1;
      if (skills.multiAttackChance > 0 && chance(skills.multiAttackChance)) {
        hitCount = skills.multiAttackHits;
        logAppend(`怪物发动连续攻击，将攻击 ${hitCount} 次。`, "monster");
      }

      for (let i = 0; i < hitCount; i++) {
        if (state.player.hp <= 0) break;

        if (skills.monsterBlindTurns > 0 && chance(0.45)) {
          logAppend("怪物因为致盲，攻击失误。", "system");
          continue;
        }

        if (state.player.dodgeChance > 0 && chance(state.player.dodgeChance)) {
          logAppend("你成功闪避了怪物的攻击。", "system");
          continue;
        }

        let incoming = monster.atk;
        const isTrueDamage = skills.trueDamageChance > 0 && chance(skills.trueDamageChance);

        if (isTrueDamage) {
          state.player.hp -= incoming;
          if (state.player.hp < 0) state.player.hp = 0;
          logAppend(`怪物发动真实伤害，无视护盾，造成 ${incoming} 点伤害。`, "monster");
        } else {
          let remain = incoming;

          if (state.player.specialShield > 0) {
            const takeSpecial = Math.min(state.player.specialShield, remain);
            state.player.specialShield -= takeSpecial;
            remain -= takeSpecial;
          }

          if (remain > 0 && state.player.shield > 0) {
            const takeShield = Math.min(state.player.shield, remain);
            state.player.shield -= takeShield;
            remain -= takeShield;
          }

          if (remain > 0) {
            state.player.hp -= remain;
            if (state.player.hp < 0) state.player.hp = 0;
          }

          logAppend(`怪物攻击你，造成 ${incoming} 点伤害。`, "monster");
        }

        if (skills.blindChance > 0 && chance(skills.blindChance)) {
          state.player.blindTurns = Math.max(state.player.blindTurns, skills.blindTurns);
          logAppend(`你被致盲了，接下来 ${skills.blindTurns} 回合攻击有几率失误。`, "system");
        }

        if (skills.poisonChance > 0 && chance(skills.poisonChance)) {
          state.player.poisonDamage = skills.poisonDamage;
          state.player.poisonTurns = skills.poisonTurns;
          logAppend(`你中毒了，接下来 ${skills.poisonTurns} 回合每回合受到 ${skills.poisonDamage} 点伤害。`, "monster");
        }
      }

      if (skills.monsterBlindTurns > 0) {
        skills.monsterBlindTurns--;
      }

      if (state.player.hp <= 0) {
        state.gameOver = true;
        showGameOver(false);
        updateUI();
        return;
      }

      if (state.player.poisonTurns > 0) {
        state.player.hp -= state.player.poisonDamage;
        if (state.player.hp < 0) state.player.hp = 0;
        state.player.poisonTurns--;
        logAppend(`中毒效果发动，你受到 ${state.player.poisonDamage} 点伤害。`, "monster");
      }

      if (state.player.hp <= 0) {
        state.gameOver = true;
        showGameOver(false);
        updateUI();
        return;
      }

      if (state.player.regenHotTurns > 0) {
        const before = state.player.hp;
        state.player.hp = Math.min(state.player.maxHp, state.player.hp + state.player.regenHot);
        state.player.regenHotTurns--;
        logAppend(`持续治疗发动，恢复 ${state.player.hp - before} 点生命。`, "heal");
      }

      if (state.player.specialShieldTurns > 0) {
        state.player.specialShieldTurns--;
        if (state.player.specialShieldTurns === 0 && state.player.specialShield > 0 && monster.hp > 0) {
          monster.hp -= state.player.specialShieldBomb;
          if (monster.hp < 0) monster.hp = 0;
          logAppend(`爆裂神盾引爆，对怪物造成 ${state.player.specialShieldBomb} 点伤害。`, "attack");
          state.player.specialShield = 0;
          if (handleMonsterDefeat()) return;
        }
      }

      if (state.upgrades.regen > 0) {
        const before = state.player.hp;
        state.player.hp = Math.min(state.player.maxHp, state.player.hp + state.upgrades.regen);
        logAppend(`持续治疗发动，恢复 ${state.player.hp - before} 点生命。`, "heal");
      }

      state.player.energy = state.player.maxEnergy;
      state.turnLabel = "玩家回合";
      drawNewHand();
      logAppend("新的回合开始，你获得了新的随机手牌，能量已补满。", "system");

      updateUI();
    }

    function winBattle() {
      const clearedLevel = state.level;
      const reward = getReward(clearedLevel);

      state.gold += reward;
      state.player.shield = 0;
      state.player.specialShield = 0;
      state.player.specialShieldTurns = 0;
      state.hand = [];
      state.justClearedLevel = clearedLevel;
      state.pendingShop = clearedLevel % 3 === 0;

      log(`你击败了【${state.currentMonster.name}】！获得 ${reward} 金币。`, "system");

      if (clearedLevel >= 50) {
        state.gameOver = true;
        showGameOver(true);
        updateUI();
        return;
      }

      document.getElementById("levelClearTitle").textContent = `第 ${clearedLevel} 关通关`;
      document.getElementById("levelClearDesc").textContent = `恭喜 ${state.playerName} 成功通过第 ${clearedLevel} 关！获得 ${reward} 金币。`;
      document.getElementById("levelClearModal").classList.add("show");

      updateUI();
    }

    function continueAfterClear() {
      document.getElementById("levelClearModal").classList.remove("show");
      state.level += 1;

      if (state.pendingShop) {
        state.pendingShop = false;
        openShop();
        return;
      }

      startLevel();
    }

    function startLevel(isFirst = false) {
      state.inShop = false;
      closeShopOverlayOnly();
      state.currentMonster = createMonster(state.level);
      state.player.energy = state.player.maxEnergy;
      state.player.shield = 0;
      state.player.specialShield = 0;
      state.player.specialShieldTurns = 0;
      state.player.specialShieldBomb = 0;
      state.player.dodgeChance = 0;
      state.player.blindTurns = 0;
      state.player.poisonTurns = 0;
      state.player.poisonDamage = 0;
      state.turnLabel = "玩家回合";
      drawNewHand();

      if (!isFirst) {
        log(`进入第 ${state.level} 关：${state.currentMonster.name}`, "system");
      }

      updateUI();
    }

    function getShopPrice(minBase, maxBase) {
      const base = randomInt(minBase, maxBase);
      const raise = Math.floor((state.level - 1) / 3) * 2;
      return base + raise;
    }

    function openShop() {
      state.inShop = true;

      const pool = [
        {
          title: "增加能量球",
          desc: "能量上限 +1，并立即补满。",
          getCost: () => getShopPrice(18, 28),
          action: () => {
            state.player.maxEnergy += 1;
            state.player.energy = state.player.maxEnergy;
            log("购买成功：能量上限 +1。", "system");
          }
        },
        {
          title: "升级攻击卡",
          desc: "所有基础攻击牌伤害 +4。",
          getCost: () => getShopPrice(18, 28),
          action: () => {
            state.upgrades.atkBonus += 4;
            log("购买成功：攻击牌强化。", "system");
          }
        },
        {
          title: "升级防御卡",
          desc: "所有基础防御牌护盾 +4。",
          getCost: () => getShopPrice(18, 28),
          action: () => {
            state.upgrades.defBonus += 4;
            log("购买成功：防御牌强化。", "system");
          }
        },
        {
          title: "升级治疗卡",
          desc: "所有基础治疗牌恢复 +4。",
          getCost: () => getShopPrice(18, 28),
          action: () => {
            state.upgrades.healBonus += 4;
            log("购买成功：治疗牌强化。", "system");
          }
        },
        {
          title: "附加效果：暴击",
          desc: "攻击牌增加 12% 暴击机率。",
          getCost: () => getShopPrice(24, 36),
          action: () => {
            state.upgrades.critRate = Math.min(0.5, state.upgrades.critRate + 0.12);
            log("购买成功：获得暴击效果。", "system");
          }
        },
        {
          title: "附加效果：持续治疗",
          desc: "每回合结束后恢复 6 点生命。",
          getCost: () => getShopPrice(24, 36),
          action: () => {
            state.upgrades.regen += 6;
            log("购买成功：获得持续治疗效果。", "system");
          }
        },
        {
          title: "附加效果：连击",
          desc: "攻击牌增加 18% 连击机率。",
          getCost: () => getShopPrice(24, 36),
          action: () => {
            state.upgrades.doubleStrike = Math.min(0.45, state.upgrades.doubleStrike + 0.18);
            log("购买成功：获得连击效果。", "system");
          }
        },
        {
          title: "增加血量上限",
          desc: "最大生命 +20，并恢复 20 HP。",
          getCost: () => getShopPrice(20, 30),
          action: () => {
            state.player.maxHp += 20;
            state.player.hp = Math.min(state.player.maxHp, state.player.hp + 20);
            log("购买成功：血量上限提升。", "system");
          }
        },
        {
          title: "补血",
          desc: "立即恢复 35 HP。",
          getCost: () => getShopPrice(14, 22),
          action: () => {
            const before = state.player.hp;
            state.player.hp = Math.min(state.player.maxHp, state.player.hp + 35);
            log(`购买成功：恢复 ${state.player.hp - before} 点生命。`, "heal");
          }
        },

          title: "效果牌：神圣锤",

          getCost: () => getShopPrice(22, 34),

            state.ownedSpecialCards.push({
              id: `holy_hammer_${Date.now()}_${Math.random()}`,

              type: "holy_hammer",
              cardType: "效果牌",

              healValue: 8 + Math.floor(state.level * 0.25),
              cost: 2,

            });
            log("购买成功：神圣锤加入牌池。", "system");
          }
        },
        {
          title: "效果牌：爆裂神盾",
          desc: "可重复购买。提供独立护盾，3回合后若未耗尽则爆炸。",
          getCost: () => getShopPrice(24, 36),
          action: () => {
            state.ownedSpecialCards.push({
              id: `burst_shield_${Date.now()}_${Math.random()}`,
              name: "爆裂神盾",
              type: "burst_shield",
              cardType: "效果牌",
              shieldValue: 30 + Math.floor(state.level * 0.7),
              bombValue: 22 + Math.floor(state.level * 0.6),
              cost: 2,
              desc: "提供独立护盾，3回合后若未耗尽则爆炸伤敌"
            });
            log("购买成功：爆裂神盾加入牌池。", "system");
          }
        },
        {
          title: "效果牌：烈焰斩",
          desc: "可重复购买。造成伤害，并几率附加燃烧。",
          getCost: () => getShopPrice(22, 34),
          action: () => {
            state.ownedSpecialCards.push({
              id: `flame_slash_${Date.now()}_${Math.random()}`,
              name: "烈焰斩",
              type: "flame_slash",
              cardType: "效果牌",
              damageValue: 15 + Math.floor(state.level * 0.65),
              burnChance: 0.45,
              burnDamage: 5 + Math.floor(state.level * 0.18),
              burnTurns: 4,
              cost: 2,
              desc: "造成伤害，并几率附加4回合燃烧"
            });
            log("购买成功：烈焰斩加入牌池。", "system");
          }
        },
        {
          title: "效果牌：暗影步",
          desc: "可重复购买。增加本关闪避几率。",
          getCost: () => getShopPrice(18, 28),
          action: () => {
            state.ownedSpecialCards.push({
              id: `shadow_step_${Date.now()}_${Math.random()}`,
              name: "暗影步",
              type: "shadow_step",
              cardType: "效果牌",
              dodgeGain: 0.22,
              cost: 1,
              desc: "提升本关卡内的闪避几率"
            });
            log("购买成功：暗影步加入牌池。", "system");
          }
        },
        {
          title: "效果牌：我佛慈悲水",
          desc: "可重复购买。治疗并提供5回合持续治疗。",
          getCost: () => getShopPrice(20, 30),
          action: () => {
            state.ownedSpecialCards.push({
              id: `mercy_water_${Date.now()}_${Math.random()}`,
              name: "我佛慈悲水",
              type: "mercy_water",
              cardType: "效果牌",
              healValue: 8 + Math.floor(state.level * 0.2),
              hotValue: 6 + Math.floor(state.level * 0.2),
              hotTurns: 5,
              cost: 2,
              desc: "少量治疗并提供5回合持续治疗"
            });
            log("购买成功：我佛慈悲水加入牌池。", "system");
          }
        },
        {
          title: "效果牌：大慈大悲掌",
          desc: "可重复购买。造成中等伤害并给予致盲效果。",
          getCost: () => getShopPrice(22, 34),
          action: () => {
            state.ownedSpecialCards.push({
              id: `mercy_palm_${Date.now()}_${Math.random()}`,
              name: "大慈大悲掌",
              type: "mercy_palm",
              cardType: "效果牌",
              damageValue: 16 + Math.floor(state.level * 0.55),
              blindTurns: 1,
              cost: 2,
              desc: "造成中等伤害，并使怪物几率攻击失误"
            });
            log("购买成功：大慈大悲掌加入牌池。", "system");
          }
        },
        {
          title: "效果牌：加农炮",
          desc: "可重复购买。造成大量伤害，但有几率反伤自己。",
          getCost: () => getShopPrice(24, 38),
          action: () => {
            state.ownedSpecialCards.push({
              id: `cannon_${Date.now()}_${Math.random()}`,
              name: "加农炮",
              type: "cannon",
              cardType: "效果牌",
              damageValue: 30 + Math.floor(state.level * 0.8),
              selfDamageChance: 0.3,
              selfDamage: 6 + Math.floor(state.level * 0.15),
              cost: 3,
              desc: "造成大量伤害，但有几率反伤自己"
            });
            log("购买成功：加农炮加入牌池。", "system");
          }
        }
      ];

      const selected = [];
      while (selected.length < 3) {
        const pick = pool[randomInt(0, pool.length - 1)];
        if (!selected.includes(pick)) selected.push(pick);
      }

      const shopOptions = document.getElementById("shopOptions");
      shopOptions.innerHTML = "";

      selected.forEach(item => {
        const cost = item.getCost();
        const canBuy = state.gold >= cost;

        const div = document.createElement("div");
        div.className = "shop-item";
        div.innerHTML = `
          <h3>${item.title}</h3>
          <div class="shop-desc">${item.desc}</div>
          <div class="shop-price">价格：${cost} 金币</div>
          <button class="modal-btn" ${canBuy ? "" : "disabled"}>购买</button>
        `;

        div.querySelector("button").onclick = () => buyItem(item, cost);
        shopOptions.appendChild(div);
      });

      document.getElementById("shopModal").classList.add("show");
      updateUI();
    }

    function closeShopOverlayOnly() {
      document.getElementById("shopModal").classList.remove("show");
    }

    function closeShop() {
      if (!state.inShop) return;
      state.inShop = false;
      closeShopOverlayOnly();
      log("你离开了商店。", "system");
      startLevel();
    }

    function buyItem(item, cost) {
      if (!state.inShop) return;
      if (state.gold < cost) {
        log("金币不足。", "system");
        return;
      }

      state.gold -= cost;
      item.action();
      state.inShop = false;
      closeShopOverlayOnly();
      startLevel();
    }

    function showGameOver(isWin) {
      const title = document.getElementById("gameOverTitle");
      const desc = document.getElementById("gameOverDesc");

      if (isWin) {
        title.textContent = "全部通关";
        desc.textContent = `${state.playerName} 成功通过全部 50 关。`;
        logAppend("恭喜你通过全部 50 关！", "system");
      } else {
        title.textContent = "角色死亡";
        desc.textContent = `${state.playerName} 在第 ${state.level} 关倒下了。`;
        logAppend("你被击败了，游戏结束。", "monster");
      }

      document.getElementById("gameOverModal").classList.add("show");
    }

    function restartFromModal() {
      document.getElementById("gameOverModal").classList.remove("show");
      document.getElementById("levelClearModal").classList.remove("show");
      document.getElementById("shopModal").classList.remove("show");
      document.getElementById("setupModal").classList.add("show");
      document.getElementById("playerNameInput").value = state.playerName || "";
      initGame();
      applyPlayerIdentity();
      renderAvatarChoices();
      updateUI();
    }

    function updateMonsterSkillsUI() {
      const box = document.getElementById("monsterSkillsBox");
      box.innerHTML = "";
      const s = state.currentMonster.skills;
      const tags = [];

      if (s.trueDamageChance > 0) tags.push("真实伤害");
      if (s.multiAttackChance > 0) tags.push("连续攻击");
      if (s.healChance > 0) tags.push("治疗");
      if (s.blindChance > 0) tags.push("致盲");
      if (s.tenacityChance > 0) tags.push("坚韧");
      if (s.rebirth) tags.push("重生");
      if (s.poisonChance > 0) tags.push("中毒");

      tags.forEach(t => {
        const span = document.createElement("span");
        span.className = "skill-tag";
        span.textContent = t;
        box.appendChild(span);
      });
    }

    function updateUI() {
      applyPlayerIdentity();

      document.getElementById("levelText").textContent = `${state.level}/50`;
      document.getElementById("goldText").textContent = state.gold;
      document.getElementById("handCountText").textContent = String(state.hand.length);
      document.getElementById("battleTurnText").textContent = state.turnLabel;
      document.getElementById("shopHintText").textContent = state.pendingShop ? "通关后开启" : "未开启";

      document.getElementById("playerHpText").textContent = state.player.hp;
      document.getElementById("playerMaxHpText").textContent = state.player.maxHp;
      document.getElementById("playerShieldText").textContent = state.player.shield + state.player.specialShield;
      document.getElementById("energyText").textContent = state.player.energy;
      document.getElementById("energyMaxText").textContent = state.player.maxEnergy;

      document.getElementById("playerHpBar").style.width = `${(state.player.hp / state.player.maxHp) * 100}%`;
      document.getElementById("energyBar").style.width = `${(state.player.energy / state.player.maxEnergy) * 100}%`;

      if (state.currentMonster) {
        document.getElementById("monsterNameText").textContent = state.currentMonster.name;
        document.getElementById("monsterTypeText").textContent = state.currentMonster.type;
        document.getElementById("monsterEmojiText").textContent = state.currentMonster.emoji;
        document.getElementById("monsterHpText").textContent = state.currentMonster.hp;
        document.getElementById("monsterMaxHpText").textContent = state.currentMonster.maxHp;
        document.getElementById("monsterAtkText").textContent = state.currentMonster.atk;
        document.getElementById("monsterHpBar").style.width = `${(state.currentMonster.hp / state.currentMonster.maxHp) * 100}%`;
        document.getElementById("monsterInfoText").textContent = `${state.currentMonster.note} 当前攻击力为 ${state.currentMonster.atk}。`;
        updateMonsterSkillsUI();
      }

      document.getElementById("heroInfoText").textContent =
        `已拥有特殊卡 ${state.ownedSpecialCards.length} 张，闪避率 ${(state.player.dodgeChance * 100).toFixed(0)}%，中毒剩余 ${state.player.poisonTurns} 回合。`;

      document.getElementById("endTurnBtn").disabled = state.inShop || state.gameOver;
      renderCards();
      renderLogs();
    }

    function classifyLog(text, type) {
      if (type) return type;
      if (text.includes("伤害")) return "attack";
      if (text.includes("恢复")) return "heal";
      if (text.includes("护盾")) return "shield";
      return "normal";
    }

    function renderLogs() {
      const box = document.getElementById("logBox");
      if (!box) return;
      box.innerHTML = "";

      if (logEntries.length === 0) {
        box.textContent = "游戏开始，准备战斗。";
        return;
      }

      logEntries.forEach(item => {
        const div = document.createElement("div");
        div.className = `log-line log-${item.type}`;
        div.textContent = item.text;
        box.appendChild(div);
      });

      box.scrollTop = box.scrollHeight;
    }

    function log(text, type = null) {
      logEntries = [{ text, type: classifyLog(text, type) }];
      renderLogs();
    }

    function logAppend(text, type = null) {
      logEntries.push({ text, type: classifyLog(text, type) });
      if (logEntries.length > 10) {
        logEntries = logEntries.slice(logEntries.length - 10);
      }
      renderLogs();
    }

    function initAudio() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (AudioContextClass && !audioCtx) {
        audioCtx = new AudioContextClass();
      }

      const bgm = document.getElementById("bgmPlayer");
      bgm.volume = musicVolume;

      document.getElementById("musicVolumeSlider").oninput = (e) => {
        musicVolume = Number(e.target.value) / 100;
        bgm.volume = musicVolume;
      };

      document.getElementById("sfxVolumeSlider").oninput = (e) => {
        sfxVolume = Number(e.target.value) / 100;
      };
    }

    function playBgm() {
      const bgm = document.getElementById("bgmPlayer");
      bgm.volume = musicVolume;
      bgm.play().catch(() => {});
    }

    function playTone(freq, duration, type = "sine", volume = 0.08, when = 0) {
      if (!audioCtx) return;
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      const now = audioCtx.currentTime + when;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume * sfxVolume), now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + duration + 0.03);
    }

    function playSfx(kind) {
      if (!audioCtx) return;

      if (kind === "attack") {
        playTone(260, 0.08, "sawtooth", 0.18, 0);
        playTone(180, 0.12, "triangle", 0.14, 0.03);
      }

      if (kind === "heal") {
        playTone(523.25, 0.18, "sine", 0.16, 0);
        playTone(659.25, 0.18, "sine", 0.13, 0.06);
      }

      if (kind === "shield") {
        playTone(246.94, 0.12, "square", 0.14, 0);
        playTone(293.66, 0.12, "square", 0.12, 0.08);
      }

      if (kind === "monster") {
        playTone(130.81, 0.15, "sawtooth", 0.18, 0);
        playTone(98, 0.18, "triangle", 0.15, 0.04);
      }
    }

    initGame();
    renderAvatarChoices();
    applyPlayerIdentity();
    updateUI();
  </script>
</body>
</html>
