<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BE(BG) 貓頭鷹對帳工具</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0b1018;
  --card: #121a26;
  --line: #243246;
  --text: #d8e6f5;
  --sub: #89a2bb;
  --gold: #ffcc73;
  --green: #65e0b8;
  --red: #ff7d96;
  --blue1: #4eb5ff;
  --blue2: #52f1c4;
  --shadow: 0 12px 32px rgba(0,0,0,.38);
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at top, #1d2c42 0%, #0b1018 58%);
  font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
  color: var(--text);
}

.page {
  max-width: 1500px;
  margin: auto;
  padding: 20px;
}

.header {
  position: relative;
  background: rgba(18,26,38,.96);
  border: 1px solid var(--line);
  border-radius: 28px;
  padding: 30px;
  margin-bottom: 20px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.owl-bg {
  position: absolute;
  right: -30px;
  top: -30px;
  font-size: 220px;
  opacity: .06;
}

.title {
  font-size: 40px;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 2px;
}

.desc {
  margin-top: 12px;
  color: var(--sub);
  line-height: 1.8;
}

.main {
  display: grid;
  grid-template-columns: minmax(320px,1fr) 150px minmax(320px,1fr);
  gap: 20px;
}

.panel {
  background: rgba(18,26,38,.96);
  border: 1px solid var(--line);
  border-radius: 28px;
  padding: 20px;
  min-height: 720px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
}

.panel-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}

.panel-title h2 {
  font-size: 24px;
  color: var(--gold);
}

textarea {
  flex: 1;
  width: 100%;
  min-height: 600px;
  resize: none;
  border-radius: 22px;
  padding: 20px;
  background: #0f1723;
  color: #dce9f7;
  font-size: 15px;
  line-height: 1.8;
  border: 1px solid #223044;
  outline: none;
}

textarea::placeholder {
  color: #6e87a0;
}

.button-area {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
}

button {
  width: 140px;
  border: none;
  border-radius: 20px;
  padding: 18px 15px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 900;
  transition: .25s;
  color: #fff;
}

button:hover {
  transform: translateY(-3px) scale(1.03);
}

.show-btn {
  background: linear-gradient(135deg, var(--blue1), var(--blue2));
  box-shadow: 0 10px 25px rgba(82,241,196,.25);
}

.clear-btn {
  background: linear-gradient(135deg, #ff8ba5, #ffc488);
  box-shadow: 0 10px 25px rgba(255,139,165,.25);
}

.result-wrap {
  flex: 1;
  border-radius: 22px;
  background: #0f1723;
  border: 1px solid #223044;
  overflow: auto;
  padding: 16px;
}

.placeholder,
.empty-state {
  min-height: 580px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #7189a1;
  line-height: 2;
}

.result-header {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.badge {
  background: #162334;
  border: 1px solid #29415f;
  color: #9ec9ff;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 800;
}

.table-scroll {
  overflow: auto;
  border-radius: 18px;
}

table {
  width: 100%;
  min-width: 450px;
  border-collapse: collapse;
}

thead th {
  background: #172537;
  color: var(--gold);
  padding: 16px;
  text-align: left;
  font-size: 15px;
  border-bottom: 1px solid #24364f;
}

tbody td {
  padding: 16px;
  border-bottom: 1px solid #1e2d42;
  font-size: 15px;
}

tbody tr:hover {
  background: #162233;
}

.text-right {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.positive {
  color: var(--green);
  font-weight: 900;
}

.negative {
  color: var(--red);
  font-weight: 900;
}

.footer {
  margin-top: 18px;
  text-align: center;
  color: #61768d;
  font-size: 13px;
}

@media(max-width:1100px) {
  .main {
    grid-template-columns: 1fr;
  }

  .button-area {
    flex-direction: row;
    justify-content: center;
  }

  .panel {
    min-height: auto;
  }

  textarea {
    min-height: 350px;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="header">
    <div class="owl-bg">🦉</div>

    <div class="title">🦉 BE(BG) 貓頭鷹對帳工具</div>

    <div class="desc">
      貼上原始資料後，自動辨識「日期 / 代理帳號 / 代理損益金額」。<br>
      支援橫向表頭，也支援從遊戲商複製後變成直向表頭的格式。
    </div>
  </div>

  <div class="main">

    <div class="panel">
      <div class="panel-title">
        <div>📄</div>
        <h2>原始資料</h2>
      </div>

      <textarea id="inputData" placeholder="請貼上 BE(BG) 原始資料..."></textarea>
    </div>

    <div class="button-area">
      <button class="show-btn" onclick="processData()">顯示結果</button>
      <button class="clear-btn" onclick="clearAll()">清除資料</button>
    </div>

    <div class="panel">
      <div class="panel-title">
        <div>🦉</div>
        <h2>整理結果</h2>
      </div>

      <div id="resultBox" class="result-wrap">
        <div class="placeholder">整理後的結果會顯示在這裡</div>
      </div>
    </div>

  </div>

  <div class="footer">
    Owl Style UI ・ Auto Parse ・ BE(BG)
  </div>

</div>

<script>
function clearAll() {
  document.getElementById("inputData").value = "";

  document.getElementById("resultBox").innerHTML = `
    <div class="placeholder">整理後的結果會顯示在這裡</div>
  `;
}

function processData() {
  const input = document.getElementById("inputData").value.trim();
  const resultBox = document.getElementById("resultBox");

  if (!input) {
    resultBox.innerHTML = `<div class="empty-state">請輸入資料</div>`;
    return;
  }

  const lines = input
    .split(/\n+/)
    .map(line => line.trim())
    .filter(Boolean);

  const parsed = parseInput(lines);

  if (!parsed) {
    resultBox.innerHTML = `
      <div class="empty-state">
        找不到標題列，請確認資料內有「日期 / 代理帳號 / 代理損益金額」
      </div>
    `;
    return;
  }

  const header = parsed.header;
  const dataStartIndex = parsed.dataStartIndex;

  const dateIndex = findHeaderIndex(header, ["日期"]);

  const agentIndex = findHeaderIndex(header, [
    "代理帳號",
    "代理帐号",
    "代理账号"
  ]);

  const profitIndex = findHeaderIndex(header, [
    "代理損益金額",
    "代理损益金额",
    "代理損益",
    "代理损益"
  ]);

  if (dateIndex === -1 || agentIndex === -1 || profitIndex === -1) {
    resultBox.innerHTML = `
      <div class="empty-state">
        找不到必要欄位：日期 / 代理帳號 / 代理損益金額
      </div>
    `;
    return;
  }

  const dataMap = {};
  const dateSet = new Set();

  for (let i = dataStartIndex; i < lines.length; i++) {
    const row = lines[i].split(/\s+/);

    const date = row[dateIndex];
    const agent = row[agentIndex];
    const profitRaw = row[profitIndex];

    if (!date || !agent || !profitRaw) continue;
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) continue;

    const profit = parseNumber(profitRaw);

    if (isNaN(profit)) continue;

    dateSet.add(date);

    if (!dataMap[agent]) {
      dataMap[agent] = 0;
    }

    dataMap[agent] += profit;
  }

  const dates = Array.from(dateSet).sort();
  const agents = Object.keys(dataMap).sort();

  if (!dates.length || !agents.length) {
    resultBox.innerHTML = `
      <div class="empty-state">
        未抓到有效資料，請確認資料格式是否正確
      </div>
    `;
    return;
  }

  const startDate = dates[0];
  const endDate = dates[dates.length - 1];

  const rowsHtml = agents.map(agent => {
    const value = dataMap[agent];
    const cls = value < 0 ? "negative" : "positive";

    return `
      <tr>
        <td>${escapeHtml(agent)}</td>
        <td class="text-right ${cls}">${formatNumber(value)}</td>
      </tr>
    `;
  }).join("");

  resultBox.innerHTML = `
    <div class="result-header">
      <div class="badge">📅 ${startDate} ~ ${endDate}</div>
      <div class="badge">🦉 共 ${agents.length} 個代理帳號</div>
    </div>

    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>代理帳號</th>
            <th class="text-right">代理損益金額</th>
          </tr>
        </thead>
        <tbody>
          ${rowsHtml}
        </tbody>
      </table>
    </div>
  `;
}

function parseInput(lines) {
  const dateLineIndex = lines.findIndex(line => {
    const parts = line.split(/\s+/);
    return parts.some(part => normalize(part) === normalize("日期"));
  });

  if (dateLineIndex === -1) {
    return null;
  }

  const firstLineParts = lines[dateLineIndex].split(/\s+/);

  const isHorizontalHeader =
    firstLineParts.length > 1 &&
    firstLineParts.some(part => normalize(part).includes(normalize("代理"))) &&
    firstLineParts.some(part => normalize(part).includes(normalize("損益")));

  if (isHorizontalHeader) {
    return {
      header: firstLineParts,
      dataStartIndex: dateLineIndex + 1
    };
  }

  const header = [];

  for (let i = dateLineIndex; i < lines.length; i++) {
    const line = lines[i].trim();

    if (/^\d{4}-\d{2}-\d{2}/.test(line)) {
      return {
        header: header,
        dataStartIndex: i
      };
    }

    header.push(line);
  }

  return null;
}

function findHeaderIndex(header, names) {
  return header.findIndex(item => {
    const clean = normalize(item);

    return names.some(name => {
      return clean === normalize(name);
    });
  });
}

function normalize(str) {
  return String(str)
    .replace(/\s+/g, "")
    .replace(/帳/g, "账")
    .replace(/號/g, "号")
    .replace(/損/g, "损")
    .replace(/額/g, "额")
    .replace(/臺/g, "台")
    .trim();
}

function parseNumber(value) {
  return parseFloat(
    String(value)
      .replace(/,/g, "")
      .replace(/％/g, "%")
      .trim()
  );
}

function formatNumber(num) {
  return Number(num).toLocaleString("en-US", {
    minimumFractionDigits: 4,
    maximumFractionDigits: 4
  });
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
</script>

</body>
</html>
