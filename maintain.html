<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊戲維護公告日曆</title>

<style>
*{box-sizing:border-box;font-family:"微軟正黑體",sans-serif;margin:0;padding:0}
:root{
  --bg:#111827;
  --card:#1f2937;
  --card2:#374151;
  --text:#f9fafb;
  --muted:#9ca3af;
  --main:#f59e0b;
  --border:#4b5563;
  --today:#22c55e;
  --danger:#ef4444;
}
body{
  background:radial-gradient(circle at top,#334155,#111827 55%);
  color:var(--text);
  padding:16px;
  max-width:1300px;
  margin:auto;
}
h1{
  text-align:center;
  color:var(--main);
  margin-bottom:16px;
  letter-spacing:2px;
}
.top-bar{
  display:flex;
  gap:10px;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:16px;
}
input,button{
  border:none;
  border-radius:10px;
  padding:10px 14px;
  font-size:14px;
}
input{
  width:280px;
  background:var(--card2);
  color:var(--text);
  outline:1px solid var(--border);
}
button{
  background:var(--main);
  color:#111827;
  font-weight:bold;
  cursor:pointer;
}
button:hover{filter:brightness(1.1)}
.calendar-container{
  background:rgba(31,41,55,.95);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  box-shadow:0 10px 35px rgba(0,0,0,.35);
}
.calendar-header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}
.calendar-header h2{
  min-width:180px;
  text-align:center;
}
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day-head{
  text-align:center;
  background:#475569;
  padding:8px;
  border-radius:8px;
  font-weight:bold;
}
.day{
  min-height:105px;
  border:1px solid var(--border);
  background:var(--card);
  border-radius:12px;
  padding:8px;
  position:relative;
  cursor:pointer;
  transition:.2s;
}
.day:hover{
  transform:translateY(-2px);
  border-color:var(--main);
}
.empty{
  opacity:.25;
  cursor:default;
}
.day-num{
  font-weight:bold;
  font-size:15px;
}
.has{
  background:#3b2f18;
  border-color:var(--main);
}
.badge{
  position:absolute;
  top:7px;
  right:7px;
  background:var(--danger);
  color:white;
  width:22px;
  height:22px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:bold;
}
.today{
  border:2px solid var(--today);
}
.today .day-num{
  color:var(--today);
}
.past{
  opacity:.55;
}
.small-title{
  margin-top:8px;
  font-size:12px;
  color:#fcd34d;
  line-height:1.35;
}
.loading{
  text-align:center;
  color:var(--muted);
  padding:24px;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.78);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.modal-box{
  background:var(--card);
  border:1px solid var(--border);
  width:92%;
  max-width:760px;
  max-height:84vh;
  overflow:auto;
  border-radius:18px;
  padding:20px;
}
.modal-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
  padding-bottom:12px;
  margin-bottom:14px;
}
.close{
  background:none;
  color:white;
  font-size:26px;
  cursor:pointer;
}
.notice{
  background:#374151;
  border-left:5px solid var(--main);
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;
}
.tag{
  display:inline-block;
  padding:3px 8px;
  border-radius:6px;
  margin-right:6px;
  color:white;
  font-size:12px;
}
.真人{background:#db2777}
.電子{background:#7c3aed}
.體育{background:#16a34a}
.電競{background:#ea580c}
.棋牌{background:#2563eb}
.捕魚{background:#0891b2}
.其他{background:#64748b}
.notice-text{
  white-space:pre-line;
  line-height:1.6;
  color:#e5e7eb;
  margin-top:8px;
}
@media(max-width:700px){
  .calendar-grid{gap:4px}
  .day{min-height:82px;padding:6px}
  .small-title{display:none}
}
</style>
</head>

<body>

<h1>🦉 遊戲維護公告日曆</h1>

<div class="top-bar">
  <input id="searchInput" placeholder="搜尋平台 / 遊戲 / 公告內容">
  <button onclick="searchNotice()">搜尋</button>
  <button onclick="clearSearch()">清除</button>
  <button onclick="loadData()">重新載入</button>
  <button onclick="location.href='https://0urrigvojb.github.io/bng-tools/'">回首頁</button>
</div>

<div class="calendar-container">
  <div class="calendar-header">
    <button onclick="changeMonth(-1)">上一月</button>
    <h2 id="monthTitle"></h2>
    <button onclick="changeMonth(1)">下一月</button>
  </div>

  <div class="calendar-grid" id="calendarGrid">
    <div class="day-head">一</div>
    <div class="day-head">二</div>
    <div class="day-head">三</div>
    <div class="day-head">四</div>
    <div class="day-head">五</div>
    <div class="day-head">六</div>
    <div class="day-head">日</div>
  </div>

  <div class="loading" id="loading">資料載入中...</div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalTitle"></h3>
      <button class="close" onclick="closeModal()">×</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwKs1mB1-P5Yk0mQyyU2eHlWytuT6jdiPuPJOS1taGorETcqPqnI0vHLEVMvAoycstjHA/exec";

const YEAR = 2026;
let currentMonth = new Date().getMonth();
let allData = [];
let dateMap = {};

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb = 'jsonp_cb_' + Date.now();
    window[cb] = data => {
      resolve(data);
      delete window[cb];
      script.remove();
    };
    const script = document.createElement('script');
    script.src = url + '?callback=' + cb;
    script.onerror = reject;
    document.body.appendChild(script);
  });
}

async function loadData(){
  loading.style.display = 'block';
  loading.innerText = '資料載入中...';

  try{
    const res = await jsonp(API_URL);
    if(!res.success) throw new Error(res.message);

    allData = res.data || [];
    buildMap();
    drawCalendar();

    loading.style.display = 'none';
  }catch(err){
    loading.innerText = '讀取失敗：' + err.message;
  }
}

function buildMap(){
  dateMap = {};
  allData.forEach(item=>{
    if(!dateMap[item.dateKey]) dateMap[item.dateKey] = [];
    dateMap[item.dateKey].push(item);
  });
}

function drawCalendar(){
  while(calendarGrid.children.length > 7){
    calendarGrid.removeChild(calendarGrid.lastChild);
  }

  monthTitle.innerText = `${YEAR}年 ${currentMonth + 1}月`;

  const first = new Date(YEAR,currentMonth,1).getDay();
  const firstIndex = first === 0 ? 6 : first - 1;
  const total = new Date(YEAR,currentMonth + 1,0).getDate();

  for(let i=0;i<firstIndex;i++){
    const div = document.createElement('div');
    div.className = 'day empty';
    calendarGrid.appendChild(div);
  }

  const now = new Date();

  for(let d=1; d<=total; d++){
    const key = `${YEAR}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const list = dateMap[key] || [];

    const div = document.createElement('div');
    div.className = 'day';

    const thisDate = new Date(YEAR,currentMonth,d);
    if(thisDate < new Date(now.getFullYear(),now.getMonth(),now.getDate())) div.classList.add('past');
    if(YEAR === now.getFullYear() && currentMonth === now.getMonth() && d === now.getDate()) div.classList.add('today');
    if(list.length) div.classList.add('has');

    let html = `<div class="day-num">${d}</div>`;

    if(list.length){
      html += `<div class="badge">${list.length}</div>`;
      html += `<div class="small-title">${list[0].title}</div>`;
    }

    div.innerHTML = html;

    div.onclick = ()=>{
      if(list.length) openDay(key,list);
      else openEmpty(d);
    };

    calendarGrid.appendChild(div);
  }
}

function openDay(key,list){
  const [,m,d] = key.split('-');
  modalTitle.innerText = `${parseInt(m)}月${parseInt(d)}日 維護公告`;

  modalContent.innerHTML = list.map(item=>`
    <div class="notice">
      <div><span class="tag ${item.type}">${item.type}</span><b>${item.title}</b></div>
      <div class="notice-text">${escapeHtml(item.text)}</div>
    </div>
  `).join('');

  modal.style.display = 'flex';
}

function openEmpty(day){
  modalTitle.innerText = `${currentMonth + 1}月${day}日`;
  modalContent.innerHTML = `<div class="notice">暫無維護公告</div>`;
  modal.style.display = 'flex';
}

function searchNotice(){
  const kw = searchInput.value.trim();
  if(!kw) return;

  const list = allData.filter(item =>
    item.text.includes(kw) ||
    item.title.includes(kw) ||
    item.type.includes(kw)
  );

  modalTitle.innerText = `搜尋結果：${kw}，共 ${list.length} 則`;

  modalContent.innerHTML = list.length
    ? list.map(item=>`
      <div class="notice">
        <div><span class="tag ${item.type}">${item.type}</span><b>${item.dateKey} ${item.title}</b></div>
        <div class="notice-text">${escapeHtml(item.text)}</div>
      </div>
    `).join('')
    : `<div class="notice">找不到相關公告</div>`;

  modal.style.display = 'flex';
}

function clearSearch(){
  searchInput.value = '';
}

function changeMonth(num){
  currentMonth += num;
  if(currentMonth < 0) currentMonth = 11;
  if(currentMonth > 11) currentMonth = 0;
  drawCalendar();
}

function closeModal(){
  modal.style.display = 'none';
}

modal.onclick = e=>{
  if(e.target === modal) closeModal();
};

searchInput.addEventListener('keydown',e=>{
  if(e.key === 'Enter') searchNotice();
});

function escapeHtml(str){
  return String(str || '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

loadData();
</script>

</body>
</html>
