<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲維護公告日曆</title>
    <style>
        * {box-sizing: border-box;font-family: "微軟正黑體", sans-serif;margin:0;padding:0;}
        :root{
            --main-color:#3b82f6;
            --warn-color:#f59e0b;
            --gray-color:#6b7280;
            --bg-color:#1f2937;
            --card-bg:#374151;
            --text-color:#f3f4f6;
            --border-color:#4b5563;
            --hover-bg:#4b5563;
        }
        body {background:var(--bg-color);padding:24px;max-width:1300px;margin:0 auto;color:var(--text-color);}
        h1 {text-align:center;color:var(--main-color);margin-bottom:24px;font-size:28px;letter-spacing:2px;}
        .top-bar{display:flex;gap:12px;justify-content:center;align-items:center;margin-bottom:24px;flex-wrap:wrap;position:relative;}
        .home-btn{position:absolute;right:0;background:var(--main-color);color:#fff;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;transition:0.3s;}
        .home-btn:hover{background:#2563eb;transform:scale(1.03);}
        #searchInput{padding:12px 16px;width:340px;border:1px solid var(--border-color);border-radius:10px;font-size:15px;outline:none;transition:0.3s;background:var(--card-bg);color:var(--text-color);}
        #searchInput:focus{border-color:var(--main-color);box-shadow:0 0 0 3px rgba(59,130,246,0.2);}
        .refresh-btn{background:var(--main-color);color:#fff;border:none;padding:12px 22px;border-radius:10px;cursor:pointer;font-size:15px;transition:0.3s;}
        .refresh-btn:hover{background:#2563eb;transform:scale(1.03);}
        .calendar-container{background:var(--card-bg);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.2);padding:28px;}
        .calendar-header{text-align:center;margin-bottom:24px;}
        .calendar-header h2{font-size:22px;color:var(--text-color);}
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;}
        .calendar-day-header{text-align:center;font-weight:bold;color:var(--text-color);padding:12px;background:#4b5563;border-radius:8px;font-size:15px;}
        .calendar-day{min-height:130px;border:1px solid var(--border-color);border-radius:12px;padding:10px;position:relative;transition:0.3s;background:var(--card-bg);}
        .calendar-day:hover:not(.past-day){border-color:var(--main-color);background:var(--hover-bg);transform:translateY(-2px);}
        .calendar-day.has-notice{background:#453c24;border-color:var(--warn-color);}
        /* 過期日期置灰樣式 */
        .calendar-day.past-day{background:#1f2937;border-color:#374151;opacity:0.7;cursor:not-allowed !important;pointer-events:none;}
        .calendar-day.past-day .day-number{color:#9ca3af;}
        .day-number{font-weight:bold;color:var(--text-color);font-size:17px;margin-bottom:6px;}
        .notice-badge{position:absolute;top:8px;right:8px;background:#ef4444;color:white;border-radius:999px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(3px);}
        .modal-content{background:var(--card-bg);border-radius:20px;padding:28px;width:92%;max-width:720px;max-height:82vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,0.3);border:1px solid var(--border-color);}
        .modal-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-color);padding-bottom:14px;margin-bottom:18px;}
        .modal-header h3{font-size:20px;color:var(--text-color);}
        .modal-close{background:none;border:none;font-size:26px;cursor:pointer;color:var(--gray-color);transition:0.2s;}
        .modal-close:hover{color:#ef4444;}
        .notice-item{border-left:5px solid var(--main-color);padding:14px 18px;margin-bottom:16px;background:#4b5563;border-radius:10px;}
        .notice-title{font-weight:bold;margin-bottom:8px;font-size:16px;color:var(--text-color);}
        .notice-content{line-height:1.7;white-space:pre-line;font-size:15px;color:#d1d5db;}
        .category-tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:13px;color:#fff;margin-right:8px;}
        .category-真人{background:#db2777;}
        .category-電子{background:#7c3aed;}
        .category-體育{background:#16a34a;}
        .category-電競{background:#ea580c;}
        .category-其他{background:#64748b;}
        .loading{text-align:center;padding:40px;color:var(--gray-color);font-size:16px;}
    </style>
</head>
<body>
    <h1>遊戲維護公告專屬日曆</h1>
    <div class="top-bar">
        <a href="https://0urrigvojb.github.io/bng-tools/" class="home-btn">回首頁</a>
        <input type="text" id="searchInput" placeholder="關鍵字快速搜尋公告">
        <button class="refresh-btn" id="refreshBtn">重新載入資料</button>
    </div>
    <div class="calendar-container">
        <div class="calendar-header"><h2 id="currentMonth"></h2></div>
        <div class="calendar-grid" id="calendarGrid">
            <div class="calendar-day-header">一</div>
            <div class="calendar-day-header">二</div>
            <div class="calendar-day-header">三</div>
            <div class="calendar-day-header">四</div>
            <div class="calendar-day-header">五</div>
            <div class="calendar-day-header">六</div>
            <div class="calendar-day-header">日</div>
        </div>
        <div class="loading" id="loading">載入維護公告資料中...</div>
    </div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSXcz88U7v6PZaF3CE4L7TcoYOPGVnXsfi4mymmIBD5xhGQK_raNEeb_BRqX39-ApOIJOvP2wH66Z2p/pub?gid=0&single=true&output=csv";

const YEAR = 2026;
const SHOW_MONTH = 4;
let dateData = {};
let allList = [];
// 取得今日日期用於判斷過期
const nowDate = new Date();

modalClose.onclick = () => modalOverlay.style.display = "none";
modalOverlay.onclick = e => e.target === modalOverlay && (modalOverlay.style.display = "none");
refreshBtn.onclick = loadSheetData;
searchInput.addEventListener('input', function() {
    let key = this.value.trim();
    if (!key) return;
    let res = allList.filter(x => x.text.includes(key));
    res.length && showSearchPop(res, key);
});

// 公告文字清理
function cleanNoticeText(text) {
    return String(text || "")
        .replace(/^"+|"+$/g, "")
        .replace(/"{2,}/g, "")
        .replace(/,+$/g, "")
        .replace(/\n\s*,+\s*\n/g, "\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
}

function loadSheetData(){
    loading.style.display = "block";
    loading.innerText = "載入維護公告資料中...";
    dateData = {};
    allList = [];

    fetch(CSV_URL)
    .then(res => res.text())
    .then(csv => {
        let text = csv.replace(/""/g, '"').replace(/\r/g, "\n");
        let notices = text.match(/(?:\d{1,2}\/\d{1,2}\s*)?【[^】]+】[\s\S]*?若維護時間有任何異動[\s\S]*?謝謝\s*！?/g) || [];

        notices.forEach(noticeText => {
            let item = parseSingleCellNotice(noticeText);
            if (item) {
                if (!dateData[item.dateKey]) dateData[item.dateKey] = [];
                dateData[item.dateKey].push(item);
                allList.push(item);
            }
        });

        console.log("最終抓到公告：", allList);
        loading.style.display = "none";
        drawCalendar();
    })
    .catch(err => {
        console.error(err);
        loading.innerText = "讀取失敗：" + err.message;
    });
}

// 多格式日期解析
function parseSingleCellNotice(text){
    text = cleanNoticeText(text);

    let titleReg = /【([^】]+)】/;
    let titleMatch = text.match(titleReg);
    let title = titleMatch ? titleMatch[1] : "未知公告";

    let type = "其他";
    if (title.includes("真人")) type = "真人";
    else if (title.includes("電子")) type = "電子";
    else if (title.includes("體育")) type = "體育";
    else if (title.includes("電競")) type = "電競";

    let dateMatch = null;
    dateMatch = text.match(/^\s*0?(\d{1,2})\/0?(\d{1,2})/);

    if (!dateMatch) {
        let fullDate = text.match(/維護開始時間\s*[:：]\s*\d{4}\/0?(\d{1,2})\/0?(\d{1,2})/);
        if (fullDate) dateMatch = fullDate;
    }
    if (!dateMatch) {
        let normalDate = text.match(/維護開始時間\s*[:：]\s*0?(\d{1,2})\/0?(\d{1,2})/);
        if (normalDate) dateMatch = normalDate;
    }
    if (!dateMatch) {
        console.log("抓不到日期：", text);
        return null;
    }

    let m = parseInt(dateMatch[1], 10);
    let d = parseInt(dateMatch[2], 10);
    let dateKey = `${YEAR}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    return {
        dateKey: dateKey,
        fullTitle: `【${title}】`,
        type: type,
        text: text
    };
}

// 繪製日曆 + 自動判斷過期置灰
function drawCalendar(){
    let grid = calendarGrid;
    while (grid.children.length > 7) grid.removeChild(grid.lastChild);
    currentMonth.innerText = `${YEAR}年${SHOW_MONTH + 1}月 維護行事曆`;

    let firstDayOfMonth = new Date(YEAR, SHOW_MONTH, 1).getDay();
    const firstDay = firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1;
    let totalDay = new Date(YEAR, SHOW_MONTH + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        let empty = document.createElement("div");
        empty.className = "calendar-day";
        grid.appendChild(empty);
    }

    for (let d = 1; d <= totalDay; d++) {
        let dayBox = document.createElement("div");
        dayBox.className = "calendar-day";
        let monthNum = SHOW_MONTH + 1;
        let dayKey = `${YEAR}-${String(monthNum).padStart(2, 0)}-${String(d).padStart(2, 0)}`;
        
        // 判斷是否為過去日期，自動置灰
        let currDayObj = new Date(YEAR, SHOW_MONTH, d);
        if(currDayObj < nowDate){
            dayBox.classList.add("past-day");
        }

        dayBox.innerHTML = `<div class="day-number">${d}</div>`;
        if (dateData[dayKey]) {
            dayBox.classList.add("has-notice");
            dayBox.innerHTML += `<div class="notice-badge">${dateData[dayKey].length}</div>`;
        }
        dayBox.onclick = () => {
            if(currDayObj < nowDate)return;
            dateData[dayKey] ? openDayPop(dayKey) : alert(`${monthNum}月${d}日暫無維護公告`);
        };
        grid.appendChild(dayBox);
    }
}

function openDayPop(key){
    let arr = key.split("-");
    modalTitle.innerText = `${parseInt(arr[1])}月${parseInt(arr[2])}日 維護詳細公告`;
    let html = "";
    dateData[key].forEach(item => {
        html += `<div class="notice-item">
        <div class="notice-title"><span class="category-tag category-${item.type}">${item.type}</span>${item.fullTitle}</div>
        <div class="notice-content">${item.text}</div></div>`;
    });
    modalContent.innerHTML = html;
    modalOverlay.style.display = "flex";
}

function showSearchPop(list, kw){
    modalTitle.innerText = `搜尋結果：${kw} 共${list.length}則`;
    let html = "";
    list.forEach(item => {
        let d = item.dateKey.split("-");
        html += `<div class="notice-item">
        <div class="notice-title"><span class="category-tag category-${item.type}">${item.type}</span>${d[1]}月${d[2]}日 ${item.fullTitle}</div>
        <div class="notice-content">${item.text}</div></div>`;
    });
    modalContent.innerHTML = html;
    modalOverlay.style.display = "flex";
}

loadSheetData();
</script>
</body>
</html>
