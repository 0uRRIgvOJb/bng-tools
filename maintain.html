<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏维护公告日历</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软正黑体,Roboto,sans-serif;}
body{background:#f4f6f9;padding:20px;}
.container{max-width:1100px;margin:0 auto;}
header{text-align:center;margin-bottom:20px;}
h1{color:#222;}
.controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
.controls button{padding:8px 16px;background:#0066cc;color:white;border:none;border-radius:6px;cursor:pointer;}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.day-head{background:#eee;padding:10px;text-align:center;font-weight:bold;}
.day{background:white;border-radius:8px;padding:10px;min-height:90px;cursor:pointer;box-shadow:0 1px 3px #0001;position:relative;}
.day.today{border:2px solid #0066cc;}
.day.has{background:#e3f2fd;}
.day-num{font-weight:bold;margin-bottom:4px;}
.dot{width:8px;height:8px;background:#0066cc;border-radius:50%;display:inline-block;margin-right:4px;}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0006;align-items:center;justify-content:center;z-index:100;}
.modal-box{background:white;width:90%;max-width:600px;border-radius:10px;max-height:80vh;overflow-y:auto;padding:20px;}
.modal-header{display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding-bottom:10px;margin-bottom:10px;}
.close{font-size:22px;cursor:pointer;background:none;border:none;}
.item{padding:10px 0;border-bottom:1px solid #eee;}
.item.done{color:#999;background:#f8f8f8;}
</style>
</head>
<body>
<div class="container">
  <header><h1>游戏维护公告日历</h1></header>
  <div class="controls">
    <button id="prev">上一月</button>
    <h2 id="month"></h2>
    <button id="next">下一月</button>
  </div>
  <div class="calendar" id="cal"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="mTitle"></h2>
      <button class="close" onclick="closeModal()">×</button>
    </div>
    <div id="mBody"></div>
  </div>
</div>

<script>
const SHEET_ID = "1CXLCmObghSk1sNem2V_aryXZKHJII4M1hBTu-aIH3Cs";
const SHEET = "A";
let events = {};
let curDate = new Date();

// 读取表格
async function load(){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET}`;
  const res = await fetch(url);
  const text = await res.text();
  const rows = text.split("\n").map(r=>{
    let c = [];
    let inQ = false;
    let cur = "";
    for(let ch of r){
      if(ch === '"') inQ=!inQ;
      else if(ch === "," && !inQ) {c.push(cur);cur="";}
      else cur+=ch;
    }
    c.push(cur);
    return c.map(x=>x.replace(/^"|"$/g,"").trim());
  });

  parseTable(rows);
  renderCal(curDate);
}

// 解析你公司的日历格式
function parseTable(rows){
  const dateRow = rows[1]; // 日期行 5/1,5/6...
  const dayEvents = {};

  for(let col=0;col<dateRow.length;col++){
    const dStr = dateRow[col];
    if(!dStr || !/^\d+\/\d+$/.test(dStr)) continue;

    const key = `2025-${dStr.split("/").map(x=>x.padStart(2,"0")).join("-")}`;
    const list = [];

    for(let r=2;r<rows.length;r++){
      const cell = rows[r][col];
      if(!cell) continue;
      if(/^\d+\/\d+$/.test(cell)) break;
      list.push(cell);
    }

    dayEvents[key] = list.filter(x=>x);
  }

  events = dayEvents;
}

// 渲染日历
function renderCal(date){
  const y = date.getFullYear();
  const m = date.getMonth();
  document.getElementById("month").innerText = `${y}年${m+1}月`;

  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const cal = document.getElementById("cal");
  cal.innerHTML = "";

  const heads = ["日","一","二","三","四","五","六"];
  heads.forEach(h=>{
    const div=document.createElement("div");
    div.className="day-head";
    div.innerText=h;
    cal.appendChild(div);
  });

  for(let i=0;i<first;i++) cal.appendChild(document.createElement("div"));

  const today = new Date();

  for(let d=1;d<=days;d++){
    const key = `${y}-${(m+1).toString().padStart(2,"0")}-${d.toString().padStart(2,"0")}`;
    const has = events[key] && events[key].length>0;

    const div=document.createElement("div");
    div.className="day";
    if(has) div.classList.add("has");
    if(today.getFullYear()===y && today.getMonth()===m && today.getDate()===d) div.classList.add("today");

    div.innerHTML=`<div class="day-num">${d}</div>${has?'<span class="dot"></span>':''}`;
    div.onclick=()=>openModal(key,events[key]||[]);
    cal.appendChild(div);
  }
}

// 弹窗
function openModal(day,list){
  document.getElementById("mTitle").innerText=day;
  const body=document.getElementById("mBody");
  if(list.length===0){
    body.innerHTML="<p>当日无维护</p>";
  }else{
    body.innerHTML=list.map((txt,i)=>{
      let done = false;
      const endMatch = txt.match(/維護結束時間[^0-9]*([0-9\/]+)[^\d]*([0-9:]+)/);
      if(endMatch){
        const [_,d,t]=endMatch;
        const ed = new Date(`${d.replace("/","-")} ${t}`);
        done = ed < new Date();
      }
      return `<div class="item ${done?'done':''}">${txt}</div>`;
    }).join("");
  }
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

document.getElementById("prev").onclick=()=>{curDate.setMonth(curDate.getMonth()-1);renderCal(curDate);};
document.getElementById("next").onclick=()=>{curDate.setMonth(curDate.getMonth()+1);renderCal(curDate);};

load();
</script>
</body>
</html>
