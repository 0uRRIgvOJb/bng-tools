<!DOCTYPE html>
<a href="./" class="home-btn">首页</a>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BNG电子对帐</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #111418;
      color: #e8edf2;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    }

    .app {
      min-height: 100vh;
      padding: 28px;
    }

    .title {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 24px;
      color: #ffffff;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 160px 1fr;
      gap: 20px;
      align-items: stretch;
    }

    .panel {
      background: #1a1f26;
      border: 1px solid #2a313b;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      min-height: 620px;
      display: flex;
      flex-direction: column;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #ffffff;
    }

    .input-area {
      width: 100%;
      flex: 1;
      resize: none;
      border: 1px solid #303844;
      border-radius: 14px;
      background: #0f1318;
      color: #e8edf2;
      padding: 16px;
      font-size: 15px;
      line-height: 1.7;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-area:focus {
      border-color: #5aa9ff;
      box-shadow: 0 0 0 3px rgba(90, 169, 255, 0.15);
    }

    .middle-actions {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 16px 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      user-select: none;
    }

    .btn:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-calc {
      background: linear-gradient(135deg, #2f80ff, #56b2ff);
      color: #fff;
    }

    .btn-clear {
      background: linear-gradient(135deg, #3a404a, #555d69);
      color: #fff;
    }

    .btn:disabled,
    .input-area:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      filter: grayscale(0.2);
    }

    .result-box {
      flex: 1;
      background: #0f1318;
      border: 1px solid #303844;
      border-radius: 14px;
      padding: 16px;
      overflow: auto;
    }

    .result-date {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #9fc8ff;
    }

    .result-empty {
      color: #8f9baa;
      line-height: 1.8;
      padding-top: 8px;
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
    }

    .result-table th,
    .result-table td {
      padding: 12px 10px;
      border-bottom: 1px solid #252c35;
      text-align: left;
      font-size: 15px;
    }

    .result-table th {
      background: #161b22;
      color: #ffffff;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .result-table tr:hover td {
      background: rgba(255, 255, 255, 0.03);
    }

    .profit {
      text-align: right !important;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .profit.negative {
      color: #ff8f8f;
    }

    .profit.positive {
      color: #9be7a7;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 14, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(2px);
    }

    .overlay.show {
      display: flex;
    }

    .loading-card {
      width: 260px;
      background: #171c23;
      border: 1px solid #2d3641;
      border-radius: 18px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    .spinner {
      width: 52px;
      height: 52px;
      margin: 0 auto 16px;
      border: 4px solid rgba(255,255,255,0.12);
      border-top-color: #56b2ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .loading-subtext {
      font-size: 14px;
      color: #9aa6b2;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 980px) {
      .main {
        grid-template-columns: 1fr;
      }

      .middle-actions {
        flex-direction: row;
      }

      .panel {
        min-height: auto;
      }

      .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">BNG电子对帐</div>

    <div class="main">
      <div class="panel">
        <div class="panel-title">贴上数据</div>
        <textarea id="inputData" class="input-area" placeholder="请把原始资料贴在这里..."></textarea>
      </div>

      <div class="middle-actions">
        <button id="calcBtn" class="btn btn-calc">计算结果</button>
        <button id="clearBtn" class="btn btn-clear">清除</button>
      </div>

      <div class="panel">
        <div class="panel-title">计算结果</div>
        <div id="resultBox" class="result-box">
          <div class="result-empty">
            目前尚无结果。<br>
            请先在左侧贴上资料，再点击「计算结果」。
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="overlay">
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="loading-text">读取中</div>
      <div class="loading-subtext">正在整理并计算平台盈利...</div>
    </div>
  </div>

  <script>
    const inputData = document.getElementById("inputData");
    const calcBtn = document.getElementById("calcBtn");
    const clearBtn = document.getElementById("clearBtn");
    const resultBox = document.getElementById("resultBox");
    const loadingOverlay = document.getElementById("loadingOverlay");

    function setLoading(isLoading) {
      loadingOverlay.classList.toggle("show", isLoading);
      inputData.disabled = isLoading;
      calcBtn.disabled = isLoading;
      clearBtn.disabled = isLoading;
    }

    function normalizeSpaces(str) {
      return str
        .replace(/\u00A0/g, " ")
        .replace(/[ \t]+/g, " ")
        .trim();
    }

    function parseNumber(numStr) {
      if (!numStr) return NaN;
      const cleaned = String(numStr).replace(/\s+/g, "").replace(/,/g, "");
      const n = Number(cleaned);
      return isNaN(n) ? NaN : n;
    }

    function formatNumber(num) {
      return num.toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function isDateLine(line) {
      return /^\d{4}-\d{2}-\d{2}\s*\(.*?\)/.test(line);
    }

    function isPlatformLine(line) {
      return /^beyondgaming\s*-\s*\S+/i.test(line);
    }

    function isCurrencyLine(line) {
      return /^TWD$/i.test(line);
    }

    function extractAllNumbers(line) {
      const matches = line.match(/-?\d[\d\s,]*\.\d+|-?\d+/g);
      return matches ? matches : [];
    }

    function addProfit(map, platform, profit) {
      if (!platform || isNaN(profit)) return;
      if (!map[platform]) map[platform] = 0;
      map[platform] += profit;
    }

    function extractOldFormatProfit(line, platformText) {
      const numberPart = line.replace(platformText, "").trim();
      const nums = extractAllNumbers(numberPart);
      if (!nums.length) return NaN;
      return parseNumber(nums[nums.length - 1]);
    }

    function extractNewFormatProfit(lines, startIndex) {
      const collectedNumbers = [];

      for (let i = startIndex + 1; i < lines.length; i++) {
        const line = lines[i];

        if (!line) continue;
        if (isDateLine(line)) break;
        if (isPlatformLine(line)) break;
        if (isCurrencyLine(line)) break;

        const nums = extractAllNumbers(line);
        if (nums.length) {
          for (const n of nums) {
            collectedNumbers.push(n);
          }
        }
      }

      if (!collectedNumbers.length) return NaN;
      return parseNumber(collectedNumbers[collectedNumbers.length - 1]);
    }

    function extractData(rawText) {
      const lines = rawText
        .split("\n")
        .map(line => normalizeSpaces(line))
        .filter(line => line !== "");

      const dates = [];
      const platformProfitMap = {};

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (isDateLine(line)) {
          const dateMatch = line.match(/^(\d{4}-\d{2}-\d{2})/);
          if (dateMatch) dates.push(dateMatch[1]);
          continue;
        }

        if (isPlatformLine(line)) {
          const platformMatch = line.match(/^(beyondgaming\s*-\s*\S+)/i);
          const platform = platformMatch[1].replace(/\s*-\s*/g, " - ").trim();

          let profit = NaN;

          const sameLineNumbers = extractAllNumbers(line.replace(platformMatch[1], "").trim());
          if (sameLineNumbers.length > 0) {
            profit = extractOldFormatProfit(line, platformMatch[1]);
          } else {
            profit = extractNewFormatProfit(lines, i);
          }

          addProfit(platformProfitMap, platform, profit);
        }
      }

      const uniqueDates = [...new Set(dates)].sort();

      return {
        dates: uniqueDates,
        platformProfitMap
      };
    }

    function buildResultHtml(dates, platformProfitMap) {
      const platforms = Object.entries(platformProfitMap)
        .sort((a, b) => b[1] - a[1]);

      let dateText = "未辨识到日期";
      if (dates.length === 1) {
        dateText = dates[0];
      } else if (dates.length > 1) {
        dateText = `${dates[0]} ~ ${dates[dates.length - 1]}`;
      }

      if (platforms.length === 0) {
        return `
          <div class="result-date">计算日期：${escapeHtml(dateText)}</div>
          <div class="result-empty">
            没有辨识到平台资料。<br>
            请确认贴上的内容包含平台行，例如：beyondgaming - BGEGYY
          </div>
        `;
      }

      const rows = platforms.map(([platform, profit]) => {
        const cls = profit < 0 ? "negative" : "positive";
        return `
          <tr>
            <td>${escapeHtml(platform)}</td>
            <td class="profit ${cls}">${formatNumber(profit)}</td>
          </tr>
        `;
      }).join("");

      return `
        <div class="result-date">计算日期：${escapeHtml(dateText)}</div>
        <table class="result-table">
          <thead>
            <tr>
              <th>平台</th>
              <th style="text-align:right;">平台盈利</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;
    }

    calcBtn.addEventListener("click", async () => {
      const rawText = inputData.value.trim();

      if (!rawText) {
        resultBox.innerHTML = `
          <div class="result-empty">
            请先在左侧贴上资料，再点击「计算结果」。
          </div>
        `;
        return;
      }

      setLoading(true);

      try {
        await new Promise(resolve => setTimeout(resolve, 500));
        const { dates, platformProfitMap } = extractData(rawText);
        resultBox.innerHTML = buildResultHtml(dates, platformProfitMap);
      } catch (error) {
        resultBox.innerHTML = `
          <div class="result-empty">
            计算失败，请检查资料格式是否正确。<br>
            错误讯息：${escapeHtml(String(error))}
          </div>
        `;
      } finally {
        setLoading(false);
      }
    });

    clearBtn.addEventListener("click", () => {
      inputData.value = "";
      resultBox.innerHTML = `
        <div class="result-empty">
          目前尚无结果。<br>
          请先在左侧贴上资料，再点击「计算结果」。
        </div>
      `;
      inputData.focus();
    });
  </script>
</body>
</html>
