<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>守護錢塘關</title>
<style>
*{box-sizing:border-box}
body{
 margin:0;
 overflow:hidden;
 font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
 background:#06101e;
 color:#f8ecd5;
 user-select:none;
 image-rendering:pixelated;
}
#game{
 position:relative;
 width:100vw;
 height:100vh;
 overflow:hidden;
 background:
  linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px),
  linear-gradient(0deg,rgba(255,255,255,.025) 1px,transparent 1px),
  linear-gradient(180deg,#0b1f36 0%,#112b43 56%,#173932 100%);
 background-size:32px 32px,32px 32px,100% 100%;
 image-rendering:pixelated;
}
#pathCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
#hud{position:absolute;left:14px;top:12px;z-index:30;display:flex;gap:8px;flex-wrap:wrap}
.badge{background:rgba(8,18,34,.86);border:1px solid rgba(255,211,138,.35);box-shadow:4px 4px 0 rgba(0,0,0,.35);border-radius:0;padding:8px 11px;font-size:13px}
#pauseBtn{position:absolute;right:14px;bottom:18px;z-index:50}
#skillBar{position:absolute;right:14px;top:12px;z-index:30;display:flex;gap:8px;flex-direction:column}
.skillBox{min-width:186px;background:rgba(8,18,34,.86);border:1px solid rgba(120,195,255,.34);border-radius:0;padding:8px 10px;font-size:13px}
.skillBox small{display:block;color:#b7c7d9;margin-top:2px}.cd{height:6px;background:#20354e;border-radius:99px;margin-top:6px;overflow:hidden}.cd>i{display:block;height:100%;width:0%;background:linear-gradient(90deg,#6fd9ff,#ffd36e)}

#tower{position:absolute;left:50%;bottom:68px;transform:translateX(-50%);width:114px;height:136px;z-index:10}
.tower-shadow{position:absolute;bottom:-8px;left:8px;width:98px;height:24px;border-radius:50%;background:rgba(0,0,0,.42);filter:blur(4px)}
.tower-base{position:absolute;bottom:0;left:22px;width:70px;height:62px;border-radius:0;background:linear-gradient(#d49a51,#7d522e);border:2px solid #f3c36e;box-shadow:0 0 36px rgba(255,183,70,.34)}
.tower-head{position:absolute;bottom:54px;left:14px;width:86px;height:60px;border-radius:0;background:linear-gradient(#f4c875,#9d602d);border:2px solid #ffe3a8;transition:transform .16s linear;transform-origin:50% 82%;box-shadow:0 0 22px rgba(255,211,110,.44)}
.tower-head:before,.tower-head:after{content:"";position:absolute;top:16px;width:14px;height:14px;border-radius:50%;background:#07111f;border:2px solid #ffeab9}
.tower-head:before{left:20px}.tower-head:after{right:20px}
.tower-beak{position:absolute;left:50%;top:32px;transform:translateX(-50%);width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-top:15px solid #24160c}
.bow{position:absolute;left:-12px;top:32px;width:110px;height:22px;border-top:6px solid #ffe4a7;border-radius:50%}
.muzzle{position:absolute;left:40px;top:18px;width:7px;height:66px;background:#ffe4a7;border-radius:99px;transform-origin:center}

/* 怪物变成长条形 */
.enemy{
 position:absolute;
 z-index:8;
 filter:drop-shadow(4px 4px 0 rgba(0,0,0,.55));
 width:128px;
 height:32px;
 border-radius:0;
 display:flex;
 align-items:center;
 overflow:visible;
 will-change:left,top;
 transform:none;
}
.enemyCore{position:absolute;inset:0;width:100%;height:100%;background:linear-gradient(90deg,#e66a5f,#9f262d);border-radius:0;overflow:hidden;z-index:1}
.enemy.tank .enemyCore{background:linear-gradient(90deg,#7cbf66,#315b38)}
.enemy.mage .enemyCore{background:linear-gradient(90deg,#66c9ff,#4055d8)}
.enemy.boss{width:190px;height:46px;border-radius:0}
.enemy.boss .enemyCore{background:linear-gradient(90deg,#b749ff,#461074)}

.hpbar{position:absolute;top:-18px;left:50%;transform:translateX(-50%);width:90%;height:7px;background:#2b1422;border-radius:0;overflow:hidden;border:2px solid rgba(255,255,255,.32);z-index:5}
.hpbar i{display:block;height:100%;background:linear-gradient(90deg,#7dff8b,#ffe66a);width:100%}
.hpNum{position:absolute;top:-38px;left:50%;transform:translateX(-50%);font-size:12px;white-space:nowrap;color:#fff6d9;text-shadow:2px 2px 0 #000;font-weight:900;z-index:6}

.projectile{position:absolute;z-index:35;transform-origin:center;pointer-events:none;will-change:left,top,transform}
.arrow{
 width:42px;
 height:8px;
 background:linear-gradient(90deg,#fffbe0,#ffe56c,#ff9e3d);
 border-radius:0;
 box-shadow:0 0 10px #fff6a0,0 0 24px rgba(255,220,80,.9);
 filter:brightness(1.45);
}
.arrow:after{
 content:"";
 position:absolute;
 right:-10px;
 top:-6px;
 width:0;
 height:0;
 border-left:14px solid #fffbe0;
 border-top:10px solid transparent;
 border-bottom:10px solid transparent;
}
.bolt{width:36px;height:9px;background:#f7f15b;clip-path:polygon(0 40%,45% 40%,38% 0,100% 55%,52% 55%,60% 100%);filter:drop-shadow(0 0 12px #fff169)}

.effect{position:absolute;border-radius:50%;pointer-events:none;z-index:12}
.fire{background:radial-gradient(circle,rgba(255,240,150,.65) 0 12%,rgba(255,113,42,.38) 35%,rgba(255,80,20,.12) 72%);border:2px solid rgba(255,169,91,.82);animation:pulse .5s infinite alternate}
.ice{background:radial-gradient(circle,rgba(185,236,255,.4),rgba(80,170,255,.12));border:2px solid rgba(165,224,255,.9)}
.thunder{background:rgba(255,245,102,.42);border:2px solid rgba(255,255,185,1);box-shadow:0 0 32px rgba(255,240,80,.85)}
.poison{background:radial-gradient(circle,rgba(118,255,130,.35),rgba(60,255,90,.1));border:2px solid rgba(125,255,145,.78)}
.bladeFx{background:rgba(180,255,255,.28);border:2px dashed rgba(190,255,255,1)}
.arrowHit{position:absolute;width:34px;height:34px;background:radial-gradient(circle,#fffbe0,#ffd35c,#ff7a2c);border-radius:0;z-index:45;box-shadow:0 0 18px #fff49a;animation:hitPop .3s forwards}
.bossHit{position:absolute;width:60px;height:60px;background:radial-gradient(circle,rgba(255,180,255,.9),rgba(180,80,255,.5));border-radius:0;z-index:45;animation:hitPop .35s forwards}
.shotTrail{
 position:absolute;
 height:4px;
 background:linear-gradient(90deg,rgba(255,255,190,0),rgba(255,245,105,.95),rgba(255,255,255,.75));
 box-shadow:0 0 12px #fff36e;
 transform-origin:left center;
 z-index:30;
 pointer-events:none;
 animation:trailFade .18s steps(3,end) forwards;
}
@keyframes trailFade{from{opacity:1}to{opacity:0}}

@keyframes hitPop{0%{transform:scale(0);opacity:1}70%{transform:scale(1.4);opacity:.7}100%{transform:scale(1);opacity:0}}
@keyframes pulse{from{transform:scale(.97)}to{transform:scale(1.04)}}
.floatText{position:absolute;z-index:50;font-weight:900;font-size:16px;color:#fff1a6;text-shadow:2px 2px 0 #000;pointer-events:none;animation:floatUp .62s steps(6,end) forwards}
.floatText.crit{font-size:21px;color:#ff926e}
.shock{animation:shake .18s linear 2}
@keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(4px,-2px)}50%{transform:translate(-3px,2px)}75%{transform:translate(2px,3px)}}
@keyframes floatUp{from{opacity:1;transform:translate(-50%,-50%) translateY(0) scale(1)}to{opacity:0;transform:translate(-50%,-50%) translateY(-38px) scale(1.1)}}

.modal{position:absolute;inset:0;z-index:80;background:rgba(0,0,0,.68);display:none;align-items:center;justify-content:center}.panel{width:min(960px,92vw);background:linear-gradient(180deg,#12233f,#081321);border:1px solid rgba(255,211,138,.48);border-radius:0;padding:22px;box-shadow:8px 8px 0 rgba(0,0,0,.45)}.panel h2{margin:0 0 12px;color:#ffd38a}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.card{min-height:260px;border-radius:0;overflow:hidden;cursor:pointer;transition:.18s;position:relative;}
.card:hover{transform:translateY(-8px) scale(1.02);}
.cardInner{height:100%;padding:24px;border-radius:0;position:relative;border:2px solid rgba(255,255,255,.08);backdrop-filter:blur(10px);}
.cardTop{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;}
.cardTitle{font-size:34px;font-weight:900;line-height:1.25;color:#fff6da;flex:1;}
.cardMeta{margin-top:18px;font-size:24px;line-height:1.9;color:#ffffff;}
.cardDesc{margin-top:18px;font-size:18px;line-height:1.7;color:rgba(255,255,255,.92);}
.skillTag,.rarityTag{padding:8px 18px;border-radius:999px;font-size:16px;font-weight:900;white-space:nowrap;}
.skillTag{background:linear-gradient(135deg,#ffd36e,#ff9d43);color:#241300;box-shadow:0 0 24px rgba(255,190,60,.35);}
.skillCard{background:radial-gradient(circle at top,rgba(255,210,90,.22),transparent 55%),linear-gradient(180deg,#503400 0%,#221300 100%);border-color:rgba(255,210,120,.35);box-shadow:0 0 42px rgba(255,180,50,.20),inset 0 0 42px rgba(255,220,120,.05);}
.rarity-common{background:linear-gradient(180deg,#364055 0%,#1a2230 100%);}
.rarity-green{background:linear-gradient(180deg,#125127 0%,#071b0d 100%);}
.rarity-blue{background:linear-gradient(180deg,#10457d 0%,#07172b 100%);}
.rarity-purple{background:linear-gradient(180deg,#54208a 0%,#1a0b2a 100%);}
.rarity-orange{background:linear-gradient(180deg,#7c4100 0%,#241000 100%);}
.rarityTag.common{background:#d4dae4;color:#111;}
.rarityTag.green{background:#72ff9d;color:#07130b;}
.rarityTag.blue{background:#79c6ff;color:#06131f;}
.rarityTag.purple{background:#ca8dff;color:#160520;}
.rarityTag.orange{background:#ffb14d;color:#1f1204;}
.rarity.common{color:#ffffff}
.rarity.green{color:#7dff8b}
.rarity.blue{color:#7ec8ff}
.rarity.purple{color:#c084ff}
.rarity.orange{color:#ff9f43}
.rarity.gold{color:#ffd36e}
.buttons{display:flex;gap:10px;margin-top:15px;justify-content:center;flex-wrap:wrap}button{border:0;border-radius:0;padding:10px 14px;background:#d89645;color:#1b1006;font-weight:800;cursor:pointer}button.secondary{background:#36506f;color:#e9f3ff}button:disabled{opacity:.45;cursor:not-allowed}
#start{position:absolute;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 42%,rgba(255,190,92,.16),transparent 30%),#07111f}#start .panel{max-width:820px}.small{font-size:13px;color:#b9c7d9;line-height:1.75}.rules{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}.rule{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:0;padding:10px;font-size:13px;line-height:1.55;color:#dce7f5}
#xpWrap{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);width:min(700px,82vw);z-index:30}#xpText{text-align:center;font-size:13px;margin-bottom:5px;color:#ffe3aa}#xpBar{height:14px;background:#13243a;border-radius:99px;overflow:hidden;border:1px solid rgba(255,255,255,.15)}#xpFill{height:100%;width:0%;background:linear-gradient(90deg,#65d7ff,#ffd36e)}#log{position:absolute;left:14px;bottom:14px;width:330px;max-height:96px;overflow:hidden;font-size:12px;color:#d4deea;z-index:30;opacity:.86}
#dirHint{position:absolute;left:50%;bottom:154px;transform:translateX(-50%);z-index:20;font-size:12px;color:#ffe4ad;background:rgba(7,17,31,.66);border:1px solid rgba(255,211,138,.25);border-radius:99px;padding:5px 12px}
@media(max-width:760px){.cards,.rules{grid-template-columns:1fr}#skillBar{top:auto;bottom:96px;right:10px}.skillBox{min-width:150px}#log{display:none}}
</style>
</head>
<body>
<div id="game">
  <canvas id="pathCanvas"></canvas>
  <div id="hud">
    <div class="badge">關卡：<b id="stage">1</b> / 20</div><div class="badge">模式：<b id="mode">普通</b></div><div class="badge">復活：<b id="revives">3</b></div><div class="badge">擊殺：<b id="kills">0</b></div><div class="badge">時間：<b id="time">0</b>s</div><div class="badge">未用復活結算倍率：<b id="bonus">1.00x</b></div>
  </div>
  <button id="pauseBtn" onclick="togglePause()">暫停</button>
  <div id="skillBar"></div>
  <div id="dirHint">點擊畫面指定箭塔方向，箭塔只會朝固定方向射擊</div>
  <div id="tower"><div class="tower-shadow"></div><div class="tower-head" id="towerHead"><div class="bow"></div><div class="muzzle"></div><div class="tower-beak"></div></div><div class="tower-base"></div></div>
  <div id="xpWrap"><div id="xpText">Lv.<span id="lv">1</span>　經驗 <span id="xp">0</span>/<span id="need">40</span></div><div id="xpBar"><div id="xpFill"></div></div></div>
  <div id="log"></div>

  <div id="start">
    <div class="panel">
      <div class="rules">
        <div class="rule">A→B 固定 40 秒</div>
        <div class="rule">天雷：暈眩 + 擊退 + 高傷</div>
        <div class="rule">怪物長條形、連體不重疊</div>
        <div class="rule">無限模式禁用復活｜隨機路徑</div>
      </div>
      <div class="buttons"><button onclick="startGame()">開始遊戲</button><button class="secondary" onclick="toggleMute()" id="muteBtn">音效：開</button></div>
    </div>
  </div>

  <div id="levelModal" class="modal"><div class="panel"><h2>升級選擇</h2><p class="small">選 1 個技能或強化。剩餘刷新：<b id="rerollLeft">3</b></p><div class="cards" id="cards"></div><div class="buttons"><button id="rerollBtn" onclick="reroll()">刷新</button></div></div></div>
  <div id="modeModal" class="modal"><div class="panel" style="max-width:640px;text-align:center"><h2>已通過 20 關</h2><p class="small">進入無限模式，<b style="color:red">禁用復活</b></p><button onclick="enterEndless()">開始無限模式</button></div></div>
  <div id="reviveModal" class="modal"><div class="panel" style="max-width:640px;text-align:center"><h2>怪物抵達終點</h2><p id="reviveText" class="small"></p><div class="buttons"><button onclick="useRevive()">使用復活</button><button class="secondary" onclick="declineRevive()">不復活，結算</button></div></div></div>
  <div id="pauseModal" class="modal"><div class="panel" style="max-width:520px;text-align:center"><h2>遊戲暫停</h2><p class="small">目前遊戲已暫停。</p><button onclick="togglePause()">繼續遊戲</button></div></div>
  <div id="gameOver" class="modal"><div class="panel" style="max-width:660px;text-align:center"><h2>遊戲結束</h2><p id="overText" class="small"></p><button onclick="location.reload()">重新開始</button></div></div>
</div>

<script>
const game=document.getElementById('game'),canvas=document.getElementById('pathCanvas'),ctx=canvas.getContext('2d'),towerHead=document.getElementById('towerHead');
let W,H,path=[],enemies=[],projectiles=[],effects=[];
let running=false,paused=false,endless=false,manualPause=false,awaitingRevive=false;
let last=0,spawnTimer=0,stageTimer=0,stage=1,kills=0,startTime=0,pausedAt=0,totalPaused=0;
let revives=3,level=1,xp=0,xpNeed=40,rerolls=3,bossAlive=false,bossSkillTimer=0,globalSpeedBuff=1,globalSpeedBuffTimer=0;
let muted=false,audioCtx=null;

const tower={x:0,y:0,angle:-Math.PI/2,damage:18,interval:640,timer:0,count:1,pierce:0,spread:.13};

// 數值系統：百分比不再直接連乘目前值，改成累積後套用軟上限，避免後期膨脹到逆天。
const baseStats={towerDamage:18,towerInterval:640};
const bonusStats={towerDamagePct:0,towerSpeedPct:0};
function softCapPercent(raw,cap=0.8,soft=0.45,rate=0.25){
 if(raw<=soft)return raw;
 return Math.min(cap,soft+(raw-soft)*rate);
}
function recalcStats(){
 const dmgPct=softCapPercent(bonusStats.towerDamagePct,2.0,0.8,0.35);
 tower.damage=baseStats.towerDamage*(1+dmgPct);

 const spdPct=softCapPercent(bonusStats.towerSpeedPct,0.72,0.40,0.22);
 tower.interval=baseStats.towerInterval*(1-spdPct);
}
const enemyTypes={grunt:{hp:1,xp:1,cls:'grunt'},tank:{hp:2.0,xp:1.7,cls:'tank'},mage:{hp:1.25,xp:1.3,cls:'mage'}};
const skills={
 fire:{name:'火雨',owned:false,strong:2,kind:'dot',desc:'範圍持續燃燒',damage:34,range:120,interval:7200,timer:0,duration:1700,casts:1,targets:1,castQueue:[],castTimer:0},
 ice:{name:'冰封',owned:false,strong:2,kind:'instant',desc:'全場冰凍減速',damage:12,range:9999,interval:9000,timer:0,duration:2300,casts:1,targets:999,castQueue:[],castTimer:0},
 thunder:{name:'天雷',owned:false,strong:5,kind:'single',desc:'高傷+暈眩1.2秒+強力擊退',damage:300,range:9999,interval:8000,timer:0,duration:350,casts:1,targets:1,castQueue:[],castTimer:0},
 poison:{name:'毒霧',owned:false,strong:2,kind:'dot',desc:'持續毒傷',damage:13,range:132,interval:8600,timer:0,duration:3800,casts:1,targets:1,castQueue:[],castTimer:0},
 arrowRain:{name:'箭雨',owned:false,strong:2,kind:'multi',desc:'攻擊多個敵人',damage:28,range:9999,interval:7800,timer:0,duration:400,casts:1,targets:5,castQueue:[],castTimer:0},
 bladeStorm:{name:'飛刃風暴',owned:false,strong:4,kind:'aoe',desc:'強力範圍斬擊',damage:135,range:185,interval:13500,timer:0,duration:500,casts:1,targets:2,castQueue:[],castTimer:0},
 meteor:{name:'隕石',owned:false,strong:5,kind:'aoe',desc:'超高傷害大範圍爆炸',damage:260,range:170,interval:18000,timer:0,duration:650,casts:1,targets:1,castQueue:[],castTimer:0}
};

function resize(){
 W=innerWidth;H=innerHeight;
 canvas.width=W;canvas.height=H;
 tower.x=W/2;tower.y=H-118;
 if(!path.length) makeRandomLoopPath();
 drawPath()
}
addEventListener('resize',resize);
game.addEventListener('click',e=>{if(e.target.tagName==='BUTTON'||e.target.closest('.modal')||!running)return;setTowerDirection(e.clientX,e.clientY)});
function setTowerDirection(x,y){let a=Math.atan2(y-tower.y,x-tower.x);if(a>0)a=-.15;tower.angle=Math.max(-Math.PI+.15,Math.min(-.15,a));towerHead.style.transform=`rotate(${tower.angle+Math.PI/2}rad)`;beep(520,.035,'square')}

function makeRandomLoopPath(){
 path = [];
 const end={x:W/2,y:H-92};
 const loopCount = 3 + Math.floor(Math.random()*3);
 const startY = 20 + Math.random()*40;
 const startX = W/2 + (Math.random()-0.5)*80;
 path.push({x:startX, y:startY});
 for(let i=0;i<loopCount;i++){
  const yPos = startY + (H*0.8-startY)*i/loopCount;
  const l=W*0.1+Math.random()*W*0.15;
  const r=W*0.9-Math.random()*W*0.15;
  path.push({x:i%2?r:l,y:yPos+Math.random()*30});
  path.push({x:i%2?l:r,y:yPos+Math.random()*40});
 }
 path.push({x:W*0.45+Math.random()*W*0.1,y:H*0.84+Math.random()*20});
 path.push(end);
}

function drawPath(){
 ctx.clearRect(0,0,W,H);ctx.lineCap='round';ctx.lineJoin='round';
 ctx.strokeStyle='rgba(0,0,0,.32)';ctx.lineWidth=82;drawLine();
 ctx.strokeStyle='rgba(217,154,73,.34)';ctx.lineWidth=64;drawLine();
 ctx.strokeStyle='rgba(255,224,160,.58)';ctx.lineWidth=6;drawLine();
 for(let i=1;i<path.length-1;i++){ctx.fillStyle='rgba(255,185,86,.18)';ctx.beginPath();ctx.arc(path[i].x,path[i].y,54,0,Math.PI*2);ctx.fill()}
 ctx.fillStyle='rgba(255,90,90,.92)';ctx.beginPath();ctx.arc(path[path.length-1].x,path[path.length-1].y,22,0,Math.PI*2);ctx.fill();
 ctx.fillStyle='#fff2d2';ctx.font='bold 14px Microsoft JhengHei';ctx.textAlign='center';ctx.fillText('終點',path[path.length-1].x,path[path.length-1].y+42)
}
function drawLine(){ctx.beginPath();ctx.moveTo(path[0].x,path[0].y);for(let i=1;i<path.length;i++)ctx.lineTo(path[i].x,path[i].y);ctx.stroke()}

function startGame(){
 resize();makeRandomLoopPath();drawPath();
 document.getElementById('start').style.display='none';
 running=true;paused=false;last=performance.now();
 startTime=Date.now();
 log('遊戲開始！怪物40秒抵達終點');
 requestAnimationFrame(loop)
}
function loop(t){if(!running)return;const dt=Math.min(50,t-last);last=t;if(!paused&&!awaitingRevive)update(dt);requestAnimationFrame(loop)}

function update(dt){
 spawnTimer+=dt;stageTimer+=dt;tower.timer+=dt;
 if(globalSpeedBuffTimer>0){globalSpeedBuffTimer-=dt;if(globalSpeedBuffTimer<=0)globalSpeedBuff=1}
 document.getElementById('time').textContent=Math.floor((Date.now()-startTime-totalPaused)/1000);
 if(stageTimer>12000&&!bossAlive){stage++;stageTimer=0;if(stage===10||stage===20||(endless&&stage%10===0))spawnEnemy(true);updateHud()}
 const spawnRate=Math.max(330,1080-stage*18);if(spawnTimer>spawnRate&&!bossAlive){spawnTimer=0;spawnEnemy(false)}
 if(bossAlive){bossSkillTimer+=dt;if(bossSkillTimer>=30000){bossSkillTimer=0;if(Math.random()<.28)bossSkill()}}
 updateEnemies(dt);attack();updateProjectiles(dt);updateSkillQueue(dt);updateEffects(dt);updateHud()
}

function spawnEnemy(isBoss=false){
 const baseHp=60*Math.pow(1.185,stage-1)*(endless?Math.pow(1.068,Math.max(0,stage-20)):1);
 const typeKey=isBoss?'boss':weightedEnemyType(),type=enemyTypes[typeKey]||enemyTypes.grunt;
 const hp=isBoss?baseHp*14:baseHp*type.hp;
 const e={boss:isBoss,type:typeKey,hp,maxHp:hp,stun:0,pushBack:0,progress:0,drawX:null,drawY:null,bodyW:isBoss?190:128,bodyH:isBoss?46:32,slow:1,slowTimer:0,xp:isBoss?260+stage*24:(14+stage*2.2)*type.xp,el:document.createElement('div')};
 e.el.className='enemy '+(isBoss?'boss':type.cls);e.el.innerHTML='<div class="hpNum"></div><div class="hpbar"><i></i></div><div class="enemyCore"></div>';game.appendChild(e.el);enemies.push(e);
 if(isBoss){bossAlive=true;bossSkillTimer=0;log('Boss 出現！')}
}
function weightedEnemyType(){const r=Math.random();if(stage<6)return r<.78?'grunt':'tank';if(r<.55)return'grunt';if(r<.82)return'tank';return'mage'}
function bossSkill(){
 if(Math.random()<.5){globalSpeedBuff=1.1;globalSpeedBuffTimer=5000;log('Boss 技能：怪物移動速度 +10%');beep(120,.16,'sawtooth')}
 else{enemies.forEach(e=>{e.hp=Math.min(e.maxHp,e.hp+e.maxHp*.3)});log('Boss 技能：恢復 30% 血量');beep(180,.16,'triangle')}
}

// 核心：40秒走完 + 怪物連隊不重疊
function updateEnemies(dt){
 const full=40000;
 const baseStep=dt/full*globalSpeedBuff;
 const len=pathLength();

 // 依目前進度排序，越靠近終點越前面。
 enemies.sort((a,b)=>b.progress-a.progress);

 // 先正常前進。
 for(let i=0;i<enemies.length;i++){
  const e=enemies[i];

  if(e.stun>0){
   e.stun-=dt;
   continue;
  }

  if(e.pushBack>0){
   e.progress=Math.max(0,e.progress-baseStep*3.2);
   e.pushBack-=dt;
   continue;
  }

  if(e.slowTimer>0)e.slowTimer-=dt;
  else e.slow=1;

  e.progress += baseStep*e.slow;
 }

 enemies.sort((a,b)=>b.progress-a.progress);

 // 前面的怪物往後補位，但不能瞬間拉回，避免畫面抖動。
 // 只在距離真的拉太開時才補，保留一點容忍區，避免每幀來回修正。
 for(let i=enemies.length-2;i>=0;i--){
  const front=enemies[i];
  const back=enemies[i+1];
  const gap=Math.max(0.008,((front.bodyW||128)*0.78)/len);
  const desired=back.progress+gap;
  const tolerance=gap*0.08;

  if(front.progress>desired+tolerance){
   const diff=front.progress-desired;
   front.progress-=Math.min(diff,baseStep*5.5);
  }
 }

 for(let i=0;i<enemies.length;i++){
  const e=enemies[i];
  e.progress=Math.min(1,Math.max(0,e.progress));

  if(e.progress>=1){
   e.progress=1;
   updateEnemyPosition(e);
   askRevive(e);
   break;
  }

  updateEnemyPosition(e);
 }
}

function updateEnemyPosition(e){
 const p=pointAt(e.progress);

 e.x=p.x;
 e.y=p.y;

 // 只平滑顯示，不改碰撞座標；降低抖動但不造成箭矢判定錯位。
 if(e.drawX===null || e.drawY===null){
  e.drawX=p.x;
  e.drawY=p.y;
 }else{
  const smooth=0.38;
  e.drawX += (p.x-e.drawX)*smooth;
  e.drawY += (p.y-e.drawY)*smooth;
 }

 const w=e.bodyW||128;
 const h=e.bodyH||32;

 // .enemy 已經取消 transform，所以這裡直接用 top-left 定位
 e.el.style.left=Math.round(e.drawX-w/2)+'px';
 e.el.style.top=Math.round(e.drawY-h/2)+'px';

 e.el.querySelector('i').style.width=Math.max(0,e.hp/e.maxHp*100)+'%';
 e.el.querySelector('.hpNum').textContent=`${num(e.hp)} / ${num(e.maxHp)}`;
}
function pathLength(){let t=0;for(let i=0;i<path.length-1;i++)t+=Math.hypot(path[i+1].x-path[i].x,path[i+1].y-path[i].y);return t}
function pointAt(pr){let t=0,s=[];for(let i=0;i<path.length-1;i++){const a=path[i],b=path[i+1],d=Math.hypot(b.x-a.x,b.y-a.y);s.push({a,b,d});t+=d}let di=pr*t;for(const z of s){if(di<=z.d){const k=di/z.d;return{x:z.a.x+(z.b.x-z.a.x)*k,y:z.a.y+(z.b.y-z.a.y)*k}}di-=z.d}return path[path.length-1]}

function askRevive(ee){
 paused=true;awaitingRevive=true;
 if(endless){gameOver();return;}
 if(revives>0){
  document.getElementById('reviveText').innerHTML=`剩餘復活：${revives}`;
  document.getElementById('reviveModal').style.display='flex';
 }else gameOver();
}
function useRevive(){
 revives--;enemies.forEach(e=>{e.progress=Math.max(0,e.progress-0.15);e.slow=0.4;e.slowTimer=900});
 document.getElementById('reviveModal').style.display='none';awaitingRevive=false;paused=false;screenShake();
}
function declineRevive(){document.getElementById('reviveModal').style.display='none';gameOver()}

function attack(){
 if(tower.timer<tower.interval)return;tower.timer=0;
 const c=Math.max(1,tower.count);
 const ts=enemies.filter(e=>isInFacingDirection(e)).sort((a,b)=>angleDiffToTower(a)-angleDiffToTower(b));
 for(let i=0;i<c;i++)setTimeout(()=>shoot(ts[i%ts.length]||null,i,c),i*100);
}
function isInFacingDirection(e){const a=Math.atan2(e.y-tower.y,e.x-tower.x);return Math.abs(((a-tower.angle+Math.PI*3)%(Math.PI*2))-Math.PI)<Math.PI/2}
function angleDiffToTower(e){const a=Math.atan2(e.y-tower.y,e.x-tower.x);return Math.abs(((a-tower.angle+Math.PI*3)%(Math.PI*2))-Math.PI)}

function shoot(tg,idx,total){
 const c=Math.max(1,total||tower.count);
 const a=tower.angle+(idx-(c-1)/2)*tower.spread;
 const p={x:tower.x,y:tower.y,vx:Math.cos(a)*820,vy:Math.sin(a)*820,damage:tower.damage,pierce:tower.pierce,hit:new Set(),life:0,maxLife:1500,el:document.createElement('div')};
 p.el.className='projectile arrow';game.appendChild(p.el);projectiles.push(p);createShotTrail(tower.x,tower.y,a,130);beep(680,.022,'square');muzzleFlash();
}
function createShotTrail(x,y,a,len){
 const el=document.createElement('div');
 el.className='shotTrail';
 el.style.left=x+'px';
 el.style.top=y+'px';
 el.style.width=len+'px';
 el.style.transform=`rotate(${a}rad)`;
 game.appendChild(el);
 setTimeout(()=>el.remove(),190);
}
function muzzleFlash(){const f=document.createElement('div');f.className='thunder';f.style=`left:${tower.x}px;top:${tower.y-50}px;width:18px;height:18px;border-radius:0;background:#ff0;z-index:25`;game.appendChild(f);setTimeout(()=>f.remove(),180)}

function hitEnemyBody(px,py,e){
 // 長條怪物碰撞：寬度變長後，箭矢命中範圍也跟著變長。
 const w=(e.bodyW||128)/2;
 const h=(e.bodyH||32)/2+10;
 const dx=Math.abs(px-e.x);
 const dy=Math.abs(py-e.y);
 return dx<=w && dy<=h;
}

function updateProjectiles(dt){
 for(let i=projectiles.length-1;i>=0;i--){
  const p=projectiles[i];p.life+=dt;p.x+=p.vx*dt/1000;p.y+=p.vy*dt/1000;
  p.el.style.left=p.x+'px';p.el.style.top=p.y+'px';p.el.style.transform=`rotate(${Math.atan2(p.vy,p.vx)}rad)`;
  const h=enemies.find(e=>!p.hit.has(e)&&hitEnemyBody(p.x,p.y,e));
  if(h){damageEnemy(h,p.damage,p.x,p.y);createHitEffect(p.x,p.y,h.boss);p.hit.add(h);if(p.pierce>0)p.pierce--;else{p.el.remove();projectiles.splice(i,1)}}
  if(p.life>p.maxLife||p.x<-70||p.x>W+70||p.y<-70||p.y>H+70){p.el.remove();projectiles.splice(i,1)}
 }
}
function createHitEffect(x,y,b){const e=document.createElement('div');e.className=b?'bossHit':'arrowHit';e.style.left=x+'px';e.style.top=y+'px';game.appendChild(e);setTimeout(()=>e.remove(),300)}

function updateSkillQueue(dt){
 for(const k in skills){const s=skills[k];if(!s.owned)continue;s.timer+=dt;if(s.timer>=s.interval){s.timer=0;for(let i=0;i<s.casts;i++)s.castQueue.push(1)}if(s.castQueue.length&&s.castTimer+dt>=120){s.castTimer=0;s.castQueue.shift();castSingleSkill(k,s)}else s.castTimer+=dt}renderSkills();
}

// 天雷超強化：暈眩 + 擊退
function castSingleSkill(key,s){
 if(key==='thunder'){
  const t=smartTargets(1,'hp',9999)[0];
  if(t){
   t.stun=1200; t.pushBack=800;
   damageEnemy(t,s.damage*2.5,t.x,t.y,1);
   addEffect(t.x,t.y,160,'thunder',600);
   screenShake();
  }
  beep(880,.2,'sawtooth');
  return;
 }
 if(key==='fire')bestClusterCenters(s.targets,s.range).forEach(c=>addDot(c.x,c.y,s.range,'fire',s.duration,s.damage,400));
 if(key==='ice')enemies.forEach(e=>{e.slow=.3;e.slowTimer=s.duration});
 if(key==='poison')bestClusterCenters(s.targets,s.range).forEach(c=>addDot(c.x,c.y,s.range,'poison',s.duration,s.damage,500));
 if(key==='arrowRain')smartTargets(s.targets,'hp').forEach(e=>damageEnemy(e,s.damage,e.x,e.y));
 if(key==='bladeStorm'||key==='meteor'){bestClusterCenters(s.targets,s.range).forEach(c=>{addEffect(c.x,c.y,s.range*2,key==='meteor'?'fire':'bladeFx',s.duration);enemies.forEach(t=>{if(Math.hypot(t.x-c.x,t.y-c.y)<=s.range)damageEnemy(t,s.damage*1.5,t.x,t.y,1)})});screenShake()}
 beep(320,.1,'sine');
}

function smartTargets(c,m='hp',r=9999){return enemies.filter(e=>dist(tower,e)<=r).sort((a,b)=>m==='hp'?b.hp-a.hp:b.progress-a.progress).slice(0,c)}
function bestClusterCenters(c,r){const p=enemies.sort((a,b)=>b.progress-a.progress);const res=[];p.forEach(e=>{if(res.length>=c)return;if(!res.some(x=>Math.hypot(x.x-e.x,x.y-e.y)<r*1.2))res.push(e);});return res.slice(0,c)}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function spawnFlyingEffect(cls,x1,y1,x2,y2,dur){const el=document.createElement('div');el.className='projectile '+cls;el.style.left=x1+'px';el.style.top=y1+'px';game.appendChild(el);const s=performance.now();function anim(n){const t=Math.min(1,(n-s)/dur);el.style.left=(x1+(x2-x1)*t)+'px';el.style.top=(y1+(y2-y1)*t)+'px';if(t<1)requestAnimationFrame(anim);else el.remove()}requestAnimationFrame(anim)}
function addDot(x,y,r,cls,dur,dmg,tk){const e=addEffect(x,y,r*2,cls,dur);e.dot={dmg,tk,timer:0,r}}
function addEffect(x,y,s,cls,dur){const el=document.createElement('div');el.className='effect '+cls;el.style.width=s+'px';el.style.height=s+'px';el.style.left=(x-s/2)+'px';el.style.top=(y-s/2)+'px';game.appendChild(el);const e={x,y,s,cls,dur,life:0,el};effects.push(e);return e}

// ✅ 你找到的两个BUG 100%修复
function updateEffects(dt){
  for(let i=effects.length-1;i>=0;i--){
    const e=effects[i];
    e.life += dt;

    if(e.dot){
      e.dot.timer += dt;
      // 修复1：tick → tk
      if(e.dot.timer >= e.dot.tk){
        e.dot.timer = 0;
        enemies.forEach(n=>{
          if(Math.hypot(n.x-e.x,n.y-e.y)<=e.dot.r){
            damageEnemy(n,e.dot.dmg,n.x,n.y)
          }
        })
      }
    }

    // 修复2：所有特效超时统一删除（包括天雷/冰封/飞刃）
    if(e.life >= e.dur){
      e.el.remove();
      effects.splice(i,1);
    }
  }
}

function damageEnemy(e,d,x,y,c=false){const r=Math.max(1,d*(.9+Math.random()*.4));e.hp-=r;showDamage(x||e.x,y||e.y,r,c);if(e.hp<=0)killEnemy(e)}
function showDamage(x,y,d,c){const el=document.createElement('div');el.className='floatText '+(c?'crit':'');el.textContent=Math.round(d);el.style.left=x+'px';el.style.top=y+'px';game.appendChild(el);setTimeout(()=>el.remove(),650)}
function killEnemy(e){const i=enemies.indexOf(e);if(i>-1)enemies.splice(i,1);e.el.remove();kills++;gainXp(e.xp);if(e.boss)bossAlive=false;if(stage>=20&&!endless&&!bossAlive){endless=true;paused=true;document.getElementById('mode').textContent='無限';document.getElementById('modeModal').style.display='flex'}}
function gainXp(v){xp+=v;while(xp>=xpNeed){xp-=xpNeed;level++;xpNeed=Math.floor(xpNeed*1.28+20);showLevelUp();break}}
function showLevelUp(){paused=true;rerolls=3;document.getElementById('levelModal').style.display='flex';makeChoices()}
function rarityPercent(){
 const r=Math.random();
 if(r<0.45)return 8;
 if(r<0.72)return 15;
 if(r<0.88)return 25;
 if(r<0.96)return 40;
 if(r<0.995)return 60;
 return 100;
}
function rarityInfo(v,t='p'){
 if(t==='c'){
  if(v===1) return {n:'普通',c:'common'};
  if(v===2) return {n:'稀有',c:'purple'};
  return {n:'傳說',c:'orange'};
 }
 if(v===10) return {n:'普通',c:'common'};
 if(v===30) return {n:'進階',c:'green'};
 if(v===40) return {n:'精良',c:'blue'};
 if(v===60) return {n:'高階',c:'blue'};
 if(v===70) return {n:'史詩',c:'purple'};
 return {n:'傳說',c:'orange'};
}
function randomCountBonus(){const r=Math.random();if(r<.65)return 1;if(r<.92)return 2;return 3}
function makeChoices(){document.getElementById('rerollLeft').textContent=rerolls;document.getElementById('rerollBtn').disabled=!rerolls;const c=document.getElementById('cards');c.innerHTML='';for(let i=0;i<3;i++){const ch=randomUpgrade();const d=document.createElement('div');d.className='card';d.innerHTML=`<div class="cardInner ${ch.isSkill?'skillCard':'rarity-'+ch.rarityClass}"><div class="cardTop"><div class="cardTitle">${ch.title}</div>${ch.isSkill?'<div class="skillTag">技能</div>':`<div class="rarityTag ${ch.rarityClass}">${ch.rarity}</div>`}</div>${ch.meta?`<div class="cardMeta">${ch.meta}</div>`:''}${ch.desc?`<div class="cardDesc">${ch.desc}</div>`:''}</div>`;d.onclick=()=>{ch.apply();document.getElementById('levelModal').style.display='none';paused=false};c.appendChild(d)}}
function randomUpgrade(){const u=Object.keys(skills).filter(k=>!skills[k].owned);if(u.length&&Math.random()<.4){const s=skills[u[Math.floor(Math.random()*u.length)]];return{isSkill:1,title:'獲得：'+s.name,rarity:'新技能',rarityClass:'gold',meta:s.desc,desc:s.desc,apply:()=>s.owned=1}}const o=Object.keys(skills).filter(k=>skills[k].owned);const sk=o.length?o[Math.floor(Math.random()*o.length)]:null;const pool=['towerDamage','towerSpeed','towerCount','towerPierce'];if(sk){const s=skills[sk];pool.push('skillDamage','skillSpeed');if(s.range<9999)pool.push('skillRange');if(['single','multi'].includes(s.kind))pool.push('skillTargets');if(['dot'].includes(s.kind))pool.push('skillDuration');if(!['aoe'].includes(s.kind))pool.push('skillCasts')}const ty=pool[Math.floor(Math.random()*pool.length)];const isC=['towerCount','towerPierce','skillCasts','skillTargets'].includes(ty);const v=isC?randomCountBonus():rarityPercent();const inf=rarityInfo(v,isC?'c':'p');const d={towerDamage:['普攻傷害+'+v+'%','傷害:'+Math.round(tower.damage),()=>{bonusStats.towerDamagePct+=v/100;recalcStats()},'提高普攻傷害'],towerSpeed:['攻速-'+'%','間隔:'+(tower.interval/1000).toFixed(1)+'s',()=>{bonusStats.towerSpeedPct+=v/100;recalcStats()},'加快攻速'],towerCount:['普攻數量+'+v,'數量:'+tower.count,()=>tower.count+=v,'一次發射更多箭'],towerPierce:['穿透+'+v,'穿透:'+tower.pierce,()=>tower.pierce+=v,'可穿透更多敵人'],skillDamage:sk?[skills[sk].name+'傷害+'+v+'%','傷害:'+Math.round(skills[sk].damage),()=>skills[sk].damage*=1+(v/100*0.55),'提高技能傷害']:null,skillSpeed:sk?[skills[sk].name+'冷卻-'+'%','間隔:'+(skills[sk].interval/1000).toFixed(1)+'s',()=>skills[sk].interval*=Math.max(.55,1-v/100*0.45),'加快技能速度']:null,skillRange:sk?[skills[sk].name+'範圍+'+v+'%','範圍:'+skills[sk].range,()=>skills[sk].range*=1+(v/100*0.45),'增加技能範圍']:null,skillCasts:sk?[skills[sk].name+'次數+'+v,'次數:'+skills[sk].casts,()=>skills[sk].casts+=v,'增加施放次數']:null,skillTargets:sk?[skills[sk].name+'目標+'+v,'目標:'+skills[sk].targets,()=>skills[sk].targets+=v,'增加目標數量']:null,skillDuration:sk?[skills[sk].name+'持續+'+v+'%','時間:'+(skills[sk].duration/1000).toFixed(1)+'s',()=>skills[sk].duration*=1+(v/100*0.45),'增加持續時間']:null}[ty];return{title:d[0],rarity:inf.n,rarityClass:inf.c,meta:d[1],desc:d[3],apply:d[2]}}
function reroll(){if(!rerolls)return;rerolls--;makeChoices()}
function enterEndless(){endless=true;revives=0;paused=false;document.getElementById('modeModal').style.display='none';document.getElementById('mode').textContent='無限';document.getElementById('revives').textContent=0;log('無限模式：禁用復活')}
function togglePause(){if(!running||awaitingRevive)return;manualPause=!manualPause;paused=manualPause;if(paused){pausedAt=Date.now();document.getElementById('pauseModal').style.display='flex';document.getElementById('pauseBtn').textContent='繼續'}else{totalPaused+=Date.now()-pausedAt;document.getElementById('pauseModal').style.display='none';document.getElementById('pauseBtn').textContent='暫停'}}
function gameOver(){running=false;paused=true;const b=Math.floor((Date.now()-startTime-totalPaused)/1000);const m=endless?Math.pow(1.5,3):Math.pow(1.5,revives);document.getElementById('overText').innerHTML=`存活：<b>${b}</b> 秒<br>無限：<b>${endless?'是':'否'}</b><br>關卡：<b>${stage}</b><br>擊殺：<b>${kills}</b>`;document.getElementById('gameOver').style.display='flex'}
function updateHud(){document.getElementById('stage').textContent=stage;document.getElementById('revives').textContent=endless?0:revives;document.getElementById('kills').textContent=kills;document.getElementById('lv').textContent=level;document.getElementById('xp').textContent=Math.floor(xp);document.getElementById('need').textContent=xpNeed;document.getElementById('xpFill').style.width=(xp/xpNeed*100)+'%';document.getElementById('bonus').textContent=(endless?Math.pow(1.5,3):Math.pow(1.5,revives)).toFixed(2)+'x'}
function renderSkills(){const b=document.getElementById('skillBar');b.innerHTML='';Object.values(skills).filter(s=>s.owned).forEach(s=>{const d=document.createElement('div');d.className='skillBox';d.innerHTML=`${s.name}<small>冷卻 ${(s.interval/1000).toFixed(1)}s｜傷害 ${Math.round(s.damage)}</small><div class="cd"><i style="width:${Math.min(100,s.timer/s.interval*100)}%"></i></div>`;b.appendChild(d)})}
function log(m){const e=document.getElementById('log');e.innerHTML='◆ '+m+'<br>'+e.innerHTML}
function screenShake(){game.classList.remove('shock');void game.offsetWidth;game.classList.add('shock')}
function num(v){v=Math.max(0,Math.round(v));if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1000)return(v/1000).toFixed(1)+'K';return String(v)}
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)}
function beep(f,d,t){if(muted)return;ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=.035;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}
function toggleMute(){muted=!muted;document.getElementById('muteBtn').textContent='音效：'+(muted?'關':'開')}
resize();
</script>
