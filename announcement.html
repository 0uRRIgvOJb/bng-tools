<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告模板生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        success: '#22c55e',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#0ea5e9',
                        light: '#f8fafc',
                        dark: '#1e293b',
                        'dark-blue': '#1e40af',
                        'light-blue': '#93c5fd',
                        'dark-green': '#15803d',
                        'light-green': '#86efac',
                        'dark-red': '#b91c1c',
                        'light-red': '#fca5a5',
                        'dark-yellow': '#b45309',
                        'light-yellow': '#fde68a',
                        'dark-purple': '#7e22ce',
                        'light-purple': '#d8b4fe',
                        'dark-pink': '#be185d',
                        'light-pink': '#f9a8d4',
                        'dark-orange': '#c2410c',
                        'light-orange': '#fdba74',
                    },
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .transition-custom { transition: all 0.3s ease; }
            .bg-gradient-blue{background:linear-gradient(135deg,#1e3a8a,#3b82f6);}
            .bg-gradient-green{background:linear-gradient(135deg,#064e3b,#10b981);}
            .bg-gradient-red{background:linear-gradient(135deg,#7f1d1d,#ef4444);}
            .bg-gradient-yellow{background:linear-gradient(135deg,#92400e,#f59e0b);}
            .bg-gradient-purple{background:linear-gradient(135deg,#581c87,#8b5cf6);}
            .bg-gradient-pink{background:linear-gradient(135deg,#831843,#ec4899);}
            .bg-gradient-orange{background:linear-gradient(135deg,#9a3412,#f97316);}
            .bg-gradient-indigo{background:linear-gradient(135deg,#3730a3,#6366f1);}
            .bg-gradient-teal{background:linear-gradient(135deg,#0f5132,#14b8a6);}
            .form-input{@apply w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary transition-custom;}
            .form-label{@apply block text-sm font-medium text-gray-700 mb-1;}
            .btn{@apply px-4 py-2 rounded-md font-medium transition-custom;}
            .btn-primary{@apply bg-primary text-white hover:bg-blue-700;}
            .category-btn-active{@apply bg-primary text-white;}
            .category-btn-normal{@apply bg-gray-200 text-gray-700;}
            .form-input-disabled{@apply bg-gray-100 cursor-not-allowed;}
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">公告模板生成器</h1>
            <p class="text-gray-600">選擇模板類型，填寫相關資訊，一鍵生成公告內容</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-6">
            <div class="lg:w-1/3">
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">選擇模板類型</h2>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <button class="category-btn px-3 py-1 rounded-full text-sm font-medium category-btn-active" data-category="all">全部</button>
                        <button class="category-btn px-3 py-1 rounded-full text-sm font-medium category-btn-normal" data-category="maintenance">維護相關</button>
                        <button class="category-btn px-3 py-1 rounded-full text-sm font-medium category-btn-normal" data-category="completion">完成相關</button>
                        <button class="category-btn px-3 py-1 rounded-full text-sm font-medium category-btn-normal" data-category="cancellation">取消相關</button>
                        <button class="category-btn px-3 py-1 rounded-full text-sm font-medium category-btn-normal" data-category="game">遊戲相關</button>
                    </div>
                    <div class="space-y-3 template-container">
                        <!-- 維護相關 -->
                        <button class="template-btn w-full text-left p-3 rounded-md bg-gradient-blue text-white" data-category="maintenance" data-id="template1">維修公告模板</button>
                        <button class="template-btn w-full text-left p-3 rounded-md bg-gradient-red text-white" data-category="maintenance" data-id="template3">臨時維修公告模板</button>
                        <button class="template-btn w-full text-left p-3 rounded-md bg-gradient-orange text-white" data-category="maintenance" data-id="template6">臨時維護無確定時間公告模板</button>
                        <button class="template-btn w-full text-left p-3 rounded-md bg-gradient-purple text-white" data-category="maintenance" data-id="template2">維修時間異動公告模板</button>
                        <!-- 修正：模板按钮标题改为「單一 / 部份遊戲臨時維護公告」 -->
                        <button class="template-btn w-full text-left p-3 rounded-md bg-gradient-indigo text-white" data-category="maintenance" data-id="template11">單一 / 部份遊戲臨時維護公告</button>

                        <!-- 完成相關 -->
                        <button class="template-btn w-full text-left p-3 rounded-md bg-gradient-green text-white" data-category="completion" data-id="template4">維修完成公告模板</button>
                        <button class="template-btn w-full text-left p-3 rounded-md bg-gradient-teal text-white" data-category="completion" data-id="template10">臨時維護完成公告模板</button>
                        <button class="template-btn w-full text-left p-3 rounded-md bg-gradient-teal text-white" data-category="completion" data-id="template8">單一/部份臨時維修完成公告模版</button>

                        <!-- 取消相關 -->
                        <button class="template-btn w-full text-left p-3 rounded-md bg-gradient-yellow text-white" data-category="cancellation" data-id="template5">例行維護取消公告模板</button>

                        <!-- 遊戲相關 -->
                        <!-- 修正：模板按钮标题改为「單一/部份遊戲維護公告模板」 -->
                        <button class="template-btn w-full text-left p-3 rounded-md bg-gradient-indigo text-white" data-category="game" data-id="template7">單一/部份遊戲維護公告模板</button>
                        <button class="template-btn w-full text-left p-3 rounded-md bg-gradient-pink text-white" data-category="game" data-id="template9">遊戲下架公告模板</button>
                    </div>
                </div>
            </div>

            <div class="lg:w-2/3">
                <div id="formContainer" class="bg-white rounded-lg shadow-md p-6 mb-6">
                    <h2 id="formTitle" class="text-xl font-semibold text-gray-800 mb-4">請填寫公告資訊</h2>
                    <form id="announcementForm" class="space-y-4">
                        <div class="text-center text-gray-500 py-8">
                            <i class="fa fa-arrow-left text-4xl mb-3"></i>
                            <p>請從左側選擇一個公告模板</p>
                        </div>
                    </form>
                </div>

                <div id="resultContainer" class="bg-white rounded-lg shadow-md p-6 hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">公告預覽</h2>
                        <button type="button" id="copyButton" class="btn btn-primary">複製公告</button>
                    </div>
                    <div id="resultContent" class="border border-gray-200 rounded-md p-4 min-h-[200px] bg-gray-50 whitespace-pre-wrap"></div>
                    <div id="copyStatus" class="mt-3 text-center py-2 rounded-md hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const templates = {
            template1: {
                title: "維修公告模板",
                fields: [
                    {name:"platform",label:"平台",type:"text",required:true},
                    {name:"startTime",label:"開始時間",type:"text",required:true},
                    {name:"endTime",label:"結束時間",type:"text",required:true},
                    {name:"timezone",label:"時差",type:"text",value:"GMT+8",required:true}
                ],
                content(data){
                    return `【${data.platform}例行維護通知】
維護開始時間：${data.startTime}(${data.timezone})
維護結束時間：${data.endTime}(${data.timezone})
若維護時間有任何異動，我們將再另行通知，造成不便之處敬請見諒，謝謝！`;
                }
            },
            template2: {
                title: "維修時間異動公告模板",
                fields: [
                    {name:"originalStartTime",label:"原定開始時間",type:"text",required:true},
                    {name:"originalEndTime",label:"原定結束時間",type:"text",required:true},
                    {name:"timezone",label:"時差",type:"text",value:"GMT+8",required:true},
                    {name:"newStartTime",label:"更改後開始時間",type:"text",required:true},
                    {name:"newEndTime",label:"更改後結束時間",type:"text",required:true}
                ],
                content(data){
                    return `【維修時間異動通知】
原定維護時間：
維護開始時間：${data.originalStartTime}(${data.timezone})
維護結束時間：${data.originalEndTime}(${data.timezone})
更改為：
維護開始時間：${data.newStartTime}(${data.timezone})
維護結束時間：${data.newEndTime}(${data.timezone})
若維護時間有任何異動，我們將再另行通知，造成不便之處敬請見諒，謝謝！`;
                }
            },
            template3: {
                title: "臨時維修公告模板",
                fields: [
                    {name:"platform",label:"平台",type:"text",required:true},
                    {name:"startTime",label:"開始時間",type:"text",required:true},
                    {name:"endTime",label:"結束時間",type:"text",required:true},
                    {name:"timezone",label:"時差",type:"text",value:"GMT+8",required:true}
                ],
                content(data){
                    return `【${data.platform}臨時維護通知】
維護開始時間：${data.startTime}(${data.timezone})
維護結束時間：${data.endTime}(${data.timezone})
若維護時間有任何異動，我們將再另行通知，造成不便之處敬請見諒，謝謝！`;
                }
            },
            template4: {
                title: "維修完成公告模板",
                fields: [{name:"platform",label:"平台",type:"text",required:true}],
                content(data){
                    return `【${data.platform}維護完成通知】
敬愛的客戶您好，本次維護作業已完成，貴司已可正常開放我方遊戲，再次感謝您的支持與諒解，若有任何疑問歡迎隨時與我們聯繫。`;
                }
            },
            template5: {
                title: "例行維護取消公告模板",
                fields: [
                    {name:"platform",label:"平台",type:"text",required:true},
                    {name:"announcementContent",label:"遊戲商公告內容",type:"textarea",required:true}
                ],
                content(data){
                    return `【${data.platform}例行維護取消通知】
${data.announcementContent}
若有任何異動，我們將再另行通知，造成不便之處敬請見諒，謝謝！`;
                }
            },
            template6: {
                title: "臨時維護無確定時間公告模板",
                fields: [
                    {name:"platform",label:"平台",type:"text",required:true},
                    {name:"timezone",label:"時差",type:"text",value:"GMT+8",required:true}
                ],
                content(data){
                    return `【${data.platform}臨時維護通知】
維護開始時間：即刻(${data.timezone})
維護結束時間：待定(${data.timezone})
若維護時間有任何異動，我們將再另行通知，造成不便之處敬請見諒，謝謝！`;
                }
            },
            // 修正：template7 标题改为「單一/部份遊戲維護公告模板」
            template7: {
                title: "單一/部份遊戲維護公告模板",
                fields: [
                    {name:"platform",label:"平台",type:"text",required:true},
                    {name:"typeSel",label:"類型選擇",type:"select",options:["單一","部份"],required:true},
                    {name:"affectedRange",label:"影響範圍",type:"text",required:true},
                    {name:"startTime",label:"開始時間",type:"text",required:true},
                    {name:"endTime",label:"結束時間",type:"text",required:true},
                    {name:"timezone",label:"時差",type:"text",value:"GMT+8",required:true}
                ],
                content(data){
                    let content = `【${data.platform}${data.typeSel}遊戲維護通知】
維護開始時間：${data.startTime}(${data.timezone})
維護結束時間：${data.endTime}(${data.timezone})

影響範圍：${data.affectedRange}`;
                    if(data.typeSel === "部份" && data.affGame?.trim()){
                        content += `\n影響遊戲：${data.affGame.trim()}`;
                    }
                    content += `\n若維護時間有任何異動，我們將再另行通知，造成不便之處敬請見諒，謝謝！`;
                    return content;
                }
            },
            template8: {
                title: "單一/部份臨時維修完成公告模版",
                fields: [
                    {name:"platform",label:"平台",type:"text",required:true},
                    {name:"typeSel",label:"類型選擇",required:true,type:"select",options:["單一","部份"]},
                    {name:"affectedRange",label:"影響範圍",type:"text",required:true}
                ],
                content(data){
                    return `【${data.platform}${data.typeSel}臨時維護完成通知】
影響範圍：${data.affectedRange}
敬愛的客戶您好，本次維護作業已完成，貴司已可正常開放該遊戲，再次感謝您的支持與諒解，若有任何疑問歡迎隨時與我們聯繫。`;
                }
            },
            template9: {
                title: "遊戲下架公告模板",
                fields: [
                    {name:"platform",label:"平台",type:"text",required:true},
                    {name:"game",label:"上/下架遊戲",type:"text",required:true},
                    {name:"action",label:"上/下架",type:"select",options:["上架","下架"],required:true}
                ],
                content(data){
                    return `【${data.platform}${data.game}${data.action}通知】
敬愛的客戶您好，${data.game}已完成${data.action}作業，貴司已可${data.action==='上架'?'開放':'移除'}該遊戲，再次感謝您的支持與諒解，若有任何疑問歡迎隨時與我們聯繫。`;
                }
            },
            template10: {
                title: "臨時維護完成公告模板",
                fields: [{name:"platform",label:"平台",type:"text",required:true}],
                content(data){
                    return `【${data.platform}臨時維護完成公告】
敬愛的客戶您好，本次臨時維護作業已完成，貴司已可正常開放我方遊戲，再次感謝您的支持與諒解，若有任何疑問歡迎隨時與我們聯繫。`;
                }
            },
            // 修正：template11 标题改为「單一 / 部份遊戲臨時維護公告」，并强制时间为即刻/待定
            template11: {
                title: "單一 / 部份遊戲臨時維護公告",
                fields: [
                    {name:"platform",label:"平台",type:"text",required:true},
                    {name:"typeSel",label:"類型選擇",type:"select",options:["單一","部份"],required:true},
                    {name:"startTime",label:"開始時間",type:"text",value:"即刻",required:true, disabled: true},
                    {name:"endTime",label:"結束時間",type:"text",value:"待定",required:true, disabled: true},
                    {name:"timezone",label:"時差",type:"text",value:"GMT+8",required:true},
                    {name:"affectedRange",label:"影響範圍",type:"text",required:true},
                ],
                content(data){
                    // 强制使用即刻/待定，忽略用户输入
                    const fixedStartTime = "即刻";
                    const fixedEndTime = "待定";
                    
                    let base = `【${data.platform}${data.typeSel}遊戲臨時維護通知】
維護開始時間：${fixedStartTime}(${data.timezone})
維護結束時間：${fixedEndTime}(${data.timezone})

影響範圍：${data.affectedRange}`;
                    if(data.typeSel === "部份" && data.affGame?.trim()){
                        base += `\n影響遊戲：${data.affGame.trim()}`;
                    }
                    base += `\n若維護時間有任何異動，我們將再另行通知，造成不便之處敬請見諒，謝謝！`;
                    return base;
                }
            }
        };

        let currentTplId = "";

        document.addEventListener('DOMContentLoaded', ()=>{
            // 分類按鈕
            document.querySelectorAll('.category-btn').forEach(btn=>{
                btn.onclick = function(){
                    document.querySelectorAll('.category-btn').forEach(b=>{
                        b.classList.remove('category-btn-active');
                        b.classList.add('category-btn-normal');
                    });
                    this.classList.remove('category-btn-normal');
                    this.classList.add('category-btn-active');
                    let cat = this.dataset.category;
                    document.querySelectorAll('.template-btn').forEach(t=>{
                        t.style.display = (cat==='all' || t.dataset.category===cat) ? 'block' : 'none';
                    });
                }
            });

            // 模板按鈕
            document.querySelectorAll('.template-btn').forEach(btn=>{
                btn.onclick = function(){
                    let tid = this.dataset.id;
                    selectTemplate(tid);
                }
            });

            // 表單提交（增強驗證）
            document.getElementById('announcementForm').onsubmit = function(e){
                e.preventDefault();
                let inputs = this.querySelectorAll('input, select, textarea');
                let empty = false;
                
                // 基礎必填驗證（跳過禁用的輸入框）
                inputs.forEach(inp=>{
                    if(inp.hasAttribute('required') && !inp.disabled && !inp.value.trim()){
                        empty = true;
                    }
                });

                // 針對「部份」類型，驗證影響遊戲必填
                const typeSel = this.querySelector('[name="typeSel"]');
                const affGame = this.querySelector('[name="affGame"]');
                if(typeSel && typeSel.value === "部份" && affGame && !affGame.value.trim()){
                    empty = true;
                }

                if(empty){
                    alert("有欄位尚未填寫");
                    return;
                }
                generate();
            };

            // 複製
            document.getElementById('copyButton').onclick = copyText;
        });

        // 切換模板、動態產生欄位（核心修復）
        function selectTemplate(tid){
            currentTplId = tid;
            let tpl = templates[tid];
            document.getElementById('formTitle').innerText = tpl.title;
            let form = document.getElementById('announcementForm');
            form.innerHTML = "";

            // 生成基礎欄位（逐個生成，方便插入影響遊戲欄位）
            let affectedRangeElement = null;
            tpl.fields.forEach(f=>{
                let wrap = document.createElement("div");
                let lab = document.createElement("label");
                lab.className = "form-label";
                lab.innerText = f.label + (f.required?" *":"");

                let el;
                if(f.type === "textarea"){
                    el = document.createElement("textarea");
                    el.rows = 3;
                }else if(f.type === "select"){
                    el = document.createElement("select");
                    f.options.forEach(opt=>{
                        let op = document.createElement("option");
                        op.value = opt;
                        op.innerText = opt;
                        el.appendChild(op);
                    });
                }else{
                    el = document.createElement("input");
                    el.type = f.type;
                }
                
                // 設置禁用狀態和樣式
                if(f.disabled) {
                    el.disabled = true;
                    el.classList.add('form-input-disabled');
                }
                
                el.className = "form-input";
                el.name = f.name;
                if(f.required) el.required = true;
                if(f.value) el.value = f.value;

                wrap.appendChild(lab);
                wrap.appendChild(el);
                form.appendChild(wrap);

                // 記錄影響範圍欄位的位置
                if(f.name === "affectedRange"){
                    affectedRangeElement = wrap;
                }
            });

            // 核心調整：把影響遊戲欄位插入到影響範圍下方
            if(tid === "template11" || tid === "template7"){
                // 創建影響遊戲欄位
                let gameWrap = document.createElement("div");
                gameWrap.id = "affGameWrap";
                gameWrap.style.display = "none";
                gameWrap.innerHTML = `
                    <label class="form-label">影響遊戲 *</label>
                    <input type="text" name="affGame" class="form-input" placeholder="請填寫受影響的遊戲名稱">
                `;

                // 插入到影響範圍欄位的後面
                if(affectedRangeElement){
                    affectedRangeElement.after(gameWrap);
                } else {
                    form.appendChild(gameWrap); // 備用方案
                }

                // 綁定類型選擇事件
                let sel = form.querySelector('[name="typeSel"]');
                const toggleGameField = () => {
                    const gameWrapEl = document.getElementById("affGameWrap");
                    gameWrapEl.style.display = sel.value === "部份" ? "block" : "none";
                    // 同步必填屬性
                    const affGameInput = gameWrapEl.querySelector('input');
                    affGameInput.required = sel.value === "部份";
                };

                // 初始化立即觸發
                sel.addEventListener('change', toggleGameField);
                toggleGameField();
            }

            // 加入送出按鈕
            let submitBox = document.createElement("div");
            submitBox.className = "pt-4";
            submitBox.innerHTML = `<button type="submit" class="btn btn-primary w-full">生成公告</button>`;
            form.appendChild(submitBox);

            document.getElementById('resultContainer').classList.add('hidden');
        }

        // 生成公告
        function generate(){
            let form = document.getElementById('announcementForm');
            let fd = new FormData(form);
            let data = {};
            fd.forEach((v,k)=>data[k]=v);
            let html = templates[currentTplId].content(data);
            document.getElementById('resultContent').innerText = html;
            document.getElementById('resultContainer').classList.remove('hidden');
        }

        // 複製
        function copyText(){
            let txt = document.getElementById('resultContent').innerText;
            navigator.clipboard.writeText(txt).then(()=>{
                alert("複製成功");
            }).catch(()=>{
                alert("複製失敗，請手動複製");
            });
        }
    </script>
</body>
