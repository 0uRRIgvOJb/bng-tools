<!DOCTYPE html>
<a href="./" class="home-btn">首页</a>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>金币大作战</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #1d2733 0%, #0c1117 45%, #080b0f 100%);
      color: #ecf3ff;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 980px;
      background: rgba(19, 25, 33, 0.92);
      border: 1px solid #2a3440;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      padding: 24px;
    }

    .title {
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 3px;
      margin-bottom: 18px;
      color: #ffffff;
      text-shadow: 0 0 14px rgba(111, 194, 255, 0.15);
    }

    .top-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .info-card {
      background: #111821;
      border: 1px solid #2b3643;
      border-radius: 16px;
      padding: 14px 16px;
      min-height: 84px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .info-label {
      font-size: 13px;
      color: #92a1b2;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.22);
    }

    .btn:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-start {
      background: linear-gradient(135deg, #1e80ff, #4cb8ff);
    }

    .btn-restart {
      background: linear-gradient(135deg, #3b424c, #5b6573);
    }

    .hint {
      text-align: center;
      color: #9eb0c5;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.8;
    }

    .game-wrap {
      position: relative;
      width: 100%;
      height: 520px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid #27313c;
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(180deg, #0e151d 0%, #121b25 100%);
      background-size: 40px 40px, 40px 40px, auto;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.28);
    }

    .player {
      position: absolute;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, #58c4ff, #2e7fff);
      box-shadow:
        0 0 18px rgba(76, 171, 255, 0.45),
        inset 0 -6px 10px rgba(0,0,0,0.2);
      transition: transform 0.05s linear;
    }

    .player::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.18);
    }

    .coin {
      position: absolute;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff4a8 0%, #ffd84d 38%, #f0ae0a 70%, #c17f00 100%);
      box-shadow:
        0 0 16px rgba(255, 215, 77, 0.6),
        0 0 32px rgba(255, 215, 77, 0.25);
      animation: floatCoin 1.2s ease-in-out infinite alternate;
    }

    .coin::after {
      content: "$";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 18px;
      color: rgba(100, 62, 0, 0.92);
    }

    .particle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe98a 0%, #ffbf00 70%, rgba(255,191,0,0) 100%);
      pointer-events: none;
      animation: burst 0.55s ease-out forwards;
    }

    .center-mask {
      position: absolute;
      inset: 0;
      background: rgba(6, 10, 15, 0.46);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.25s ease;
    }

    .center-mask.hidden {
      opacity: 0;
    }

    .center-title {
      font-size: 34px;
      font-weight: 900;
      margin-bottom: 8px;
      color: #ffffff;
      text-shadow: 0 0 16px rgba(97, 184, 255, 0.18);
    }

    .center-subtitle {
      color: #c0d3e7;
      font-size: 15px;
      text-align: center;
      line-height: 1.8;
      padding: 0 20px;
    }

    .game-over {
      position: absolute;
      inset: 0;
      background: rgba(6, 10, 15, 0.72);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
      padding: 20px;
    }

    .game-over.show {
      display: flex;
    }

    .game-over-card {
      width: min(420px, 100%);
      background: #161f29;
      border: 1px solid #304050;
      border-radius: 22px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    .game-over-title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .game-over-text {
      font-size: 18px;
      color: #c9d7e8;
      line-height: 1.9;
      margin-bottom: 18px;
    }

    .mobile-controls {
      display: none;
      margin-top: 18px;
      grid-template-columns: repeat(3, 70px);
      justify-content: center;
      gap: 8px;
    }

    .m-btn {
      height: 56px;
      border: none;
      border-radius: 14px;
      background: #1a2330;
      color: #fff;
      font-size: 24px;
      font-weight: 900;
      border: 1px solid #31404f;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .m-btn:active {
      transform: scale(0.95);
    }

    .empty {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes floatCoin {
      from {
        transform: translateY(-2px) scale(1);
      }
      to {
        transform: translateY(2px) scale(1.05);
      }
    }

    @keyframes burst {
      from {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      to {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0.6);
      }
    }

    @media (max-width: 860px) {
      .top-bar {
        grid-template-columns: repeat(2, 1fr);
      }

      .game-wrap {
        height: 430px;
      }

      .mobile-controls {
        display: grid;
      }
    }

    @media (max-width: 560px) {
      .app {
        padding: 16px;
      }

      .title {
        font-size: 28px;
      }

      .info-value {
        font-size: 24px;
      }

      .game-wrap {
        height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">金币大作战</div>

    <div class="top-bar">
      <div class="info-card">
        <div class="info-label">目前分数</div>
        <div id="score" class="info-value">0</div>
      </div>
      <div class="info-card">
        <div class="info-label">最高分</div>
        <div id="bestScore" class="info-value">0</div>
      </div>
      <div class="info-card">
        <div class="info-label">剩余时间</div>
        <div id="time" class="info-value">30</div>
      </div>
      <div class="info-card">
        <div class="info-label">游戏状态</div>
        <div id="status" class="info-value" style="font-size:22px;">未开始</div>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn" class="btn btn-start">开始游戏</button>
      <button id="restartBtn" class="btn btn-restart">重新开始</button>
    </div>

    <div class="hint">
      电脑：使用 <b>W A S D</b> 或 <b>方向键</b> 移动角色吃金币。<br>
      手机：可使用下方方向按钮操作。
    </div>

    <div id="gameArea" class="game-wrap">
      <div id="player" class="player"></div>
      <div id="coin" class="coin"></div>

      <div id="centerMask" class="center-mask">
        <div class="center-title">准备开始</div>
        <div class="center-subtitle">
          点击「开始游戏」后开始倒数 30 秒。<br>
          尽量吃更多金币，挑战最高分。
        </div>
      </div>

      <div id="gameOver" class="game-over">
        <div class="game-over-card">
          <div class="game-over-title">游戏结束</div>
          <div id="gameOverText" class="game-over-text"></div>
          <button id="playAgainBtn" class="btn btn-start">再玩一次</button>
        </div>
      </div>
    </div>

    <div class="mobile-controls">
      <div class="empty"></div>
      <button class="m-btn" data-dir="up">▲</button>
      <div class="empty"></div>

      <button class="m-btn" data-dir="left">◀</button>
      <button class="m-btn" data-dir="down">▼</button>
      <button class="m-btn" data-dir="right">▶</button>
    </div>
  </div>

  <script>
    const gameArea = document.getElementById("gameArea");
    const player = document.getElementById("player");
    const coin = document.getElementById("coin");
    const scoreEl = document.getElementById("score");
    const bestScoreEl = document.getElementById("bestScore");
    const timeEl = document.getElementById("time");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const centerMask = document.getElementById("centerMask");
    const gameOver = document.getElementById("gameOver");
    const gameOverText = document.getElementById("gameOverText");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const mobileButtons = document.querySelectorAll(".m-btn");

    const PLAYER_SIZE = 46;
    const COIN_SIZE = 34;
    const MOVE_STEP = 18;
    const GAME_TIME = 30;
    const BEST_KEY = "coin_game_best_score";

    let playerX = 30;
    let playerY = 30;
    let coinX = 180;
    let coinY = 120;
    let score = 0;
    let timeLeft = GAME_TIME;
    let gameRunning = false;
    let timerId = null;

    function getAreaSize() {
      return {
        width: gameArea.clientWidth,
        height: gameArea.clientHeight
      };
    }

    function loadBestScore() {
      const saved = localStorage.getItem(BEST_KEY);
      return saved ? Number(saved) : 0;
    }

    function saveBestScore(value) {
      localStorage.setItem(BEST_KEY, String(value));
    }

    function updatePlayerPosition() {
      player.style.left = playerX + "px";
      player.style.top = playerY + "px";
    }

    function updateCoinPosition() {
      coin.style.left = coinX + "px";
      coin.style.top = coinY + "px";
    }

    function randomPosition(max) {
      return Math.floor(Math.random() * max);
    }

    function spawnCoin() {
      const area = getAreaSize();
      const maxX = Math.max(0, area.width - COIN_SIZE);
      const maxY = Math.max(0, area.height - COIN_SIZE);

      let nextX = 0;
      let nextY = 0;
      let safe = false;
      let tries = 0;

      while (!safe && tries < 80) {
        nextX = randomPosition(maxX);
        nextY = randomPosition(maxY);

        const dx = (nextX + COIN_SIZE / 2) - (playerX + PLAYER_SIZE / 2);
        const dy = (nextY + COIN_SIZE / 2) - (playerY + PLAYER_SIZE / 2);
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > 90) {
          safe = true;
        }
        tries++;
      }

      coinX = nextX;
      coinY = nextY;
      updateCoinPosition();
    }

    function resetPlayer() {
      const area = getAreaSize();
      playerX = Math.max(10, Math.floor(area.width / 2 - PLAYER_SIZE / 2));
      playerY = Math.max(10, Math.floor(area.height / 2 - PLAYER_SIZE / 2));
      updatePlayerPosition();
    }

    function updateScore() {
      scoreEl.textContent = score;
    }

    function updateBestScore() {
      const best = loadBestScore();
      bestScoreEl.textContent = best;
    }

    function updateTime() {
      timeEl.textContent = timeLeft;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw &&
             ax + aw > bx &&
             ay < by + bh &&
             ay + ah > by;
    }

    function createParticles(x, y) {
      for (let i = 0; i < 10; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = x + "px";
        p.style.top = y + "px";
        p.style.setProperty("--dx", (Math.random() * 100 - 50) + "px");
        p.style.setProperty("--dy", (Math.random() * 100 - 50) + "px");
        gameArea.appendChild(p);

        setTimeout(() => {
          p.remove();
        }, 550);
      }
    }

    function checkEatCoin() {
      const hit = rectsOverlap(
        playerX, playerY, PLAYER_SIZE, PLAYER_SIZE,
        coinX, coinY, COIN_SIZE, COIN_SIZE
      );

      if (hit) {
        score++;
        updateScore();

        const centerX = coinX + COIN_SIZE / 2;
        const centerY = coinY + COIN_SIZE / 2;
        createParticles(centerX, centerY);

        spawnCoin();

        const best = loadBestScore();
        if (score > best) {
          saveBestScore(score);
          updateBestScore();
        }
      }
    }

    function movePlayer(direction) {
      if (!gameRunning) return;

      const area = getAreaSize();
      const maxX = area.width - PLAYER_SIZE;
      const maxY = area.height - PLAYER_SIZE;

      if (direction === "left") playerX -= MOVE_STEP;
      if (direction === "right") playerX += MOVE_STEP;
      if (direction === "up") playerY -= MOVE_STEP;
      if (direction === "down") playerY += MOVE_STEP;

      if (playerX < 0) playerX = 0;
      if (playerY < 0) playerY = 0;
      if (playerX > maxX) playerX = maxX;
      if (playerY > maxY) playerY = maxY;

      updatePlayerPosition();
      checkEatCoin();
    }

    function stopGame() {
      gameRunning = false;
      clearInterval(timerId);
      timerId = null;
      setStatus("已结束");

      gameOverText.innerHTML = `
        本次分数：<b>${score}</b><br>
        最高分：<b>${loadBestScore()}</b>
      `;
      gameOver.classList.add("show");
      centerMask.classList.remove("hidden");
    }

    function startGame() {
      clearInterval(timerId);
      gameRunning = true;
      score = 0;
      timeLeft = GAME_TIME;

      updateScore();
      updateTime();
      setStatus("进行中");
      gameOver.classList.remove("show");
      centerMask.classList.add("hidden");

      resetPlayer();
      spawnCoin();

      timerId = setInterval(() => {
        timeLeft--;
        updateTime();

        if (timeLeft <= 0) {
          stopGame();
        }
      }, 1000);
    }

    function restartGame() {
      startGame();
    }

    function init() {
      updateBestScore();
      updateScore();
      updateTime();
      setStatus("未开始");
      resetPlayer();
      spawnCoin();
    }

    window.addEventListener("resize", () => {
      const area = getAreaSize();
      if (playerX > area.width - PLAYER_SIZE) playerX = Math.max(0, area.width - PLAYER_SIZE);
      if (playerY > area.height - PLAYER_SIZE) playerY = Math.max(0, area.height - PLAYER_SIZE);
      if (coinX > area.width - COIN_SIZE) coinX = Math.max(0, area.width - COIN_SIZE);
      if (coinY > area.height - COIN_SIZE) coinY = Math.max(0, area.height - COIN_SIZE);
      updatePlayerPosition();
      updateCoinPosition();
    });

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (["arrowleft", "arrowright", "arrowup", "arrowdown", " ", "w", "a", "s", "d"].includes(key)) {
        e.preventDefault();
      }

      if (key === "arrowleft" || key === "a") movePlayer("left");
      if (key === "arrowright" || key === "d") movePlayer("right");
      if (key === "arrowup" || key === "w") movePlayer("up");
      if (key === "arrowdown" || key === "s") movePlayer("down");
    });

    mobileButtons.forEach(btn => {
      const dir = btn.dataset.dir;

      btn.addEventListener("click", () => {
        movePlayer(dir);
      });
    });

    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", restartGame);
    playAgainBtn.addEventListener("click", restartGame);

    init();
  </script>
</body>
</html>
